const generateMockAttendanceHistory = () => {
  const result = {};
  const workers = [
    { id:"w1" }, { id:"w2" }, { id:"w3" },
    { id:"w4" }, { id:"w5" }, { id:"w6" },
    { id:"sv1" }, { id:"sv2" }, { id:"sv3" }, { id:"sv4" },
  ];
  // Generate for last 4 months
  const now = new Date();
  const months = [];
  for (let i = 0; i < 4; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,"0")}`);
  }
  // Seeded pseudo-random for consistency
  const seededRand = (seed) => {
    const x = Math.sin(seed + 1) * 10000;
    return x - Math.floor(x);
  };
  workers.forEach(worker => {
    months.forEach(month => {
      const [year, mon] = month.split("-").map(Number);
      const daysInMonth = new Date(year, mon, 0).getDate();
      const key = `${worker.id}_${month}`;
      result[key] = {};
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${month}-${String(d).padStart(2,"0")}`;
        const dayOfWeek = new Date(dateStr).getDay();
        const seed = worker.id.charCodeAt(1) * 100 + mon * 10 + d;
        const rand = seededRand(seed);
        if (dayOfWeek === 0) {
          result[key][dateStr] ="holiday"; // Sunday
        } else if (dayOfWeek === 7) {
          result[key][dateStr] = rand < 0.3 ?"present" :"holiday";
        } else {
          if (rand < 0.78)      result[key][dateStr] ="present";
          else if (rand < 0.88) result[key][dateStr] ="absent";
          else if (rand < 0.94) result[key][dateStr] ="leave";
          else                  result[key][dateStr] ="half";
        }
      }
      // Mark last few days of current month as none (future)
      if (month === months[0]) {
        for (let d = now.getDate() + 1; d <= daysInMonth; d++) {
          const dateStr = `${month}-${String(d).padStart(2,"0")}`;
          result[key][dateStr] ="none";
        }
      }
    });
  });
  return result;
};
const MOCK_ATTENDANCE_HISTORY = generateMockAttendanceHistory();

const ToastContext = createContext(null);
const useToast = () => useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type ="success") => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  const icons = {
    success: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    error:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="white" strokeWidth="2.5" strokeLinecap="round"/></svg>,
    info:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" strokeWidth="2"/><path d="M12 8v4M12 16h.01" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>,
    warning: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>,
  };
  const colors = { success:"bg-green-500", error:"bg-red-500", info:"bg-blue-500", warning:"bg-amber-500" };
  return (
    <ToastContext.Provider value={show}>
      {children}
      <div className="fixed left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-[90vw] max-w-sm pointer-events-none"
        style={{ top:"max(16px, env(safe-area-inset-top, 16px))" }}>
        {toasts.map(t => (
          <div key={t.id} className={`${colors[t.type]||colors.success} text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-3 font-semibold text-sm animate-[slideDown_0.25s_ease]`}
            style={{animation:"slideDown 0.25s ease"}}>
            <span className="shrink-0">{icons[t.type]||icons.success}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
      <style>{`@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}} @media(min-width:1024px){.main-content{padding-top:1rem!important}} @media(max-width:1023px){.main-content{padding-top:calc(env(safe-area-inset-top,0px) + 56px)!important}}`}</style>
    </ToastContext.Provider>
  );
};

// ── Pagination Utility ──────────────────────────────────────
const usePagination = (data, pageSize = 25) => {
  const [page, setPage] = useState(1);
  const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
  const paged = data.slice((page - 1) * pageSize, page * pageSize);
  useEffect(() => { setPage(1); }, [data.length]);
  return { paged, page, setPage, totalPages, total: data.length, pageSize };
};

const Paginator = ({ page, setPage, totalPages, total, pageSize }) => {
  if (totalPages <= 1) return null;
  const from = (page - 1) * pageSize + 1;
  const to   = Math.min(page * pageSize, total);
  const pages = Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
    if (totalPages <= 5) return i + 1;
    if (page <= 3) return i + 1;
    if (page >= totalPages - 2) return totalPages - 4 + i;
    return page - 2 + i;
  });
  return (
    <div className="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-t border-gray-100">
      <span className="text-xs text-gray-500">{from}–{to} of {total}</span>
      <div className="flex items-center gap-1">
        <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
          className="w-7 h-7 rounded-lg border border-gray-200 text-xs font-bold text-gray-600 disabled:opacity-30 hover:bg-orange-50 hover:border-orange-300 transition">&lt;</button>
        {pages.map(p => (
          <button key={p} onClick={() => setPage(p)}
            className={"w-7 h-7 rounded-lg text-xs font-bold border transition" +
              (p === page ?"bg-orange-500 text-white border-orange-500" :"border-gray-200 text-gray-600 hover:bg-orange-50 hover:border-orange-300")}>
            {p}
          </button>
        ))}
        <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}
          className="w-7 h-7 rounded-lg border border-gray-200 text-xs font-bold text-gray-600 disabled:opacity-30 hover:bg-orange-50 hover:border-orange-300 transition">&gt;</button>
      </div>
    </div>
  );
};

const WorkerPanel = ({ onLogout }) => {
  const { user, sharedEntries, sharedCuts, sharedLockedCuts, sharedStyles, sharedOperations, sharedWorkers, sharedActions, sharedNotifs, paymentLock } = useContext(AppContext);
  const myDept   = user.department ||"Stitching";
  const deptColor = MOCK_DB.departments.find(d=>d.name===myDept)?.color ||"#F97316";
  const [tab, setTab] = useState("entry");

  // Real entries from context, filtered for this worker
  const mySharedEntries = (sharedEntries||[]).filter(e => e.workerId === user.id || e.staffId === user.staffId);

  const [entries, setEntries] = useState(mySharedEntries.length > 0 ? mySharedEntries : [
    { id:"se1", date:"2024-01-15", style:"Kids T-Shirt",       operation:"Stitching",     pieces:95,  pieceRate:2.50, amount:237.50, status:"pending",  note:"" },
    { id:"se2", date:"2024-01-14", style:"Men's Formal Shirt", operation:"Overlock",      pieces:110, pieceRate:1.50, amount:165.00, status:"approved", note:"Supervisor verified" },
    { id:"se3", date:"2024-01-13", style:"Kids T-Shirt",       operation:"Button Sewing", pieces:200, pieceRate:0.75, amount:150.00, status:"approved", note:"" },
    { id:"se4", date:"2024-01-12", style:"Women's Kurta",      operation:"Stitching",     pieces:130, pieceRate:2.50, amount:325.00, status:"rejected", note:"Pieces count mismatch" },
    { id:"se5", date:"2024-01-11", style:"Denim Jeans",        operation:"Overlock",      pieces:80,  pieceRate:1.50, amount:120.00, status:"approved", note:"" },
    { id:"se6", date:"2024-01-10", style:"Men's Formal Shirt", operation:"Stitching",     pieces:105, pieceRate:2.50, amount:262.50, status:"approved", note:"" },
  ]);
  const [showForm,  setShowForm]  = useState(false);
  const [form,      setForm]      = useState({ date:"", styleId:"", operationId:"", pieces:"", note:"", selectedCuts:[] });
  const [formErr,   setFormErr]   = useState("");
  const [saved,     setSaved]     = useState(false);
  const [entryFilter, setEntryFilter] = useState("all");
  const [applied,   setApplied]   = useState({});
  const [showJobs,  setShowJobs]  = useState(false);
  const wInfo = (sharedWorkers||MOCK_DB.workers).find(w => w.id === user.id || w.staffId === user.staffId) || MOCK_DB.workers[0];

  const TODAY      = new Date().toISOString().split("T")[0];
  const pieceRate  = (sharedOperations||MOCK_DB.operations).find(o => o.id === form.operationId)?.pieceRate || 0;
  const autoAmount = (parseInt(form.pieces) || 0) * pieceRate;

  // sharedEntries sync — supervisor approve/reject hone pe worker ka list update ho
  React.useEffect(() => {
    const myUpdated = (sharedEntries||[]).filter(e => e.workerId === user.id || e.staffId === user.staffId);
    if (myUpdated.length > 0) setEntries(myUpdated);
  }, [sharedEntries]);

  // Balance pieces — operation wise (sirf entries use karo, double count nahi)
  const balancePieces = (() => {
    if (!form.styleId || !form.operationId) return null;
    const allStyleCuts = (sharedCuts||[]).filter(c => c.styleId === form.styleId);
    const cuttingTotal = allStyleCuts.reduce((s,c) => s+(+c.totalPieces||0), 0);
    if (cuttingTotal === 0) return null;
    const usedPieces = entries
      .filter(e => e.styleId===form.styleId && e.operationId===form.operationId && e.status!=="rejected")
      .reduce((s,e) => s+(+e.pieces||0), 0);
    return { total: cuttingTotal, used: usedPieces, remaining: Math.max(0, cuttingTotal - usedPieces) };
  })();

  // Auto-fill pieces with balance when style+operation set
  React.useEffect(() => {
    if (balancePieces && balancePieces.remaining > 0 && !form.pieces) {
      setForm(f => ({ ...f, pieces: String(balancePieces.remaining) }));
    }
  }, [form.styleId, form.operationId]);

  const approved = entries.filter(e => e.status ==="approved");
  const totalAmt = approved.reduce((s,e) => s + e.amount, 0);
  const totalPcs = approved.reduce((s,e) => s + e.pieces, 0);

  const handleSubmit = () => {
    if (!form.styleId || !form.operationId || !form.pieces || !form.date) { setFormErr("सभी fields भरना जरूरी है।"); return; }
    if (parseInt(form.pieces) <= 0) { setFormErr("Pieces 0 से ज्यादा होनी चाहिए।"); return; }
    // Cutting complete check
    if (balancePieces !== null && balancePieces.remaining === 0) {
      setFormErr("✅ इस style का cutting balance पूरा हो चुका है।"); return;
    }
    // Cutting lock check
    const _allCuts = (sharedCuts||[]).filter(c => c.styleId === form.styleId);
    if (_allCuts.length > 0) {
      const _lc = sharedLockedCuts || {};
      const _totalCut = _allCuts.reduce((s,x)=>s+(+x.totalPieces||0),0);
      const _allLocked = _allCuts.every(c => {
        const _used = entries.filter(e=>e.styleId===c.styleId&&e.status!=="rejected").reduce((s,e)=>s+(+e.pieces||0),0);
        const _isCmp = _totalCut > 0 && _used >= _totalCut;
        const _manual = _lc[c.id];
        return _isCmp || _manual === true || (_manual === undefined && _used === 0);
      });
      if (_allLocked) { setFormErr("🔒 Cutting locked है! Supervisor se unlock karwayein।"); return; }
    }
    // Payment timing lock check
    const period = getPaymentPeriod(paymentLock);
    if (period && (form.date < period.start || form.date > period.end)) {
      setFormErr(`[!] Date allowed period में नहीं है!\nAllowed: ${period.start} → ${period.end} (${period.label})`); return;
    }

    // Duplicate check
    const allEntries = [...(sharedEntries||[]), ...entries];
    const duplicate = allEntries.find(e =>
      (e.workerId===user.id || e.staffId===user.staffId) &&
      e.styleId===form.styleId &&
      e.operationId===form.operationId &&
      e.date===form.date &&
      e.status!=="rejected"
    );
    if (duplicate) { setFormErr(`[!] इस style+operation में ${form.date} को entry पहले से है! (${duplicate.pieces} pcs)`); return; }

  // ── WORKER CUTTING TAB ──────────────────────────────────────
  const WorkerCuttingTab = () => {
    const allStyles  = (sharedStyles||MOCK_DB.styles);
    const allCuts    = sharedCuts || [];
    const [selStyle, setSelStyle] = useState("all");

    // Worker panel mein supervisor ka lockedCuts directly nahi milta.
    // Hum entries se status derive karte hain:
    // complete → locked/complete, hasProgress → open (default), no entry → locked
    // Note: agar supervisor ne manually lock kiya in-progress cut ko,
    // worker tab mein"In Progress" dikhega — accurate real-time lock
    // sirf supervisor panel mein toggle se control hota hai.
    const getCutStatus = (c) => {
      const cutTotal = +(c.totalPieces) || 0;
      const used = (sharedEntries || [])
        .filter(e => e.styleId === c.styleId && e.status !=="rejected")
        .reduce((s, e) => s + (+e.pieces || 0), 0);
      const percent = cutTotal > 0 ? Math.min(100, Math.round((used / cutTotal) * 100)) : 0;
      if (cutTotal > 0 && used >= cutTotal) return { status:"complete", used, remaining: 0, percent: 100 };
      if (used > 0) return { status:"open", used, remaining: cutTotal - used, percent };
      return { status:"locked", used: 0, remaining: cutTotal, percent: 0 };

// SelfEntry — Admin/Supervisor view: Worker-submitted entries with approve/reject
const SelfEntry = () => {
  const { user, sharedEntries, sharedActions, sharedStyles, sharedOperations, sharedWorkers } = useContext(AppContext);
  const showToast = useToast();

  // Combine MOCK_DB selfEntries with any live sharedEntries
  const [localEntries, setLocalEntries] = useState(() => {
    const ops = sharedOperations || MOCK_DB.operations;
    const wkrs = sharedWorkers || MOCK_DB.workers;
    const base = MOCK_DB.selfEntries.map(e => ({
      ...e,
      pieceRate: ops.find(o => o.name === e.operation)?.pieceRate || 0,
      amount:    (ops.find(o => o.name === e.operation)?.pieceRate || 0) * e.pieces,
      department: wkrs.find(w => w.staffId === e.staffId)?.department ||"—",
    }));
    return base;
  });

  const [filter, setFilter] = useState("pending");

  // Merge live sharedEntries (worker-submitted) into localEntries
  React.useEffect(() => {
    if (!sharedEntries?.length) return;
    setLocalEntries(prev => {
      const existingIds = new Set(prev.map(e => e.id));
      const incoming = sharedEntries
        .filter(e => e.status ==="pending" && !existingIds.has(e.id))
        .map(e => ({
          id: e.id, date: e.date,
          workerName: e.workerName, staffId: e.staffId,
          style: e.styleName || e.style, operation: e.operation,
          pieces: e.pieces, pieceRate: e.pieceRate || 0,
          amount: e.amount || 0, department: e.department ||"—",
          status:"pending", note: e.note ||"",
        }));
      return [...incoming, ...prev];
    });
  }, [sharedEntries]);

  // Supervisor can only see own department; admin sees all
  const visibleEntries = localEntries.filter(e => {
    if (user.role ==="admin") return true;
    return e.department === user.department;
  });

  const filtered = filter ==="all"
    ? visibleEntries
    : visibleEntries.filter(e => e.status === filter);

  const pendingCount = visibleEntries.filter(e => e.status ==="pending").length;

  const updateStatus = (id, newStatus) => {
    setLocalEntries(prev =>
      prev.map(e => e.id === id ? { ...e, status: newStatus } : e)
    );
    if (sharedActions?.updateEntryStatus) sharedActions.updateEntryStatus(id, newStatus);
    showToast(
      newStatus ==="approved" ?"Entry Approved" :"Entry Rejected",
      newStatus ==="approved" ?"success" :"error"
    );
  };

  const statusMeta = {
    pending:  { label:"Pending",  text:"text-amber-600",  bg:"bg-amber-50",  border:"border-amber-200"  },
    approved: { label:"Approved", text:"text-green-600",  bg:"bg-green-50",  border:"border-green-200"  },
    rejected: { label:"Rejected", text:"text-rose-500",   bg:"bg-rose-50",   border:"border-rose-200"   },
  };

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div>
          <h1 className="text-xl font-extrabold text-gray-900">Self Entries / वर्कर एंट्रीज़</h1>
          <p className="text-gray-500 text-sm">Workers की submitted entries approve/reject करें</p>
        </div>
        {pendingCount > 0 && (
          <span className="bg-amber-100 text-amber-700 text-xs font-extrabold px-3 py-1.5 rounded-full border border-amber-200">
            {pendingCount} Pending
          </span>
        )}
      </div>

      {/* Filter Tabs */}
      <div className="flex bg-gray-100 rounded-2xl p-1 gap-0.5">
        {["pending","approved","rejected","all"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            className={"flex-1 py-2 rounded-xl text-xs font-bold transition relative" +
              (filter === f ?"bg-white text-gray-900 shadow-sm" :"text-gray-400")}>
            {f ==="all" ?"All" : statusMeta[f].label}
            {f ==="pending" && pendingCount > 0 && (
              <span className="absolute -top-1 -right-1 w-4 h-4 bg-amber-400 text-white text-[10px] font-black rounded-full flex items-center justify-center">
                {pendingCount}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* Entries List */}
      {filtered.length === 0 ? (
        <div className="text-center py-16 bg-white rounded-2xl border border-gray-100">
          <p className="text-gray-400 text-sm font-semibold">कोई entry नहीं</p>
          <p className="text-gray-300 text-xs mt-1">इस filter में कोई entry नहीं है</p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(e => {
            const m = statusMeta[e.status] || statusMeta.pending;
            return (
              <div key={e.id} className={`bg-white rounded-2xl border-2 ${m.border} overflow-hidden shadow-sm`}>
                {/* Status bar */}
                <div className={`h-1 ${e.status ==="approved" ?"bg-green-500" : e.status ==="rejected" ?"bg-rose-400" :"bg-amber-400"}`} />

                <div className="p-4 space-y-3">
                  {/* Top row — Worker + Status */}
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <p className="font-extrabold text-gray-900 text-sm">{e.workerName}</p>
                      <p className="text-gray-400 text-xs">{e.staffId} · {e.department}</p>
                    </div>
                    <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${m.bg} ${m.text}`}>
                      {m.label}
                    </span>
                  </div>

                  {/* Details row */}
                  <div className="grid grid-cols-3 gap-2 text-xs bg-gray-50 rounded-xl p-3">
                    <div>
                      <p className="text-gray-400 font-semibold">Date</p>
                      <p className="text-gray-900 font-extrabold">{e.date?.slice(5)}</p>
                    </div>
                    <div>
                      <p className="text-gray-400 font-semibold">Style</p>
                      <p className="text-gray-900 font-bold truncate">{e.style}</p>
                    </div>
                    <div>
                      <p className="text-gray-400 font-semibold">Operation</p>
                      <p className="text-blue-600 font-bold truncate">{e.operation}</p>
                    </div>
                  </div>

                  {/* Amount row */}
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="bg-orange-50 border border-orange-100 rounded-xl px-3 py-1.5 text-center">
                        <p className="text-orange-600 font-black text-base leading-none">{e.pieces}</p>
                        <p className="text-orange-300 text-[10px]">pcs</p>
                      </div>
                      <div>
                        <p className="text-gray-400 text-xs">@ ₹{(e.pieceRate||0).toFixed(2)}/pc</p>
                        <p className="text-green-600 font-extrabold text-sm">₹{(e.amount||0).toFixed(0)}</p>
                      </div>
                    </div>
                    {e.note && (
                      <p className="text-gray-400 text-xs italic max-w-[120px] truncate">"{e.note}"</p>
                    )}
                  </div>

                  {/* Action buttons — only for pending */}
                  {e.status ==="pending" && (
                    <div className="flex gap-2 pt-1 border-t border-gray-100">
                      <button onClick={() => updateStatus(e.id,"rejected")}
                        className="flex-1 py-2.5 rounded-xl border-2 border-rose-200 bg-rose-50 text-rose-600 text-xs font-extrabold active:scale-[0.98] transition">
                        ✕ Reject
                      </button>
                      <button onClick={() => updateStatus(e.id,"approved")}
                        className="flex-1 py-2.5 rounded-xl bg-green-500 text-white text-xs font-extrabold shadow-md shadow-green-200 active:scale-[0.98] transition">
                        ✓ Approve
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

const Dashboard = () => {
  const { user, sharedStyles, sharedEntries, sharedHourly, sharedWorkers } = useContext(AppContext);
  const [styleFilter, setStyleFilter] = useState("all");
  const [hourlyDept, setHourlyDept]   = useState("all");
  const [activeTab, setActiveTab]     = useState("active");
  const [kingPeriod, setKingPeriod]   = useState("daily"); // "daily" | "weekly" | "monthly"
  const isAdmin = user.role ==="admin";

  // Use real shared data
  const allEntries  = sharedEntries  || MOCK_DB.workEntries;
  const allHourly   = sharedHourly   || MOCK_DB.hourlyReports;
  const allWorkers  = sharedWorkers  || MOCK_DB.workers;

  // ── Department King Calculation ──────────────────────────────
  const deptKingData = (() => {
    const now   = new Date();
    const today = now.toISOString().split("T")[0];
    const dayOfWeek    = (now.getDay() + 6) % 7;
    const weekStart    = new Date(now); weekStart.setDate(now.getDate() - dayOfWeek);
    const weekStartStr = weekStart.toISOString().split("T")[0];
    const monthStartStr = today.slice(0,7) + "-01";

    const deptMap = {};
    MOCK_DB.departments.forEach(dept => {
      deptMap[dept.name] = {
        name:       dept.name,
        nameHindi:  dept.nameHindi,
        color:      dept.color,
        supervisor: dept.supervisor,
        pieces:     0,
        amount:     0,
        workers:    new Set(),
        target:     dept.dailyTarget * (kingPeriod==="daily" ? 1 : kingPeriod==="weekly" ? 5 : 22),
      };
    });

    allEntries.forEach(e => {
      if (!deptMap[e.department]) return;
      const eDate = e.date || "";
      const inRange =
        kingPeriod === "daily"   ? eDate === today :
        kingPeriod === "weekly"  ? eDate >= weekStartStr && eDate <= today :
        eDate >= monthStartStr && eDate <= today;
      if (!inRange) return;
      deptMap[e.department].pieces  += (+e.pieces || 0);
      deptMap[e.department].amount  += (+e.amount || 0);
      deptMap[e.department].workers.add(e.workerId);
    });

    return Object.values(deptMap)
      .sort((a, b) => b.pieces - a.pieces)
      .map((d, i) => ({ ...d, rank: i+1, workers: d.workers.size || Math.max(2, 4-i) }));
  })();

  // ── 1. Hourly grouped by dept ──
  const hourlyByDept = allHourly.reduce((acc, h) => {
    if (!acc[h.department]) acc[h.department] = { department: h.department, slots: [], totalPass: 0, totalAlter: 0, totalReject: 0, totalPieces: 0 };
    acc[h.department].slots.push(h);
    acc[h.department].totalPass    += h.pass;
    acc[h.department].totalAlter   += h.alter;
    acc[h.department].totalReject  += h.reject;
    acc[h.department].totalPieces  += h.total;
    return acc;
  }, {});
  const hourlyDepts   = Object.values(hourlyByDept);
  const filteredHourly = hourlyDept ==="all" ? hourlyDepts : hourlyDepts.filter(d => d.department === hourlyDept);

  // ── 2. Style-wise ──
  const styleReport = (sharedStyles||MOCK_DB.styles).map(style => {
    const entries       = allEntries.filter(e => e.styleId === style.id);
    const entryPieces   = entries.reduce((s, e) => s + (+e.pieces||0), 0);
    const entryAmount   = entries.reduce((s, e) => s + (+e.amount||0), 0);
    const uniqueWorkers = new Set(entries.map(e => e.workerId)).size;
    const deptBreakdown = entries.reduce((acc, e) => { acc[e.department] = (acc[e.department] || 0) + (+e.pieces||0); return acc; }, {});
    const pct = Math.round(((style.completedQty||entryPieces) / (style.totalQuantity||1)) * 100);
    return { ...style, entryPieces, entryAmount, uniqueWorkers, deptBreakdown, pct };
  });

  // ── 3. Today active/inactive ──
  const today = new Date().toISOString().split("T")[0];
  const todayActiveIds = new Set(allEntries.filter(e => e.date === today).map(e => e.workerId));
  const deptAttendance = MOCK_DB.departments.map(dept => {
    const ws      = allWorkers.filter(w => w.department === dept.name);
    const active   = ws.filter(w => todayActiveIds.has(w.id));
    const inactive = ws.filter(w => !todayActiveIds.has(w.id));
    return { ...dept, totalWorkers: ws.length, active, inactive };
  });
  const totalActive   = deptAttendance.reduce((s, d) => s + d.active.length, 0);
  const totalInactive = deptAttendance.reduce((s, d) => s + d.inactive.length, 0);

  const RANK_CROWN = [
    { color:"#F59E0B", glow:true,  size:40, label:"👑 King",  badge:"bg-amber-400", ring:"ring-amber-300",  shadow:"shadow-amber-200" },
    { color:"#94A3B8", glow:false, size:30, label:"🥈 2nd",   badge:"bg-slate-400",  ring:"ring-slate-200",  shadow:"shadow-slate-100" },
    { color:"#CD7C3A", glow:false, size:26, label:"🥉 3rd",   badge:"bg-orange-400", ring:"ring-orange-200", shadow:"shadow-orange-100" },
  ];

  return (
    <div className="space-y-6">

      {/* ══════════════════════════════════════
          DEPARTMENT KING 👑 LEADERBOARD
      ══════════════════════════════════════ */}
      <div className="space-y-3">
        {/* Header */}
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <CrownSvg size={28} color="#F59E0B" glow={true} />
            <div>
              <h2 className="text-gray-900 font-extrabold text-base leading-none">Department King</h2>
              <p className="text-gray-400 text-xs mt-0.5">सबसे ज्यादा production करने वाला विभाग</p>
            </div>
          </div>
          {/* Daily / Weekly / Monthly Toggle */}
          <div className="flex bg-gray-100 rounded-xl p-0.5">
            {[["daily","Daily"],["weekly","Weekly"],["monthly","Monthly"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>setKingPeriod(val)}
                className={`px-2.5 py-1.5 rounded-lg text-xs font-extrabold transition ${kingPeriod===val?"bg-white text-orange-600 shadow-sm":"text-gray-400"}`}>
                {lbl}
              </button>
            ))}
          </div>
        </div>

        {/* TOP 3 PODIUM — King + Runners */}
        <div className="flex items-end gap-2 px-1">
          {/* 2nd place — left */}
          {deptKingData[1] && (() => {
            const d = deptKingData[1];
            const rc = RANK_CROWN[1];
            return (
              <div className="flex-1 flex flex-col items-center gap-1.5">
                <CrownSvg size={rc.size} color={rc.color} />
                <div className={`w-full rounded-2xl border-2 border-slate-200 bg-white p-3 text-center shadow-sm ${rc.shadow}`}>
                  <div className="w-10 h-10 rounded-xl mx-auto mb-1.5 flex items-center justify-center text-white font-extrabold text-sm"
                    style={{background:d.color}}>{d.name.charAt(0)}</div>
                  <p className="text-gray-900 font-extrabold text-xs truncate">{d.name}</p>
                  <p className="text-gray-400 text-[10px] truncate">{d.nameHindi}</p>
                  <p className="text-slate-600 font-black text-base mt-1">{d.pieces.toLocaleString()}</p>
                  <p className="text-gray-400 text-[10px] font-semibold">pieces</p>
                  <div className="mt-1.5 bg-slate-50 border border-slate-200 rounded-full px-2 py-0.5">
                    <p className="text-slate-500 text-[10px] font-extrabold">2nd Place</p>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* 1st place — CENTER (tallest) */}
          {deptKingData[0] && (() => {
            const d = deptKingData[0];
            const rc = RANK_CROWN[0];
            return (
              <div className="flex-[1.3] flex flex-col items-center gap-1.5 -mb-2">

// Rule 7: Months that are closed/locked
let LOCKED_MONTHS = ["2023-12","2023-11","2023-10"];

const isDateLocked = (dateStr, userRole) => {
  if (!dateStr) return false;
  const [year, month] = dateStr.split("-");
  const key = `${year}-${month}`;
  if (LOCKED_MONTHS.includes(key)) return true;
  // Also lock entries older than current month for workers
  const entryDate = new Date(dateStr);
  const now = new Date();
  const entryMonth = entryDate.getFullYear() * 12 + entryDate.getMonth();
  const nowMonth = now.getFullYear() * 12 + now.getMonth();
  if (userRole ==="worker" && entryMonth < nowMonth) return true;
  return false;
};

// ── Monthly History Navigator ──
const MonthNavigator = ({ selectedMonth, setSelectedMonth }) => {
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [year, mon] = selectedMonth.split("-").map(Number);
  const label = `${MONTHS[mon-1]} ${year}`;
  const nowYM = new Date().toISOString().slice(0,7);
  const isCurrentMonth = selectedMonth === nowYM;

  const prev = () => {
    const d = new Date(year, mon-2, 1);
    setSelectedMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  };
  const next = () => {
    const d = new Date(year, mon, 1);
    const nextYM = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if (nextYM <= nowYM) setSelectedMonth(nextYM);
  };

  return (
    <div className="flex items-center justify-between bg-orange-50 border-2 border-orange-200 rounded-2xl px-4 py-3">
      <button onClick={prev}
        className="w-10 h-10 rounded-xl bg-white border-2 border-orange-200 flex items-center justify-center text-orange-600 font-black text-xl active:scale-95 transition shadow-sm">
        ‹
      </button>
      <div className="text-center">
        <p className="text-orange-600 font-extrabold text-base tracking-wide"><SvgIcon name="calendar" size={14} className="inline mr-1 text-orange-500" />{label}</p>
        {isCurrentMonth
          ? <p className="text-orange-400 text-xs font-semibold mt-0.5">Current Month</p>
          : <p className="text-gray-400 text-sm mt-0.5">History / पुराना डेटा</p>
        }
      </div>
      <button onClick={next} disabled={isCurrentMonth}
        className={`w-10 h-10 rounded-xl border-2 flex items-center justify-center font-black text-xl active:scale-95 transition shadow-sm
          ${isCurrentMonth ?"bg-gray-100 border-gray-200 text-gray-300 cursor-not-allowed" :"bg-white border-orange-200 text-orange-600"}`}>
        ›
      </button>
    </div>
  );
};

          <div className="w-16 h-16 mx-auto mb-3 rounded-2xl bg-red-100 flex items-center justify-center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#DC2626" strokeWidth="2"/><path d="M6 6l12 12M18 6 6 18" stroke="#DC2626" strokeWidth="2" strokeLinecap="round"/></svg></div>
          <p className="text-red-700 font-bold text-lg">Admin के पास Work Entry नहीं होगी</p>
          <p className="text-red-500 text-sm mt-1">Admin cannot create work entries.</p>
          <p className="text-gray-600 text-sm mt-3">सिर्फ <strong>Supervisor</strong> ही Work Entry कर सकता है।</p>
        </div>
      </div>
    );
  }

  // ── Balance calculation helpers ──
  const getOperationBalance = (styleId, operationId, excludeEntryId = null) => {
    // Cutting records se limit lo (dynamic — CUTTING_LIMITS nahi)
    const cuttingTotal = (sharedCuts||[])
      .filter(c => c.styleId === styleId)
      .reduce((s, c) => s + (+c.totalPieces || 0), 0);
    const limit = cuttingTotal > 0 ? cuttingTotal : 999999; // agar cutting nahi toh unlimited
    const used = entries
      .filter(e =>
        e.styleId === styleId &&
        e.operationId === operationId &&
        e.status !=="rejected" &&
        e.id !== excludeEntryId
      )
      .reduce((sum, e) => sum + e.pieces, 0);
    return { limit, used, balance: limit - used };
  };

  const getWorkerDailyBalance = (workerId, styleId, operationId, date, excludeId = null) => {
    const { balance: opBalance } = getOperationBalance(styleId, operationId, excludeId);
    const alreadyToday = entries
      .filter(e =>
        e.workerId === workerId &&
        e.styleId === styleId &&
        e.operationId === operationId &&
        e.date === date &&
        e.status !=="rejected" &&
        e.id !== excludeId
      )
      .reduce((sum, e) => sum + e.pieces, 0);
    return { opBalance, alreadyToday, canEnter: Math.max(0, opBalance - alreadyToday) };
  };

  // ── Validation on form submit ──
  const validate = (f, excludeId = null) => {
    if (!f.workerId || !f.styleId || !f.operationId || !f.pieces || !f.date)
      return"सभी fields भरना जरूरी है।";

    const qty = parseInt(f.pieces);
    if (isNaN(qty) || qty <= 0) return"Pieces 0 से ज्यादा होनी चाहिए।";

    // Rule 7 – Date Lock
    if (isDateLocked(f.date, user.role)) {
      const [y, m] = f.date.split("-");
      const monthName = new Date(+y, +m - 1).toLocaleString("en-IN", { month:"long", year:"numeric" });
      if (user.role !=="supervisor" && user.role !=="admin") {
        return `Date Locked! ${monthName} की entries बंद हो चुकी हैं। सिर्फ Supervisor edit कर सकता है।`;
      }
    }

    // Rule 6 – Duplicate entry check
    const dup = entries.find(e =>
      e.workerId === f.workerId &&
      e.styleId === f.styleId &&
      e.operationId === f.operationId &&
      e.date === f.date &&
      e.status !=="rejected" &&
      e.id !== excludeId
    );
    if (dup) return `Duplicate Entry! ${dup.workerName} की इस date पर इस operation की entry पहले से है।`;

    // Rule 1 – Style cutting limit
    const { limit: cLimit, balance: opBalance } = getOperationBalance(f.styleId, f.operationId, excludeId);
    if (cLimit < 999999 && qty > opBalance) {
      const style = (sharedStyles||MOCK_DB.styles).find(s => s.id === f.styleId);
      const op = (sharedOperations||MOCK_DB.operations).find(o => o.id === f.operationId);
      return `Quantity exceeds cutting quantity!\nStyle: ${style?.styleName} → ${op?.name}\nCutting Total: ${cLimit} | Already Done: ${cLimit - opBalance} | Balance: ${opBalance}`;
    }

    // Rule 5 – Daily worker entry limit
    const { canEnter } = getWorkerDailyBalance(f.workerId, f.styleId, f.operationId, f.date, excludeId);
    if (qty > canEnter) {
      const worker = (sharedWorkers||MOCK_DB.workers).find(w => w.id === f.workerId);
      return `Daily limit exceeded!\n${worker?.name} आज के लिए अधिकतम ${canEnter} pcs enter कर सकते हैं।`;
    }

    return null;
  };

  const handleSubmit = () => {
    const err = validate(form);
    if (err) { setError(err); return; }

    const worker = (sharedWorkers||MOCK_DB.workers).find(w => w.id === form.workerId);
    const style  = (sharedStyles||MOCK_DB.styles).find(s => s.id === form.styleId);
    const op     = (sharedOperations||MOCK_DB.operations).find(o => o.id === form.operationId);

    const newEntry = {
      id: `e${Date.now()}`,
      date: form.date,
      workerId: form.workerId,
      styleId: form.styleId,
      operationId: form.operationId,
      workerName: worker?.name || "",
      staffId: worker?.staffId || "",
      styleName: style?.styleName || "",
      operation: op?.name || "",
      pieces: parseInt(form.pieces),
      pieceRate: pieceRate,
      amount: autoAmount,
      department: worker?.department || "",
      status:"verified",
      enteredBy: user.name,
      notes: form.notes,
    };
    setEntries(prev => [newEntry, ...prev]);
    setShowModal(false);
    setForm(emptyForm);
    setError("");
    setSavedOk(true);
    setTimeout(() => setSavedOk(false), 3000);
  };

  const handleEdit = () => {
    const err = validate(form, editEntry.id);
    if (err) { setError(err); return; }
    const op = (sharedOperations||MOCK_DB.operations).find(o => o.id === form.operationId);
    setEntries(prev => prev.map(e => e.id === editEntry.id
      ? { ...e, pieces: parseInt(form.pieces), pieceRate, amount: autoAmount, notes: form.notes, operation: op?.name, operationId: form.operationId }
      : e
    ));
    setEditEntry(null);
    setShowModal(false);
    setForm(emptyForm);
    setError("");
    setSavedOk(true);
    setTimeout(() => setSavedOk(false), 3000);
  };

  const openEdit = (entry) => {
    setEditEntry(entry);
    setForm({ date: entry.date, workerId: entry.workerId ||"", styleId: entry.styleId ||"", operationId: entry.operationId ||"", pieces: String(entry.pieces), notes: entry.notes ||"" });
    setError("");
    setShowModal(true);
  };

  const deleteEntry = (id) => {
    if (window.confirm("क्या यह entry delete करना है?")) setEntries(prev => prev.filter(e => e.id !== id));
  };

  const todayEntries = entries.filter(e => e.date === new Date().toISOString().split("T")[0]);
  const todayPieces = todayEntries.reduce((s, e) => s + e.pieces, 0);
  const todayAmount = todayEntries.reduce((s, e) => s + e.amount, 0);
  const todayWorkers = new Set(todayEntries.map(e => e.workerId || e.workerName)).size;

  const filtered = entries
    .filter(e => e.date && e.date.startsWith(selectedMonth))
    .filter(e => filterStatus ==="all" || e.status === filterStatus)
    .filter(e =>
      !search ||
      e.workerName?.toLowerCase().includes(search.toLowerCase()) ||
      e.styleName?.toLowerCase().includes(search.toLowerCase()) ||
      e.operation?.toLowerCase().includes(search.toLowerCase())
    );

  // Balance table data — cutting records se dynamic limit
  const balanceRows = (sharedStyles||MOCK_DB.styles).filter(s => s.status ==="active").flatMap(style => {
    const cuttingTotal = (sharedCuts||[])
      .filter(c => c.styleId === style.id)
      .reduce((s, c) => s + (+c.totalPieces || 0), 0);
    if (!cuttingTotal) return [];
    return (sharedOperations||MOCK_DB.operations).map(op => {
      const { used, balance } = getOperationBalance(style.id, op.id);
      return { styleId: style.id, styleName: style.styleName, opName: op.name, limit: cuttingTotal, used, balance };
    });
  });

  const statusColor = { verified:"green", pending:"amber", rejected:"red" };
  const statusLabel = { verified:"Verified", pending:"Pending", rejected:"Rejected" };

  const currentBalance = (form.styleId && form.operationId && form.workerId && form.date)
    ? getWorkerDailyBalance(form.workerId, form.styleId, form.operationId, form.date, editEntry?.id)
    : null;

  return (
    <div className="space-y-5">
      {/* Success toast */}
      {savedOk && (
        <div className="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm flex items-center gap-2">
          ✓ Entry Successfully Saved!
        </div>
      )}

      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-extrabold text-gray-900">Work Entry / काम एंट्री</h1>
          <p className="text-gray-600 text-sm">Supervisor द्वारा daily verified entries</p>
        </div>
        <div className="flex gap-2">
          <Btn variant="secondary" size="sm" onClick={() => setShowBalanceModal(true)}>Balance</Btn>
          <Btn onClick={() => { setEditEntry(null); setForm(emptyForm); setError(""); setShowModal(true); }}>+ New Entry</Btn>
        </div>
      </div>

      {/* Rules info banner */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
        <p className="text-blue-800 text-xs font-semibold mb-1">Work Entry Rules Active:</p>
        <div className="flex flex-wrap gap-2">
          {["✓ Cutting limit check","✓ Duplicate block","✓ Daily limit","✓ Auto balance","✓ Auto amount"].map(r => (
            <span key={r} className="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-medium">{r}</span>
          ))}
        </div>
      </div>

      {/* Month Navigator */}
      <MonthNavigator selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth} />

      {/* Month Summary Cards */}
      <div className="grid grid-cols-3 gap-3">
        {[
          { label:"Month Pieces", value: filtered.reduce((s,e)=>s+e.pieces,0).toLocaleString(), color:"text-orange-500" },
          { label:"Month Amount", value: `₹${filtered.reduce((s,e)=>s+(e.amount||0),0).toFixed(0)}`, color:"text-green-600" },
          { label:"Total Entries", value: filtered.length, color:"text-blue-600" },
        ].map(s => (
          <div key={s.label} className="bg-white rounded-xl p-3 border-2 border-gray-100 text-center shadow-sm">
            <p className={`text-lg font-bold ${s.color}`}>{s.value}</p>
            <p className="text-gray-600 text-xs font-semibold mt-0.5">{s.label}</p>
          </div>
        ))}
      </div>

      {/* Department-wise Production Summary */}
      {filtered.length > 0 && (() => {
        const deptMap = {};
        filtered.forEach(e => {
          if (!deptMap[e.department]) deptMap[e.department] = { pieces: 0, amount: 0, entries: 0 };
          deptMap[e.department].pieces  += e.pieces;
          deptMap[e.department].amount  += e.amount || 0;
          deptMap[e.department].entries += 1;
        });
        const deptColors = { Stitching:"#3B82F6", Finishing:"#10B981", QC:"#F59E0B", Cutting:"#EF4444", Embroidery:"#8B5CF6" };
        return (
          <div className="bg-white rounded-2xl border-2 border-gray-100 shadow-sm overflow-hidden">
            <div className="bg-gray-800 px-4 py-2.5">
              <p className="text-white text-xs font-extrabold uppercase tracking-wide"><SvgIcon name="chart" size={12} className="inline mr-1 text-white opacity-70" />Department-wise Production</p>
            </div>
            {Object.entries(deptMap).map(([dept, data], i) => (
              <div key={dept} className={"flex items-center justify-between px-4 py-3 border-b border-gray-50 last:border-0" + (i%2===0?"bg-white":"bg-gray-50/40")}>
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full shrink-0" style={{background: deptColors[dept]||"#64748B"}} />
                  <div>
                    <p className="text-gray-900 font-bold text-sm">{dept}</p>
                    <p className="text-gray-400 text-xs">{data.entries} entries</p>
                  </div>
                </div>
                <div className="text-right">
                  <p className="text-orange-500 font-extrabold text-sm">{data.pieces.toLocaleString()} pcs</p>
                  <p className="text-green-600 font-bold text-xs">₹{data.amount.toFixed(0)}</p>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Today summary */}
      <div className="grid grid-cols-3 gap-3">
        {[
          { label:"Today Pieces", value: todayPieces.toLocaleString(), color:"text-orange-500" },
          { label:"Today Amount", value: `₹${todayAmount.toFixed(0)}`, color:"text-green-600" },
          { label:"Workers Active", value: todayWorkers, color:"text-blue-600" },
        ].map(s => (
          <div key={s.label} className="bg-white rounded-xl p-3 border-2 border-gray-100 text-center shadow-sm">
            <p className={`text-lg font-bold ${s.color}`}>{s.value}</p>
            <p className="text-gray-600 text-xs font-semibold mt-0.5">{s.label}</p>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div className="space-y-2">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/>
            <path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Worker, Style, Operation खोजें..."
            className="w-full pl-10 pr-9 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-2xl text-sm font-medium focus:outline-none focus:border-orange-400 transition"
            style={{fontSize:"16px"}}/>
          {search && <button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">✕</button>}
        </div>
        <div className="flex gap-2 flex-wrap">
          {[["all","All"],["verified","Verified"],["pending","Pending"],["rejected","Rejected"]].map(([k,l]) => (
            <button key={k} onClick={() => setFilterStatus(k)}
              className={`px-3 py-1.5 rounded-lg text-xs font-bold transition border ${filterStatus === k ?"bg-orange-500 text-white border-orange-500" :"bg-white text-gray-600 border-gray-200 hover:border-orange-300"}`}>
              {l} {k !=="all" && <span className="ml-1">({entries.filter(e => e.status === k).length})</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Entries list — Date | Style | Operation | Rate | Amount */}
      <div className="bg-white rounded-2xl border-2 border-gray-100 shadow-sm overflow-hidden">
        {/* Table header */}
        <div className="grid grid-cols-12 gap-1 bg-gray-800 px-3 py-2.5 text-xs font-extrabold text-white uppercase tracking-wide">
          <div className="col-span-2">Date</div>
          <div className="col-span-3">Style</div>
          <div className="col-span-3">Operation</div>
          <div className="col-span-2 text-right">Rate</div>
          <div className="col-span-2 text-right">Amount</div>
        </div>

        {filtered.length === 0 ? (
          <EmptyState icon="search" title="कोई entry नहीं मिली" subtitle="Filter बदलें या नई entry डालें"/>
        ) : filtered.map((e, idx) => {
          const locked = isDateLocked(e.date, user.role) && user.role !=="supervisor" && user.role !=="admin";
          const rowBg = idx % 2 === 0 ?"bg-white" :"bg-gray-50/60";
          const statusDot = { verified:"bg-green-500", pending:"bg-amber-400", rejected:"bg-rose-500" };
          return (
            <div key={e.id} className={`${rowBg} border-b border-gray-100 last:border-0 ${e.status ==="rejected" ?"opacity-60" :""}`}>
              <div className="grid grid-cols-12 gap-1 px-3 py-2.5 items-center">
                {/* Date */}
                <div className="col-span-2 min-w-0">
                  <p className="text-gray-800 font-bold text-[10px] leading-tight">{e.date?.slice(5)}</p>
                  <p className="text-gray-400 text-[10px]">{e.date?.slice(0,4)}</p>
                </div>
                {/* Style */}
                <div className="col-span-3 min-w-0">
                  <p className="text-gray-900 font-semibold text-[10px] truncate leading-tight">{e.styleName}</p>
                  <p className="text-orange-500 text-[10px] font-bold">{e.pieces} pcs</p>
                </div>
                {/* Operation */}
                <div className="col-span-3 min-w-0">
                  <span className="text-[10px] font-semibold bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded-md leading-tight block truncate">{e.operation}</span>
                  <p className="text-gray-400 text-[10px] mt-0.5">{e.department}</p>
                </div>
                {/* Rate */}
                <div className="col-span-2 text-right">
                  <p className="text-gray-700 font-bold text-[10px]">&#8377;{(e.pieceRate||0).toFixed(2)}</p>
                  <p className="text-gray-400 text-[10px]">per pc</p>
                </div>
                {/* Amount */}
                <div className="col-span-2 text-right">
                  <p className="text-green-600 font-extrabold text-xs">&#8377;{(e.amount||0).toFixed(0)}</p>
                  {e.status !=="rejected" && !locked ? (
                    <div className="flex gap-1 justify-end mt-0.5">
                      <button onClick={() => openEdit(e)} className="text-[10px] font-bold text-blue-500 active:opacity-70">Edit</button>
                      <span className="text-gray-300 text-[10px]">·</span>
                      <button onClick={() => deleteEntry(e.id)} className="text-[10px] font-bold text-red-400 active:opacity-70">Del</button>
                    </div>
                  ) : locked ? (
                    <p className="text-gray-400 text-[10px]">Locked</p>
                  ) : (
                    <p className="text-red-400 text-[10px]">Rejected</p>
                  )}
                </div>
              </div>
              {/* Status strip */}
              <div className="px-3 pb-2 flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full shrink-0 ${statusDot[e.status] ||"bg-gray-400"}`} />
                <span className={`text-[10px] font-bold ${e.status ==="verified" ?"text-green-600" : e.status ==="pending" ?"text-amber-600" :"text-red-500"}`}>
                  {statusLabel[e.status] || e.status}
                </span>
                {e.notes && <>
                  <span className="text-gray-300 text-[10px]">•</span>
                  <span className="text-gray-400 text-[10px] italic truncate max-w-[120px]">"{e.notes}"</span>
                </>}
              </div>
            </div>
          );
        })}

        {/* Footer total */}
        {filtered.length > 0 && (
          <div className="bg-gray-800 px-3 py-2.5 flex items-center justify-between">
            <span className="text-white text-xs font-bold">कुल — {filtered.length} entries</span>
            <span className="text-green-400 font-extrabold text-sm">
              &#8377;{filtered.reduce((s, e) => s + (e.amount||0), 0).toFixed(0)}
            </span>
          </div>
        )}
      </div>

      {/* ── NEW / EDIT ENTRY MODAL ── */}
      <Modal open={showModal} onClose={() => { setShowModal(false); setEditEntry(null); setError(""); }} title={editEntry ?"Entry Edit करें" :"New Work Entry / नई एंट्री"} size="md">
        <div className="space-y-4">

          {error && (
            <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3">
              <p className="text-red-700 font-bold text-sm whitespace-pre-line">{error}</p>
            </div>
          )}

          <div>
            <Input label="Date / तारीख" type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
            {isDateLocked(form.date, user.role) && (
              <div className="mt-1.5 flex items-center gap-2 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" className="inline"><rect x="4" y="9" width="12" height="9" rx="2" stroke="#F97316" strokeWidth="1.5"/><path d="M7 9V6a3 3 0 0 1 6 0v3" stroke="#F97316" strokeWidth="1.5" strokeLinecap="round"/></svg>
                <div>
                  <p className="text-red-700 font-bold text-xs">Month Locked / बंद महीना</p>
                  <p className="text-red-500 text-xs">{user.role ==="supervisor" || user.role ==="admin" ?"Supervisor होने के नाते आप edit कर सकते हैं।" :"सिर्फ Supervisor edit कर सकता है।"}</p>
                </div>
              </div>
            )}
          </div>

          <Select label="Worker / कर्मचारी" value={form.workerId} onChange={e => setForm({ ...form, workerId: e.target.value })}>
            <option value="">— Worker चुनें —</option>
            {(sharedWorkers||MOCK_DB.workers).filter(w => w.status ==="active").map(w => (
              <option key={w.id} value={w.id}>{w.name} ({w.staffId}) — {w.department}</option>
            ))}
          </Select>

          <Select label="Style / स्टाइल" value={form.styleId} onChange={e => setForm({ ...form, styleId: e.target.value })}>
            <option value="">— Style चुनें —</option>
            {(sharedStyles||MOCK_DB.styles).filter(s => s.status ==="active").map(s => (
              <option key={s.id} value={s.id}>{s.styleName} ({s.styleNumber}) — Cutting: {s.totalQuantity}</option>
            ))}
          </Select>

          <Select label="Operation / काम" value={form.operationId} onChange={e => setForm({ ...form, operationId: e.target.value })}>
            <option value="">— Operation चुनें —</option>
            {(sharedOperations||MOCK_DB.operations).map(o => (
              <option key={o.id} value={o.id}>{o.name} ({o.nameHindi||o.name}) — ₹{o.pieceRate}/pc</option>
            ))}
          </Select>

          {/* Live balance card */}
          {currentBalance && (
            <div className={`rounded-xl border-2 p-3 ${currentBalance.canEnter === 0 ?"bg-red-50 border-red-300" : currentBalance.canEnter < 50 ?"bg-amber-50 border-amber-300" :"bg-green-50 border-green-200"}`}>
              <p className="text-xs font-bold text-gray-700 mb-1.5">Live Balance (Rule Check)</p>
              <div className="grid grid-cols-3 gap-2 text-center">
                <div>
                  <p className="text-gray-900 font-bold">{currentBalance.opBalance}</p>
                  <p className="text-gray-500 text-xs">Op Balance</p>
                </div>
                <div>
                  <p className="text-orange-600 font-bold">{currentBalance.alreadyToday}</p>
                  <p className="text-gray-500 text-xs">Today Done</p>
                </div>
                <div>
                  <p className={`font-bold ${currentBalance.canEnter === 0 ?"text-red-600" :"text-green-600"}`}>{currentBalance.canEnter}</p>
                  <p className="text-gray-500 text-xs">Can Enter</p>
                </div>
              </div>
              {currentBalance.canEnter === 0 && <p className="text-red-600 text-xs font-bold mt-1.5 text-center">Entry not allowed — limit reached!</p>}
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div>
              <Input label="Pieces / पीस" type="number" min="1"
                max={currentBalance?.canEnter ||""}
                value={form.pieces}
                onChange={e => setForm({ ...form, pieces: e.target.value })}
                placeholder={currentBalance ? `Max: ${currentBalance.canEnter}` :"0"} />
            </div>
            <div>

const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmtD = d => d.toISOString().split("T")[0];

const getPaymentPeriod = (lock) => {
  if (!lock || !lock.active || lock.type ==="none") return null;
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth();
  if (lock.type ==="monthly") {
    const start = new Date(y, m, 1), end = new Date(y, m + 1, 0);
    return { start: fmtD(start), end: fmtD(end), label: `${MONTH_NAMES[m]} ${y} (Monthly)` };
  }
  if (lock.type ==="15day") {
    const day = today.getDate();
    if (day <= 15) {
      return { start: fmtD(new Date(y,m,1)), end: fmtD(new Date(y,m,15)), label: `1–15 ${MONTH_NAMES[m]} (15-Day)` };
    } else {
      return { start: fmtD(new Date(y,m,16)), end: fmtD(new Date(y,m+1,0)), label: `16–End ${MONTH_NAMES[m]} (15-Day)` };
    }
  }
  if (lock.type ==="weekly") {
    const dow = today.getDay();
    const mondayOff = dow === 0 ? -6 : 1 - dow;
    const mon = new Date(today); mon.setDate(today.getDate() + mondayOff);
    const sun = new Date(mon);   sun.setDate(mon.getDate() + 6);
    return { start: fmtD(mon), end: fmtD(sun), label: `${fmtD(mon)} → ${fmtD(sun)} (Weekly)` };
  }
  return null;
};

                          </div>
                          <div className="min-w-0">
                            <p className="text-gray-900 font-bold text-sm truncate">{w.name}</p>
                            <p className="text-gray-400 text-xs">{w.staffId}</p>
                          </div>
                        </div>
                        <span className={`${cfg.bg} ${cfg.text} text-xs font-extrabold px-2.5 py-1 rounded-lg flex items-center gap-1.5 shrink-0`}>
                          <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}/>
                          {cfg.label}
                        </span>
                      </div>
                    );
                  })}
                  {deptWorkers.length === 0 && (
                    <p className="text-center text-gray-400 text-sm py-3">इस department में कोई worker नहीं</p>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

    { id:"we4", styleId:"sf3", workerName:"Geeta Rani",   staffId:"SG005", process:"Stitching", quantity: 95,  date:"2024-01-15", status:"pending",  amount: 950  },
  ]);

  const [pendingCuttingStyle, setPendingCuttingStyle] = useState(null);
  const { sharedActions: sAct, adminCuttings, setAdminCuttings } = useContext(AppContext);

    const existing = adminCuttings || [];
    const max = existing.reduce((m, c) => {
      const n = parseInt((c.cuttingNo||"").replace("CUT-","")) || 0;
      return Math.max(m, n);

    return "CUT-" + String(max + 1).padStart(3, "0");

  const emptyCutForm = { cuttingNo:"", fabricType:"", totalQty:"", sizeBreakdown:"S/M/L/XL", cuttingDate: new Date().toISOString().split("T")[0], completionDate:"" };

  const [cutErr2, setCutErr2] = useState("");

  const emptyProcess = { name:"Stitching", pieceRate:"" };
  const [processForm, setProcessForm] = useState(emptyProcess);

  // ── Card-level 3 action modals ──
  const [cardActionStyle, setCardActionStyle] = useState(null); // which style's card button was tapped
  const [showOpsToggle,   setShowOpsToggle]   = useState(false); // Add Operations modal
  const [showCardCutting, setShowCardCutting] = useState(false); // Add Cutting modal
  const [showCuttingMgmt, setShowCuttingMgmt] = useState(false); // Cutting management screen
  const [assignSupCutId, setAssignSupCutId]   = useState(null);  // which cutting to assign
  const [showProdReport,  setShowProdReport]  = useState(false); // Production Report modal
  const [cardCutForm, setCardCutForm] = useState({ fabricType:"", marker:"", cuttingDate: new Date().toISOString().split("T")[0], completionDate:"", sizes:[{size:"",bundles:"",pcsPerBundle:""}] });
  const [cardCutErr, setCardCutErr] = useState("");

  const cardSizeTotal = (r) => (parseInt(r.bundles)||0) * (parseInt(r.pcsPerBundle)||0);
  const cardGrandTotal   = cardCutForm.sizes.reduce((s,r)=>s+cardSizeTotal(r),0);
  const cardGrandBundles = cardCutForm.sizes.reduce((s,r)=>s+(parseInt(r.bundles)||0),0);

  const updateCardSize = (idx, field, val) =>
    setCardCutForm(f=>({
      ...f,
      sizes: f.sizes.map((r,i)=>{
        if (i===idx) return {...r,[field]:val};
        if (idx===0 && (field==="bundles"||field==="pcsPerBundle")) return {...r,[field]:val};
        return r;
      })
    }));

  const SIZE_PRESETS_CARD = {
    standard:['XS','S','M','L','XL','XXL','XXXL'],
    waist:   ['28','30','32','34','36','38','40','42'],
    kids:    ['2Y','4Y','6Y','8Y','10Y','12Y','14Y'],
    kurta:   ['36','38','40','42','44','46','48'],
  };
  const autoFillCardSizes = (styleName) => {
    const n=(styleName||'').toLowerCase();
    let preset;
    if (/kid|child|boy|girl|toddler/.test(n)) preset=SIZE_PRESETS_CARD.kids;
    else if (/jean|denim|trouser|pant/.test(n)) preset=SIZE_PRESETS_CARD.waist;
    else if (/kurta|kurti|salwar|ethnic/.test(n)) preset=SIZE_PRESETS_CARD.kurta;
    else preset=SIZE_PRESETS_CARD.standard;
    setCardCutForm(f=>({...f, sizes: preset.map(size=>({size,bundles:"",pcsPerBundle:""})) }));
  };

  const emptyEntry = { workerName:"", staffId:"", process:"", quantity:"", date: new Date().toISOString().split("T")[0] };
  const [entryForm, setEntryForm]   = useState(emptyEntry);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

  // ── Style CRUD ──
  const addStyle = () => {
    if (!styleForm.styleCode || !styleForm.styleName || !styleForm.buyerName || !styleForm.orderQuantity || !styleForm.deliveryDate) {
      setError("सभी fields भरना जरूरी है।"); return;
    }
    if (+styleForm.orderQuantity <= 0) { setError("Order quantity 0 से ज्यादा होनी चाहिए।"); return; }
    if (files.find(f => f.styleCode === styleForm.styleCode)) { setError("Style Code already exists!"); return; }
    const newFile = { ...styleForm, id:"sf" + Date.now(), orderQuantity: +styleForm.orderQuantity, processes: [] };
    setFiles([newFile, ...files]);
    // Supervisor/worker panels mein bhi sync karo
    if (sharedActions?.addStyle) sharedActions.addStyle({
      id: newFile.id,
      styleNumber: newFile.styleCode,
      styleName: newFile.styleName,
      buyer: newFile.buyerName,
      totalQuantity: newFile.orderQuantity,
      completedQty: 0,
      status: "active",
      targetDate: newFile.deliveryDate,
    });
    setShowStyleModal(false);
    setStyleForm(emptyStyleForm);
    setError("");
    flash("Style File created!");
  };

  const updateStatus = (id, status) => {
    setFiles(files.map(f => f.id === id ? { ...f, status } : f));
    if (selected?.id === id) setSelected(prev => ({ ...prev, status }));
  };

  // ── Process CRUD ──
  const addProcess = () => {
    if (!processForm.name || !processForm.pieceRate || +processForm.pieceRate <= 0) {
      setError("Process name और piece rate भरें।"); return;
    }
    const updated = files.map(f => f.id === selected.id
      ? { ...f, processes: [...f.processes, { id:"p" + Date.now(), name: processForm.name, pieceRate: +processForm.pieceRate }] }
      : f
    );
    setFiles(updated);
    setSelected(updated.find(f => f.id === selected.id));
    setShowProcessModal(false);
    setProcessForm(emptyProcess);
    setError("");
    flash("Process added!");
  };

  const deleteProcess = (pid) => {
    const updated = files.map(f => f.id === selected.id
      ? { ...f, processes: f.processes.filter(p => p.id !== pid) }
      : f
    );
    setFiles(updated);
    setSelected(updated.find(f => f.id === selected.id));
  };

  // ── Work Entry ──
  const addEntry = () => {
    if (!entryForm.workerName || !entryForm.process || !entryForm.quantity || !entryForm.date) {
      setError("सभी fields भरना जरूरी है।"); return;

    if (selected.status ==="Closed") { setError("Closed style में entry नहीं हो सकती।"); return; }
    const qty = +entryForm.quantity;
    if (qty <= 0) { setError("Quantity 0 से ज्यादा होनी चाहिए।"); return; }

    // Duplicate check
    const dup = allEntries.find(e =>
      e.styleId === selected.id &&
      e.workerName === entryForm.workerName &&
      e.process === entryForm.process &&
      e.date === entryForm.date &&
      e.status !=="rejected"
    );
    if (dup) { setError("Duplicate entry! Same worker, same process, same date."); return; }

    // Quantity check
    const totalDone = allEntries.filter(e => e.styleId === selected.id && e.status ==="approved").reduce((s, e) => s + e.quantity, 0);
    if (totalDone + qty > selected.orderQuantity) {
      setError("Order quantity exceed हो जाएगी! Remaining:" + (selected.orderQuantity - totalDone)); return;

    const proc = selected.processes.find(p => p.name === entryForm.process);
    const amount = qty * (proc?.pieceRate || 0);
    const newEntry = {
      id:"we" + Date.now(), styleId: selected.id,
      workerName: entryForm.workerName, staffId: entryForm.staffId,
      process: entryForm.process, quantity: qty,
      date: entryForm.date, status:"pending", amount,

    setShowEntryModal(false);
    setEntryForm(emptyEntry);
    setError("");
    flash("Entry submitted!");

  // ── Derived ──
  const filtered = files

  const { paged: pagedStyles, page: sfPage, setPage: setSfPage, totalPages: sfTotalPages, total: sfTotal, pageSize: sfPageSize } = usePagination(filtered, 15);

  const styleEntries = selected ? allEntries.filter(e => e.styleId === selected.id) : [];

  // Payment summary per worker
  const paymentByWorker = approvedEntries.reduce((acc, e) => {
    if (!acc[e.workerName]) acc[e.workerName] = { workerName: e.workerName, staffId: e.staffId, pieces: 0, amount: 0 };
    acc[e.workerName].pieces += e.quantity;
    acc[e.workerName].amount += e.amount;
    return acc;
  }, {});

  // ── DETAIL VIEW ──
  if (view ==="detail" && selected) {

      <div className="space-y-4">

        {/* Back + title */}

            <span className="font-bold text-orange-500">{progress}%</span>
            <span>{selected.orderQuantity.toLocaleString()} ordered</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-2.5">
            <div className="h-2.5 rounded-full transition-all" style={{ width: progress +"%", background: progress === 100 ?"#10B981" :"#F97316" }} />
          </div>
        </div>

        <div className="flex gap-2 overflow-x-auto pb-1">
          {[["info","Info"],["processes","Processes"],["entries","Entries"],["payment","Payment"]].map(([k, l]) => (
            <button key={k} onClick={() => setDetailTab(k)}
              className={"px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap border transition" +

        {/* TAB: INFO */}
        {detailTab ==="info" && (

              ["Buyer",           selected.buyerName],
              ["Fabric Type",     selected.fabricType],
              ["Color",           selected.color],
              ["Size Range",      selected.sizeRange],
              ["Order Quantity",  selected.orderQuantity.toLocaleString() +" pcs"],

                <p className="text-sm font-semibold">No processes yet</p>

                  <span className="text-center text-green-600 font-extrabold text-sm">Rs {p.pieceRate}/pc</span>
                  <div className="text-right">
                    <button onClick={() => deleteProcess(p.id)} className="text-red-400 hover:text-red-600 text-xs font-bold">Remove</button>

            <Modal open={showProcessModal} onClose={() => { setShowProcessModal(false); setError(""); }} title="Add Process">
              <div className="space-y-4">
                {error && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm font-semibold">{error}</div>}

                  {PROCESS_OPTIONS.map(p => <option key={p}>{p}</option>)}

                      {e.status}
