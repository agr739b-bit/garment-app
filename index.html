                    {/* Info */}
                    <div className="flex-1 min-w-0">
                      <p className="text-gray-900 font-extrabold text-xs truncate">{w.name}</p>
                      <p className="text-gray-400 text-[10px]">{w.staffId} · {w.department}</p>
                    </div>

                    {/* 3-button toggle: P / - / A */}
                    <div className="flex gap-1 shrink-0">
                      {[
                        { s:"present", label:"P", activeC:"bg-green-500 text-white", inactiveC:"bg-gray-100 text-gray-400" },
                        { s:"none",    label:"—", activeC:"bg-gray-300 text-gray-600", inactiveC:"bg-gray-100 text-gray-300" },
                        { s:"absent",  label:"A", activeC:"bg-red-500 text-white",   inactiveC:"bg-gray-100 text-gray-400" },
                      ].map(btn => (
                        <button key={btn.s} onClick={() => mark(w.id, btn.s)}
                          className={`w-7 h-7 rounded-lg text-xs font-black transition active:scale-90 ${
                            status === btn.s ? btn.activeC : btn.inactiveC
                          }`}>
                          {btn.label}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Save Button — compact */}
        <button onClick={handleSave}
          className="w-full bg-green-500 active:bg-green-600 text-white font-extrabold text-sm py-3 rounded-2xl shadow-md shadow-green-200 active:scale-[0.98] transition flex items-center justify-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Save ({presentCount}/{myTeam.length} Present)
        </button>
      </div>
    );
  };

  // ── TAB CONFIG — filtered by permissions ──
  const ALL_TABS = [
    { id:"hourly",       label:"Hourly",     show: perms.canViewHourly,
      icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.7" fill="none"/><path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },
    { id:"cutting",      label:"Cutting",    show: perms.canViewCutting,
      icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="3" stroke="currentColor" strokeWidth="1.7"/><circle cx="6" cy="18" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },
    { id:"attendance",   label:"Attendance", show: true,
      icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/><rect x="3" y="4" width="13" height="16" rx="2" stroke="currentColor" strokeWidth="1.7" fill="none"/><path d="M7 8h6M7 12h4" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },
    { id:"entries",      label:"Entries",    show: perms.canViewEntries,
      icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3L22 4" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },
    { id:"profile",      label:"Profile",    show: true,
      icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="1.7" fill="none"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" fill="none"/></svg> },
  ];
  const TABS = ALL_TABS.filter(t => t.show);

  const TAB_COLORS = { cutting:"text-red-500", team:"text-blue-500", attendance:"text-green-600", entries:"text-green-600", hourly:"text-amber-500", jobs:"text-indigo-500", profile:"text-purple-500" };
  const TAB_DOT    = { cutting:"bg-red-500",   team:"bg-blue-500",   attendance:"bg-green-500",   entries:"bg-green-500",   hourly:"bg-amber-500",   jobs:"bg-indigo-500",   profile:"bg-purple-500"  };

  return (
    <div className="min-h-screen bg-gray-50" style={{fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>

      <main className="max-w-lg mx-auto">
        {tab==="cutting"      && <CuttingTab/>}
        {tab==="team"         && <TeamTab/>}
        {tab==="attendance"   && <AttendanceTab/>}
        {tab==="entries"      && <WorkEntriesTab/>}
        {tab==="hourly"       && <HourlyTab/>}
        {tab==="profile"      && <ProfileTab/>}
      </main>

      {/* Bottom Nav — stays below keyboard using env(safe-area-inset-bottom) */}
      <nav className="fixed bottom-0 left-0 right-0 z-30 bg-white border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]" style={{paddingBottom:"env(safe-area-inset-bottom)"}}>


        <div className="flex max-w-lg mx-auto">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>{ setTab(t.id); setSelectedWorker(null); }}
              className={"flex-1 flex flex-col items-center py-3 gap-0.5 transition " + (tab===t.id ? TAB_COLORS[t.id] : "text-gray-400")}>
              {/* Hourly button pe pass% badge */}
              <div className={`relative ${tab===t.id?"scale-110 transition-transform":""}`}>
                {t.icon}
              </div>
              <span className="text-xs font-bold">{t.label}</span>
              {tab===t.id && <div className={"w-4 h-0.5 rounded-full mt-0.5 " + TAB_DOT[t.id]}/>}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
};

// TODAY MY STAFF — Admin Attendance + Work Summary
// ══════════════════════════════════════════
const TodayMyStaff = () => {
  const { user, sharedWorkers, sharedEntries } = useContext(AppContext);
  const toast = useToast();
  const TODAY_DATE = new Date().toISOString().split("T")[0];

  // ── VIEW STATE ──
  const [view, setView]           = useState("attendance"); // "attendance" | "work" | "history"
  const [selDate, setSelDate]     = useState(TODAY_DATE);
  const [deptFilter, setDeptFilter] = useState("all");
  const [searchQ, setSearchQ]     = useState("");

  // ── ATTENDANCE STATE ──
  const [attendance, setAttendance] = useState(() => {
    const init = {};
    (sharedWorkers||MOCK_DB.workers).forEach(w => {
      const rand = (w.id.charCodeAt(1) + 7) % 10;
      init[w.id] = rand < 7 ? "present" : rand < 9 ? "absent" : "half";
    });
    return init;
  });
  const [savedDates, setSavedDates] = useState({ [TODAY_DATE]: false });
  const [bulkNote, setBulkNote]     = useState("");

  // ── HISTORY STATE ──
  const [histWorker, setHistWorker]   = useState((sharedWorkers||MOCK_DB.workers)[0]?.id || "");
  const [histMonth, setHistMonth]     = useState(TODAY_DATE.slice(0,7));

  const DEPT_COLOR = { Stitching:"#3B82F6", Finishing:"#10B981", QC:"#F59E0B", Cutting:"#EF4444", Embroidery:"#8B5CF6" };
  const STATUS_CFG = {
    present: { label:"P", full:"Present",  bg:"bg-green-500",  text:"text-white",    ring:"ring-green-400",  dot:"bg-green-500",  light:"bg-green-50 border-green-200 text-green-700" },
    absent:  { label:"A", full:"Absent",   bg:"bg-red-500",    text:"text-white",    ring:"ring-red-400",    dot:"bg-red-500",    light:"bg-red-50 border-red-200 text-red-600" },
    half:    { label:"H", full:"Half Day", bg:"bg-amber-400",  text:"text-white",    ring:"ring-amber-400",  dot:"bg-amber-400",  light:"bg-amber-50 border-amber-200 text-amber-700" },
    leave:   { label:"L", full:"Leave",    bg:"bg-blue-400",   text:"text-white",    ring:"ring-blue-400",   dot:"bg-blue-400",   light:"bg-blue-50 border-blue-200 text-blue-700" },
    none:    { label:"—", full:"Unmarked", bg:"bg-gray-200",   text:"text-gray-500", ring:"ring-gray-300",   dot:"bg-gray-300",   light:"bg-gray-50 border-gray-200 text-gray-500" },
  };
  const depts = ["all", ...new Set((sharedWorkers||MOCK_DB.workers).map(w => w.department))];

  const allWorkers = sharedWorkers || MOCK_DB.workers;
  const filtered = allWorkers
    .filter(w => deptFilter === "all" || w.department === deptFilter)
    .filter(w => !searchQ || w.name.toLowerCase().includes(searchQ.toLowerCase()) || w.staffId.toLowerCase().includes(searchQ.toLowerCase()));

  // ── Stats ──
  const presentCount  = allWorkers.filter(w => attendance[w.id] === "present").length;
  const absentCount   = allWorkers.filter(w => attendance[w.id] === "absent").length;
  const halfCount     = allWorkers.filter(w => attendance[w.id] === "half").length;
  const leaveCount    = allWorkers.filter(w => attendance[w.id] === "leave").length;
  const unmarkedCount = allWorkers.filter(w => !attendance[w.id] || attendance[w.id] === "none").length;
  const attendanceRate = allWorkers.length > 0
    ? Math.round(((presentCount + halfCount * 0.5) / allWorkers.length) * 100)
    : 0;

  // ── Actions ──
  const mark = (wId, status) => setAttendance(prev => ({ ...prev, [wId]: status }));
  const markAll = (status) => {
    const u = {};
    filtered.forEach(w => { u[w.id] = status; });
    setAttendance(prev => ({ ...prev, ...u }));
  };
  const handleSave = () => {
    setSavedDates(prev => ({ ...prev, [selDate]: true }));
    toast(`✅ ${selDate} की attendance save हो गई! (${presentCount}P / ${absentCount}A)`, "success");
  };

  // ── HISTORY HELPERS ──
  const [hYr, hMn] = histMonth.split("-").map(Number);
  const hDays       = new Date(hYr, hMn, 0).getDate();
  const hFirstDay   = new Date(hYr, hMn - 1, 1).getDay();
  const hMonthLabel = new Date(hYr, hMn - 1, 1).toLocaleString("default", { month:"long", year:"numeric" });
  const hHistory    = MOCK_ATTENDANCE_HISTORY[`${histWorker}_${histMonth}`] || {};
  const hCounts     = { present:0, absent:0, half:0, leave:0, holiday:0, none:0 };
  for (let d = 1; d <= hDays; d++) {
    const ds = `${histMonth}-${String(d).padStart(2,"0")}`;
    const st = hHistory[ds] || "none";
    hCounts[st] = (hCounts[st]||0)+1;
  }
  const hWorkDays = hDays - hCounts.holiday - hCounts.none;
  const hRate     = hWorkDays > 0 ? Math.round(((hCounts.present + hCounts.half*0.5) / hWorkDays) * 100) : 0;

  const goPrevMonth = () => {
    const d = new Date(hYr, hMn - 2, 1);
    setHistMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  };
  const goNextMonth = () => {
    const d = new Date(hYr, hMn, 1);
    const nm = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if (nm <= TODAY_DATE.slice(0,7)) setHistMonth(nm);
  };

  // ── WORK SUMMARY ──
  const allEntries = MOCK_DB.workEntries;
  const todayStaff = allWorkers.map(w => {
    const wEntries = allEntries.filter(e => e.workerId === w.id);
    return { ...w, entries: wEntries.length, pieces: wEntries.reduce((s,e)=>s+(+e.pieces||0),0), amount: wEntries.reduce((s,e)=>s+(+e.amount||0),0) };
  });
  const filteredWork = todayStaff
    .filter(w => deptFilter === "all" || w.department === deptFilter)
    .filter(w => !searchQ || w.name.toLowerCase().includes(searchQ.toLowerCase()) || w.staffId.toLowerCase().includes(searchQ.toLowerCase()));

  // ── TAB BAR ──

              { label:"Total Pieces",   value:filteredWork.reduce((s,w)=>s+w.pieces,0).toLocaleString(), color:"text-blue-600", bg:"bg-blue-50 border-blue-100" },
              { label:"Total Amount",   value:"₹"+Math.round(filteredWork.reduce((s,w)=>s+w.amount,0)).toLocaleString(), color:"text-green-600", bg:"bg-green-50 border-green-100" },

              <div key={s.label} className={`border-2 rounded-2xl p-3 text-center ${s.bg}`}>

              </div>

                        <p className="text-gray-900 font-extrabold text-sm">₹{Math.round(w.amount).toLocaleString()}</p>
                        <p className="text-gray-400 text-xs">{w.pieces} pcs</p>

                      <span className="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-full">No entry</span>

        <div className="space-y-4">

              </button>
              <div className="text-center">
                <p className="text-gray-900 font-extrabold text-base">{hMonthLabel}</p>
                <p className="text-gray-400 text-xs mt-0.5">Monthly History</p>
              </div>
              <button onClick={goNextMonth} disabled={histMonth >= TODAY_DATE.slice(0,7)}
                className={`w-9 h-9 rounded-xl border flex items-center justify-center active:scale-95 transition ${histMonth < TODAY_DATE.slice(0,7) ? "bg-gray-50 border-gray-200 text-gray-600" : "opacity-30 cursor-not-allowed bg-gray-50 border-gray-200 text-gray-400"}`}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>

              {(sharedWorkers||MOCK_DB.workers).map(w => (
                <option key={w.id} value={w.id}>{w.name} — {w.staffId} ({w.department})</option>
              ))}
            </select>

                  stroke={hRate>=90?"#10b981":hRate>=75?"#f59e0b":"#ef4444"}

                  strokeDasharray={`${(hRate/100)*87.96} 87.96`}
                  strokeLinecap="round"/>
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-sm font-black text-gray-800">{hRate}%</span>
              </div>
            </div>
            <div className="flex-1">
              <p className="text-gray-900 font-extrabold text-sm">{MOCK_DB.workers.find(w=>w.id===histWorker)?.name}</p>
              <p className="text-gray-400 text-xs mt-0.5">{hWorkDays} working days</p>
              <div className="flex flex-wrap gap-1.5 mt-2">
                <span className="bg-green-50 border border-green-200 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full">{hCounts.present}P</span>
                <span className="bg-red-50 border border-red-200 text-red-600 text-[10px] font-bold px-2 py-0.5 rounded-full">{hCounts.absent}A</span>
                <span className="bg-amber-50 border border-amber-200 text-amber-700 text-[10px] font-bold px-2 py-0.5 rounded-full">{hCounts.half}H</span>
                <span className="bg-blue-50 border border-blue-200 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full">{hCounts.leave}L</span>
              </div>
            </div>
          </div>

          {/* Legend */}
          <div className="flex gap-3 flex-wrap px-1">
            {[{label:"Present",dot:"bg-green-500"},{label:"Absent",dot:"bg-red-400"},{label:"Half Day",dot:"bg-amber-400"},{label:"Leave",dot:"bg-blue-400"},{label:"Holiday",dot:"bg-gray-300"}].map(l=>(
              <div key={l.label} className="flex items-center gap-1.5">
                <div className={`w-2.5 h-2.5 rounded-full ${l.dot}`}/>
                <span className="text-gray-500 text-xs font-semibold">{l.label}</span>
              </div>
            ))}
          </div>

          {/* Calendar Grid */}
          <div className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">
            <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
              <p className="text-gray-900 font-extrabold text-sm">Calendar View</p>
              <span className="text-gray-400 text-xs">{hDays} days</span>
            </div>
            {/* Day labels */}
            <div className="grid grid-cols-7 px-3 pt-2 pb-1">
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
                <div key={d} className="text-center text-[10px] font-extrabold text-gray-400">{d}</div>
              ))}
            </div>
            {/* Calendar cells */}
            <div className="grid grid-cols-7 gap-1 px-3 pb-3">
              {Array.from({length: hFirstDay}).map((_,i)=>(
                <div key={`e${i}`} />
              ))}
              {Array.from({length: hDays}).map((_,i) => {
                const day = i + 1;
                const ds  = `${histMonth}-${String(day).padStart(2,"0")}`;
                const st  = hHistory[ds] || "none";
                const cfg = STATUS_CFG[st] || STATUS_CFG.none;
                const isToday = ds === TODAY_DATE;
                return (
                  <div key={day}
                    className={`aspect-square rounded-xl flex flex-col items-center justify-center ${cfg.bg} ${isToday?"ring-2 ring-orange-400 ring-offset-1":""} transition`}>
                    <span className={`text-xs font-black leading-none ${cfg.text}`}>{day}</span>
                    <span className={`text-[9px] font-extrabold ${cfg.text} opacity-90 mt-0.5`}>{cfg.label}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Team Overview */}
          <div className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">

              <p className="text-gray-900 font-extrabold text-sm">All Workers — {hMonthLabel}</p>
              <span className="text-gray-400 text-xs">{MOCK_DB.workers.length} workers</span>
            </div>
            <div className="divide-y divide-gray-50">
              {MOCK_DB.workers.map((w, idx) => {
                const wKey  = `${w.id}_${histMonth}`;
                const wHist = MOCK_ATTENDANCE_HISTORY[wKey] || {};
                const wC    = {present:0,absent:0,half:0,leave:0,holiday:0,none:0};
                for (let d = 1; d <= hDays; d++) {
                  const ds = `${histMonth}-${String(d).padStart(2,"0")}`;
                  const st = wHist[ds]||"none";
                  wC[st] = (wC[st]||0)+1;
                }
                const wWork = hDays - wC.holiday - wC.none;
                const wRate = wWork > 0 ? Math.round(((wC.present + wC.half*0.5) / wWork)*100) : 0;
                const color = DEPT_COLOR[w.department]||"#64748B";
                return (
                  <button key={w.id} onClick={() => setHistWorker(w.id)}
                    className={`w-full px-4 py-3 flex items-center gap-3 text-left transition ${histWorker===w.id?"bg-orange-50":"hover:bg-gray-50 active:bg-gray-100"}`}>
                    <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-extrabold text-sm shrink-0"
                      style={{background: color}}>
                      {w.name.charAt(0)}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-gray-900 font-extrabold text-sm truncate">{w.name}</p>
                      <div className="flex items-center gap-1.5 mt-0.5">
                        <span className="text-green-600 text-xs font-bold">{wC.present}P</span>
                        <span className="text-red-500 text-xs font-bold">{wC.absent}A</span>
                        {wC.half > 0 && <span className="text-amber-600 text-xs font-bold">{wC.half}H</span>}
                        {wC.leave > 0 && <span className="text-blue-500 text-xs font-bold">{wC.leave}L</span>}
                      </div>
                    </div>
                    <div className="shrink-0 text-right">
                      <p className={`font-black text-base leading-none ${wRate>=90?"text-green-600":wRate>=75?"text-amber-500":"text-red-500"}`}>{wRate}%</p>
                      <div className="w-14 h-1.5 bg-gray-100 rounded-full mt-1 overflow-hidden">
                        <div className={`h-full rounded-full transition-all ${wRate>=90?"bg-green-500":wRate>=75?"bg-amber-400":"bg-red-400"}`} style={{width:`${wRate}%`}}/>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const AdminCuttings = () => {
  const { adminCuttings, setAdminCuttings, sharedStyles, sharedActions } = useContext(AppContext);
  const cuts = adminCuttings || [];
  const toast = useToast();

  // ── Tabs ──
  const [tab, setTab] = useState("styles"); // styles | cuttings

  // ── Styles state ──
  const [styles, setStyles] = useState(() =>
    (sharedStyles || []).length > 0 ? sharedStyles : MOCK_DB.styles
  );

  const [assignSupCutId, setAssignSupCutId] = useState(null);

  // ── Cuttings state ──
  const [filterStatus, setFilterStatus] = useState("all");
  const [showAssign, setShowAssign]     = useState(null);
  const [assignForm, setAssignForm]     = useState({ supervisorName:"", assignedQty:"", deadline:"" });
  const [assignErr, setAssignErr]       = useState("");

  // ── Add Cutting (size/bundle table) ──
  const [showAddCut, setShowAddCut]     = useState(false);
  const [addCutStyle, setAddCutStyle]   = useState(null); // pre-linked style
  const [addErr, setAddErr]             = useState("");
  const SIZE_PRESETS = { standard:["XS","S","M","L","XL","XXL"], waist:["28","30","32","34","36","38","40"], kids:["4Y","6Y","8Y","10Y","12Y","14Y"], kurta:["36","38","40","42","44","46","48"] };
  const detectPreset = (name="") => { const n=name.toLowerCase(); if(/kid|child|boy|girl/.test(n)) return SIZE_PRESETS.kids; if(/jean|denim|pant|trouser/.test(n)) return SIZE_PRESETS.waist; if(/kurta|kurti|salwar/.test(n)) return SIZE_PRESETS.kurta; return SIZE_PRESETS.standard; };
  const emptyAddForm = () => ({ fabricType:"", marker:"", cuttingDate:new Date().toISOString().split("T")[0], completionDate:"", sizes:[{size:"",bundles:"",pcsPerBundle:""}] });
  const [addForm, setAddForm] = useState(emptyAddForm());

  const genCutNo = () => { const max=cuts.reduce((m,c)=>{ const n=parseInt((c.cuttingNo||"").replace("CUT-",""))||0; return Math.max(m,n); },0); return "CUT-"+String(max+1).padStart(3,"0"); };
  const sizeTotal = r => (parseInt(r.bundles)||0)*(parseInt(r.pcsPerBundle)||0);
  const grandTotal   = addForm.sizes.reduce((s,r)=>s+sizeTotal(r),0);
  const grandBundles = addForm.sizes.reduce((s,r)=>s+(parseInt(r.bundles)||0),0);

  const updateSize = (idx,field,val) =>
    setAddForm(f=>({ ...f, sizes:f.sizes.map((r,i)=>{ if(i===idx) return {...r,[field]:val}; if(idx===0&&(field==="bundles"||field==="pcsPerBundle")) return {...r,[field]:val}; return r; }) }));

  const handleSaveCut = () => {
    if (!addForm.cuttingDate){setAddErr("Cutting date zaroori hai.");return;}
    const valid = addForm.sizes.filter(r=>r.size&&r.bundles&&r.pcsPerBundle);
    if (!valid.length){setAddErr("Kam se kam ek size puri info bharo.");return;}
    const sizesWithTotal = valid.map(r=>({...r,bundles:+r.bundles,pcsPerBundle:+r.pcsPerBundle,total:sizeTotal(r)}));
    const totalP = sizesWithTotal.reduce((s,r)=>s+r.total,0);
    const totalL = sizesWithTotal.reduce((s,r)=>s+(+r.bundles||0),0);
    const cutNo  = genCutNo();
    const newCut = {
      id:"ac"+Date.now(), cuttingNo:cutNo,
      styleId:addCutStyle?.id||null, styleName:addCutStyle?.styleName||addCutStyle?.name||"—", styleCode:addCutStyle?.styleNumber||addCutStyle?.styleCode||"",
      fabricType:addForm.fabricType, marker:addForm.marker,
      sizes:sizesWithTotal, totalQty:totalP, totalPieces:totalP, totalLayers:totalL,
      sizeBreakdown:sizesWithTotal.map(r=>r.size).join("/"),
      cuttingDate:addForm.cuttingDate, completionDate:addForm.completionDate,
      assignedSupervisor:null, assignedQty:null, deadline:null, status:"Pending", lockedCycles:[], createdAt:new Date().toISOString(),
    };
    setAdminCuttings(prev=>[newCut,...prev]);
    toast(`✂️ ${cutNo} created! (${totalP} pcs)`, "success");
    setShowAddCut(false); setAddErr(""); setAddForm(emptyAddForm());
  };

  const handleAssign = () => {
    if (!assignForm.supervisorName.trim()){setAssignErr("Supervisor chuno.");return;}
    if (!assignForm.deadline){setAssignErr("Deadline zaroori hai.");return;}
    setAdminCuttings(prev=>prev.map(c=>c.id===showAssign?{...c,assignedSupervisor:assignForm.supervisorName,assignedQty:assignForm.assignedQty||c.totalQty,deadline:assignForm.deadline,status:"Assigned"}:c));
    toast("✅ Supervisor assigned!","success");
    setShowAssign(null); setAssignForm({supervisorName:"",assignedQty:"",deadline:""}); setAssignErr("");
  };

  const statusBg = { Pending:"bg-amber-50 text-amber-700 border-amber-200", Assigned:"bg-blue-50 text-blue-700 border-blue-200", Completed:"bg-green-50 text-green-700 border-green-200" };

  const filteredStyles = styles

            <input value={styleSearch} onChange={e=>setStyleSearch(e.target.value)} placeholder="Style naam, code khojo..."

                  </div>
                  {/* Size table */}
                  {(cut.sizes||[]).length>0 && (
                    <div className="rounded-xl overflow-hidden border border-gray-100">
                      <div className="bg-gray-100 grid grid-cols-4 px-3 py-1.5 text-[10px] font-extrabold text-gray-500 uppercase">
                        <div>Size</div><div className="text-center">Bundles</div><div className="text-center">Pcs/B</div><div className="text-right text-red-500">Total</div>
                      </div>
                      {cut.sizes.map((r,i)=>(
                        <div key={i} className={`grid grid-cols-4 px-3 py-1.5 text-xs border-t border-gray-50 ${i%2===0?"bg-white":"bg-gray-50/50"}`}>
                          <div className="font-extrabold text-gray-900">{r.size}</div>
                          <div className="text-center text-gray-600">{r.bundles}</div>
                          <div className="text-center text-gray-600">{r.pcsPerBundle}</div>
                          <div className="text-right font-extrabold text-red-500">{r.total||(+r.bundles||0)*(+r.pcsPerBundle||0)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="flex flex-wrap gap-2">
                    {cut.fabricType && <span className="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1 text-[10px] text-gray-600">🧵 {cut.fabricType}</span>}
                    {cut.cuttingDate && <span className="bg-blue-50 border border-blue-100 rounded-lg px-2 py-1 text-[10px] text-blue-600">📅 {cut.cuttingDate}</span>}
                    {cut.completionDate && <span className="bg-purple-50 border border-purple-100 rounded-lg px-2 py-1 text-[10px] text-purple-600">🎯 {cut.completionDate}</span>}
                  </div>
                  {cut.assignedSupervisor ? (
                    <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 flex items-center justify-between">
                      <div>
                        <p className="text-blue-500 text-xs font-bold">👷 {cut.assignedSupervisor}</p>
                        <p className="text-blue-400 text-xs">Qty: {cut.assignedQty||cut.totalQty} · Deadline: {cut.deadline||"—"}</p>
                      </div>
                      {cut.status!=="Completed" && (
                        <button onClick={()=>{setAdminCuttings(p=>p.map(c=>c.id===cut.id?{...c,status:"Completed"}:c));toast("✅ Completed!","success");}}
                          className="bg-green-500 text-white text-xs font-bold px-3 py-1.5 rounded-xl active:scale-95">✓ Done</button>
                      )}
                    </div>
                  ) : (
                    <button onClick={()=>{setShowAssign(cut.id);setAssignForm({supervisorName:"",assignedQty:String(cut.totalQty||cut.totalPieces||""),deadline:""}); }}
                      className="w-full flex items-center justify-center gap-2 bg-blue-500 text-white font-bold py-2.5 rounded-xl text-sm active:scale-95 shadow-sm shadow-blue-200">
                      👷 Assign Supervisor
                    </button>
                  )}
                  {(cut.lockedCycles||[]).length>0 && (
                    <div className="bg-red-50 border border-red-200 rounded-xl px-3 py-2">
                      <p className="text-red-500 text-xs font-bold">🔒 {cut.lockedCycles.join(", ")}</p>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Assign Supervisor Modal (Cuttings tab) */}
      <Modal open={!!showAssign} onClose={()=>{setShowAssign(null);setAssignErr("");}} title="👷 Assign Supervisor">
        <div className="space-y-4">
          {assignErr && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm">{assignErr}</div>}
          {(()=>{ const c=cuts.find(x=>x.id===showAssign); return c?(<div className="bg-orange-50 border border-orange-200 rounded-xl px-4 py-3"><p className="text-xs text-orange-500 font-bold">Cutting</p><p className="text-gray-900 font-extrabold">{c.cuttingNo} · {c.styleName}</p><p className="text-gray-500 text-xs">Total: {c.totalPieces||c.totalQty} pcs</p></div>):null; })()}
          <div className="space-y-2">
            <p className="text-sm font-bold text-gray-700">Supervisor chuno *</p>
            {SUPERVISOR_POOL.map(sv=>{
              const isSel=assignForm.supervisorName===sv.name;
              return (
                <button key={sv.id} onClick={()=>setAssignForm({...assignForm,supervisorName:sv.name})}
                  className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-xl border-2 transition ${isSel?"border-orange-400 bg-orange-50":"border-gray-200 bg-white"}`}>
                  <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${isSel?"bg-orange-500 border-orange-500":"border-gray-300"}`}>
                    {isSel && <div className="w-2 h-2 bg-white rounded-full"/>}
                  </div>
                  <div className="flex-1 text-left">
                    <p className={`text-sm font-extrabold ${isSel?"text-orange-700":"text-gray-800"}`}>{sv.name}</p>
                    <p className="text-[10px] text-gray-400">{sv.department} · {sv.staffId}</p>
                  </div>
                </button>
              );
            })}
          </div>
          <Input label="Deadline *" type="date" value={assignForm.deadline} onChange={e=>setAssignForm({...assignForm,deadline:e.target.value})}/>
          <Input label="Assign Qty (optional)" type="number" value={assignForm.assignedQty} onChange={e=>setAssignForm({...assignForm,assignedQty:e.target.value})} placeholder="Partial qty"/>
          <div className="flex gap-3">
            <Btn variant="secondary" onClick={()=>{setShowAssign(null);setAssignErr("");}} className="flex-1">Cancel</Btn>
            <Btn onClick={handleAssign} className="flex-1">✅ Assign & Lock</Btn>
          </div>
        </div>
      </Modal>

      {/* Add Cutting Modal — size/bundle table */}
      <Modal open={showAddCut} onClose={()=>{setShowAddCut(false);setAddErr("");}} title="✂️ Add Cutting">
        <div className="space-y-4">
          {addErr && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm">{addErr}</div>}
          {/* Style info */}
          {addCutStyle ? (
            <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-2.5">
              <p className="text-xs text-blue-500 font-bold">Style (Auto)</p>
              <p className="text-gray-900 font-extrabold">{addCutStyle.styleName||addCutStyle.name}</p>
              <p className="text-gray-400 text-xs">{addCutStyle.styleNumber||addCutStyle.styleCode} · {addCutStyle.buyer||addCutStyle.buyerName}</p>
            </div>
          ) : (
            <p className="text-xs text-gray-400 bg-gray-50 rounded-xl px-3 py-2">ℹ️ Style-wise cutting ke liye Styles tab se add karo</p>
          )}
          <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-2">
            <p className="text-xs text-gray-400 font-bold">Cutting No (Auto)</p>
            <p className="font-mono font-extrabold text-orange-600">{genCutNo()}</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Fabric Type" value={addForm.fabricType} onChange={e=>setAddForm({...addForm,fabricType:e.target.value})} placeholder="Cotton"/>
            <Input label="Marker No." value={addForm.marker} onChange={e=>setAddForm({...addForm,marker:e.target.value})} placeholder="M-001"/>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Cutting Date *" type="date" value={addForm.cuttingDate} onChange={e=>setAddForm({...addForm,cuttingDate:e.target.value})}/>
            <Input label="Exp. Completion" type="date" value={addForm.completionDate} onChange={e=>setAddForm({...addForm,completionDate:e.target.value})}/>
          </div>
          {/* Summary */}
          <div className="grid grid-cols-3 gap-2">
            <div className="bg-red-50 rounded-2xl p-2.5 text-center border border-red-100"><p className="text-xl font-black text-red-500">{grandTotal}</p><p className="text-[10px] text-gray-500 font-semibold">Total Pcs</p></div>
            <div className="bg-orange-50 rounded-2xl p-2.5 text-center border border-orange-100"><p className="text-xl font-black text-orange-500">{grandBundles}</p><p className="text-[10px] text-gray-500 font-semibold">Bundles</p></div>
            <div className="bg-gray-50 rounded-2xl p-2.5 text-center border border-gray-200"><p className="text-xl font-black text-gray-700">{addForm.sizes.filter(r=>r.size).length}</p><p className="text-[10px] text-gray-500 font-semibold">Sizes</p></div>
          </div>
          {addForm.sizes.length>1 && !addForm.sizes[0].bundles && <p className="text-xs text-blue-500 bg-blue-50 rounded-xl px-3 py-2 font-semibold">💡 Pehli row mein bundles/pcs bharo — sab mein autofill hoga</p>}
          {/* Size table */}
          <div className="rounded-2xl overflow-hidden border-2 border-gray-100">
            <div className="bg-gray-100 grid grid-cols-12 px-3 py-2 text-[10px] font-extrabold text-gray-600 uppercase">
              <div className="col-span-3">Size</div><div className="col-span-3 text-center">Bundles</div><div className="col-span-4 text-center">Pcs/Bundle</div><div className="col-span-1 text-right text-red-500">Total</div><div className="col-span-1"/>
            </div>
            {addForm.sizes.map((row,idx)=>(
              <div key={idx} className={`grid grid-cols-12 items-center gap-1 px-3 py-2 border-b border-gray-50 last:border-0 ${idx%2===0?"bg-white":"bg-gray-50/40"}`}>
                <div className="col-span-3"><input value={row.size} onChange={e=>updateSize(idx,"size",e.target.value)} placeholder="S" className="w-full border-2 border-gray-200 rounded-xl px-2 py-2 text-sm font-extrabold text-gray-900 focus:outline-none focus:border-orange-400 text-center" style={{fontSize:"15px"}}/></div>
                <div className="col-span-3"><input type="number" value={row.bundles} onChange={e=>updateSize(idx,"bundles",e.target.value)} placeholder="5" className="w-full border-2 border-gray-200 rounded-xl px-2 py-2 text-sm font-bold text-gray-700 focus:outline-none focus:border-orange-400 text-center" style={{fontSize:"15px"}}/></div>
                <div className="col-span-4"><input type="number" value={row.pcsPerBundle} onChange={e=>updateSize(idx,"pcsPerBundle",e.target.value)} placeholder="22" className="w-full border-2 border-gray-200 rounded-xl px-2 py-2 text-sm font-bold text-gray-700 focus:outline-none focus:border-orange-400 text-center" style={{fontSize:"15px"}}/></div>
                <div className="col-span-1 text-right"><span className="font-black text-red-500 text-sm">{sizeTotal(row)||""}</span></div>
                <div className="col-span-1 flex justify-end">{addForm.sizes.length>1&&<button onClick={()=>setAddForm(f=>({...f,sizes:f.sizes.filter((_,i)=>i!==idx)}))} className="text-red-400 text-base font-black">×</button>}</div>
              </div>
            ))}
            <button onClick={()=>setAddForm(f=>({...f,sizes:[...f.sizes,{size:"",bundles:f.sizes[0]?.bundles||"",pcsPerBundle:f.sizes[0]?.pcsPerBundle||""}]}))}
              className="w-full flex items-center justify-center gap-2 py-2.5 bg-orange-50 text-orange-600 font-extrabold text-sm active:bg-orange-100 transition">
              + Add Size Row
            </button>
          </div>
          {/* Presets */}
          <div className="flex gap-2 flex-wrap">
            {Object.entries(SIZE_PRESETS).map(([key,sizes])=>(
              <button key={key} onClick={()=>setAddForm(f=>({...f,sizes:sizes.map(s=>({size:s,bundles:f.sizes[0]?.bundles||"",pcsPerBundle:f.sizes[0]?.pcsPerBundle||""}))})) }
                className="px-3 py-1 bg-gray-100 border border-gray-200 rounded-xl text-xs font-bold text-gray-600 active:bg-orange-100 active:border-orange-300 active:text-orange-700 capitalize">{key}</button>
            ))}
          </div>
          <div className="flex gap-3">
            <Btn variant="secondary" onClick={()=>{setShowAddCut(false);setAddErr("");}} className="flex-1">Cancel</Btn>
            <Btn onClick={handleSaveCut} className="flex-1">✂️ Save Cutting</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

// PAYMENT CYCLES — Admin Screen
// ============================================================
const PaymentCycles = () => {
  const { adminCuttings, setAdminCuttings, paymentCycles, setPaymentCycles } = useContext(AppContext);
  const cuts = adminCuttings || [];
  const toast = useToast();

  const [showCreate, setShowCreate] = useState(false);
  const [cycleForm, setCycleForm] = useState({ range:"1-15", month: new Date().toLocaleString("default",{month:"long",year:"numeric"}), supervisorName:"", ratePerPiece:"", selectedCuts:[] });
  const [cycleErr, setCycleErr] = useState("");

  const assignedCuts = cuts.filter(c=>c.assignedSupervisor);
  const supervisors = [...new Set(assignedCuts.map(c=>c.assignedSupervisor))];
  const supCuts = cycleForm.supervisorName ? assignedCuts.filter(c=>c.assignedSupervisor===cycleForm.supervisorName) : [];

  const toggleCutSel = (cutId) => {
    setCycleForm(f=>({
      ...f,
      selectedCuts: f.selectedCuts.includes(cutId) ? f.selectedCuts.filter(x=>x!==cutId) : [...f.selectedCuts,cutId]
    }));
  };

  const selectedCutObjs = cuts.filter(c=>cycleForm.selectedCuts.includes(c.id));
  const totalQty = selectedCutObjs.reduce((s,c)=>s+(+(c.assignedQty||c.totalQty)||0),0);
  const totalAmt = totalQty * (+cycleForm.ratePerPiece||0);

  const handleCreateCycle = () => {
    if (!cycleForm.supervisorName){setCycleErr("Supervisor chuno.");return;}
    if (cycleForm.selectedCuts.length===0){setCycleErr("Kam se kam ek cutting select karo.");return;}
    if (!cycleForm.ratePerPiece||+cycleForm.ratePerPiece<=0){setCycleErr("Rate per piece dikhana zaroori hai.");return;}
    const cycleLabel = `${cycleForm.range} ${cycleForm.month}`;
    const newCycle = {
      id:"pc"+Date.now(), range:cycleForm.range, month:cycleForm.month, label:cycleLabel,
      supervisorName:cycleForm.supervisorName, cuttingIds:cycleForm.selectedCuts,
      totalCuttings:cycleForm.selectedCuts.length, totalQty, ratePerPiece:+cycleForm.ratePerPiece,
      totalAmount:totalAmt, status:"Pending", createdAt:new Date().toISOString(),
    };
    setPaymentCycles(prev=>[newCycle,...prev]);
    // Lock those cuttings
    setAdminCuttings(prev=>prev.map(c=>
      cycleForm.selectedCuts.includes(c.id)
        ? { ...c, lockedCycles:[...(c.lockedCycles||[]),cycleLabel] }
        : c
    ));
    toast(`💰 Payment Cycle "${cycleLabel}" created!`,"success");
    setShowCreate(false);
    setCycleForm({range:"1-15",month:new Date().toLocaleString("default",{month:"long",year:"numeric"}),supervisorName:"",ratePerPiece:"",selectedCuts:[]});
    setCycleErr("");
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-extrabold text-gray-900">💰 Payment Cycles</h1>
          <p className="text-gray-500 text-sm">Cutting payment cycles manage karo</p>
        </div>
        <Btn onClick={()=>setShowCreate(true)}>➕ New Cycle</Btn>
      </div>

      {/* Summary stats */}
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-white border-2 border-amber-100 rounded-2xl p-4">
          <p className="text-xs text-gray-500 font-semibold uppercase tracking-wide">Pending Cycles</p>
          <p className="text-2xl font-black text-amber-500 mt-1">{(paymentCycles||[]).filter(c=>c.status==="Pending").length}</p>
        </div>
        <div className="bg-white border-2 border-green-100 rounded-2xl p-4">
          <p className="text-xs text-gray-500 font-semibold uppercase tracking-wide">Released</p>
          <p className="text-2xl font-black text-green-600 mt-1">{(paymentCycles||[]).filter(c=>c.status==="Released").length}</p>
        </div>
      </div>

      {/* Cycles list */}
      {(paymentCycles||[]).length===0 && (
        <EmptyState icon="money" title="Koi payment cycle nahi" subtitle="➕ New Cycle se pehla cycle banao" onAction={()=>setShowCreate(true)} action="➕ Create Cycle" />
      )}
      <div className="space-y-3">
        {(paymentCycles||[]).map(cycle=>(
          <div key={cycle.id} className="bg-white rounded-2xl border-2 border-gray-100 overflow-hidden shadow-sm">
            <div className={`h-1.5 ${cycle.status==="Released"?"bg-green-500":"bg-amber-400"}`} />
            <div className="p-4 space-y-3">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <p className="font-extrabold text-gray-900">{cycle.label}</p>
                  <p className="text-gray-500 text-sm">👷 {cycle.supervisorName}</p>
                </div>
                <span className={`text-xs font-bold px-2 py-1 rounded-full border ${cycle.status==="Released"?"bg-green-50 text-green-700 border-green-200":"bg-amber-50 text-amber-700 border-amber-200"}`}>
                  {cycle.status}
                </span>
              </div>
              <div className="grid grid-cols-3 gap-2 text-center">
                <div className="bg-gray-50 rounded-xl p-2">
                  <p className="font-black text-gray-900 text-lg">{cycle.totalCuttings}</p>
                  <p className="text-xs text-gray-400">Cuttings</p>
                </div>
                <div className="bg-gray-50 rounded-xl p-2">
                  <p className="font-black text-gray-900 text-lg">{(cycle.totalQty||0).toLocaleString()}</p>
                  <p className="text-xs text-gray-400">Total Pcs</p>
                </div>
                <div className="bg-orange-50 rounded-xl p-2">
                  <p className="font-black text-orange-600 text-lg">₹{(cycle.totalAmount||0).toLocaleString()}</p>
                  <p className="text-xs text-gray-400">Amount</p>
                </div>
              </div>
              <div className="flex items-center justify-between text-xs text-gray-400 bg-gray-50 rounded-xl px-3 py-2">
                <span>Rate: ₹{cycle.ratePerPiece}/pc</span>
                <span>{cycle.totalQty} pcs × ₹{cycle.ratePerPiece} = ₹{(cycle.totalAmount||0).toLocaleString()}</span>
              </div>
              {cycle.status!=="Released" && (
                <Btn variant="success" className="w-full" onClick={()=>{
                  setPaymentCycles(prev=>prev.map(c=>c.id===cycle.id?{...c,status:"Released",releasedAt:new Date().toISOString()}:c));
                  toast("💸 Payment released!","success");
                }}>💸 Release Payment</Btn>
              )}
              {cycle.status==="Released" && (
                <div className="bg-green-50 border border-green-200 rounded-xl px-3 py-2 text-center text-green-700 font-bold text-sm">
                  ✅ Payment Released · {cycle.releasedAt ? new Date(cycle.releasedAt).toLocaleDateString("hi-IN") : ""}
                </div>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Create Cycle Modal */}
      <Modal open={showCreate} onClose={()=>{setShowCreate(false);setCycleErr("");}} title="💰 New Payment Cycle">
        <div className="space-y-4">
          {cycleErr && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm">{cycleErr}</div>}
          <div className="grid grid-cols-2 gap-3">
            <div className="space-y-1.5">
              <label className="block text-sm font-bold text-gray-700">Date Range</label>
              <select value={cycleForm.range} onChange={e=>setCycleForm({...cycleForm,range:e.target.value})}
                className="w-full bg-white border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-400 transition" style={{fontSize:"16px"}}>
                <option value="1-15">1 – 15</option>
                <option value="16-30">16 – 30/31</option>
              </select>
            </div>
            <Input label="Month" value={cycleForm.month} onChange={e=>setCycleForm({...cycleForm,month:e.target.value})} placeholder="March 2024" />
          </div>
          <div className="space-y-1.5">
            <label className="block text-sm font-bold text-gray-700">Supervisor *</label>
            <select value={cycleForm.supervisorName} onChange={e=>setCycleForm({...cycleForm,supervisorName:e.target.value,selectedCuts:[]})}
              className="w-full bg-white border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-400 transition" style={{fontSize:"16px"}}>
              <option value="">-- Supervisor chuno --</option>
              {supervisors.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <Input label="Rate Per Piece (₹) *" type="number" step="0.01" value={cycleForm.ratePerPiece} onChange={e=>setCycleForm({...cycleForm,ratePerPiece:e.target.value})} placeholder="2.50" />
          {cycleForm.supervisorName && (
            <div className="space-y-2">
              <p className="text-sm font-bold text-gray-700">Cuttings Select Karo ({supCuts.length} available)</p>
              {supCuts.length===0 && <p className="text-gray-400 text-sm bg-gray-50 rounded-xl p-3">Is supervisor ko koi cutting assigned nahi hai.</p>}
              <div className="space-y-2 max-h-48 overflow-y-auto">
                {supCuts.map(c=>{
                  const sel = cycleForm.selectedCuts.includes(c.id);
                  const isLocked = (c.lockedCycles||[]).length>0;
                  return (
                    <label key={c.id} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition ${sel?"border-orange-400 bg-orange-50":isLocked?"border-red-100 bg-red-50 opacity-60":"border-gray-200 bg-white hover:border-orange-200"}`}>
                      <input type="checkbox" checked={sel} disabled={isLocked} onChange={()=>!isLocked&&toggleCutSel(c.id)} className="w-4 h-4 accent-orange-500" />
                      <div className="flex-1 min-w-0">
                        <p className="font-bold text-gray-900 text-sm">{c.cuttingNo} · {c.styleName}</p>
                        <p className="text-xs text-gray-400">{c.assignedQty||c.totalQty} pcs {isLocked?"🔒 Already locked":""}</p>
                      </div>
                    </label>
                  );
                })}
              </div>
            </div>
          )}
          {cycleForm.selectedCuts.length>0 && (
            <div className="bg-orange-50 border border-orange-200 rounded-xl px-4 py-3">
              <div className="flex justify-between text-sm font-bold text-gray-700">
                <span>Total Pcs:</span><span>{totalQty.toLocaleString()}</span>
              </div>
              <div className="flex justify-between text-lg font-black text-orange-600">
                <span>Total Amount:</span><span>₹{totalAmt.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
              </div>
            </div>
          )}
          <div className="flex gap-3">
            <Btn variant="secondary" onClick={()=>{setShowCreate(false);setCycleErr("");}} className="flex-1">Cancel</Btn>
            <Btn onClick={handleCreateCycle} className="flex-1">💰 Create Cycle</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

  { id:"today-staff",     icon:"today-staff",      label:"My Staff",     short:"Staff",   roles: ["admin","supervisor"] },
  { id:"jobs",            icon:"jobs",             label:"Jobs",         short:"Jobs",    roles: ["admin","supervisor","worker"] },
  { id:"export",          icon:"export",           label:"Export",       short:"Export",  roles: ["admin","supervisor"] },
  { id:"profile",         icon:"profile",          label:"Profile",      short:"Me",      roles: ["admin","supervisor","worker"] },
  { id:"sup-permissions", icon:"sup-permissions",  label:"Sup. Access",  short:"Access",  roles: ["admin"] },
  { id:"payment-cycles",  icon:"payment-cycles",   label:"Pay Cycles",   short:"Cycles",  roles: ["admin"] },
];

const BOTTOM_NAV = ["dashboard","hourly","profile"];

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");

  // Fix: keyboard pushing up bottom nav on mobile
  React.useEffect(() => {
    const meta = document.querySelector("meta[name=viewport]");
    if (meta) meta.content ="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual";
  }, []);
  const [pageHistory, setPageHistory] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // ══════════════════════════════════════════
  // SHARED GLOBAL STATE — सभी panels connected
  // ══════════════════════════════════════════
  const [sharedEntries,  setSharedEntries]  = useState([]);
  const [dbLoading,      setDbLoading]      = useState(true);
  const [sharedCuts,     setSharedCuts]     = useState([]);
  const [sharedHourly,   setSharedHourly]   = useState([]);

  const [sharedWorkers,  setSharedWorkers]  = useState([]);
  const [sharedStyles,   setSharedStyles]   = useState([]);
  const [sharedOperations, setSharedOperations] = useState([]);
  const [sharedNotifs,   setSharedNotifs]   = useState([]);
  const [paymentLock, setPaymentLock] = useState({ active: false, type:"none" }); //"none"|"weekly"|"15day"|"monthly"
  const [sharedLockedCuts, setSharedLockedCuts] = useState({}); // {cutId: true|false} — supervisor se worker tak
  const [adminCuttings, setAdminCuttings] = useState([]);

  const [paymentCycles, setPaymentCycles] = useState([]); // Payment cycles created by admin/supervisor
  const [sharedAttendance, setSharedAttendance] = useState({});
  const [sharedChat,       setSharedChat]       = useState([]);
  const [sharedGatePasses, setSharedGatePasses] = useState([]);


  // ── Firebase Real-time Listeners ─────────────────────────
  useEffect(() => {
    const seedAndListen = async () => {
      // Seed only if empty
      const existingWorkers = await fbGet("workers");
      if (existingWorkers.length === 0) {
        console.log("🌱 Seeding Firestore...");
        const seedCol = async (col, items) => {
          for (const item of items) { const {id,...d}=item; await setDoc(doc(db,col,id),d); }
        };
        await seedCol("workers",    MOCK_DB.workers);
        await seedCol("workEntries", MOCK_DB.workEntries.map(e=>({...e,status:e.status||"pending"})));
        await seedCol("hourlyReports", MOCK_DB.hourlyReports);
        await seedCol("styles",     MOCK_DB.styles);
        await seedCol("operations", MOCK_DB.operations);
        await seedCol("cuttings",   MOCK_CUTS);
        console.log("✅ Seed complete!");
      }
    };
    seedAndListen();

    const unsubs = [
      fbListen("workers",       d => setSharedWorkers(d)),
      fbListen("workEntries",   d => setSharedEntries(d)),
      fbListen("cuttings",      d => setSharedCuts(d)),
      fbListen("hourlyReports", d => setSharedHourly(d)),
      fbListen("styles",        d => setSharedStyles(d)),
      fbListen("operations",    d => setSharedOperations(d)),
      fbListen("adminCuttings", d => setAdminCuttings(d)),
      fbListen("paymentCycles", d => setPaymentCycles(d)),
      fbListen("chat",          d => setSharedChat([...d].sort((a,b)=>(a._ts?.seconds||0)-(b._ts?.seconds||0)))),
      fbListen("gatePasses",    d => setSharedGatePasses(d)),
      fbListen("attendance",    d => {
        const obj={}; d.forEach(({id,...r})=>{obj[id]=r;}); setSharedAttendance(obj);
      }),
    ];
    setDbLoading(false);
    return () => unsubs.forEach(u=>u());
  }, []);

  // Add notification helper
  const addNotif = (msg, type="info", dept="") => {
    const n = { id: Date.now(), msg, type, dept, time: new Date().toLocaleTimeString("hi-IN") };
    setSharedNotifs(prev => [n, ...prev].slice(0, 20));
  };

  // Shared actions
  const sharedActions = {
    // Worker submits entry → Firestore
    addEntry: (entry) => {
      const newEntry = { ...entry, status: entry.status||"pending" };
      fbAdd("workEntries", newEntry);
      addNotif(`${entry.workerName} ने नई entry submit की — ${entry.pieces} pcs`,"entry", entry.department);
    },
    // Supervisor approve/reject → Firestore
    updateEntryStatus: (id, status, byName) => {
      fbUpdate("workEntries", id, { status });
      const e = sharedEntries.find(x=>x.id===id);
      if (e) addNotif(`${e.workerName} की entry ${status==="approved"?"Approved":"Rejected"} by ${byName}`, status, e.department);
    },
    // Cutting → Firestore
    addCut: (cut, dept) => {
      fbAdd("cuttings", { ...cut, department:dept });
      addNotif(`नई cutting entry — ${cut.style} · ${cut.totalPieces} pcs`,"cutting", dept);
    },
    // Hourly → Firestore
    addHourly: (report, dept) => {
      fbAdd("hourlyReports", { ...report, department:dept });
      addNotif(`Hourly report: ${report.department} · ${report.hourSlot}`,"hourly", dept);
    },
    // Worker → Firestore
    addWorker: (worker) => {
      fbAdd("workers", { ...worker, status:"active" });
      addNotif(`नया worker joined: ${worker.name} — ${worker.department}`,"worker");
    },
    // Attendance → Firestore
    markAttendance: (workerId, date, record) => {
      fbSet("attendance", workerId+"_"+date, record);
    },
    // Chat → Firestore
    sendMessage: (msg) => {
      fbAdd("chat", { ...msg, time: new Date().toLocaleTimeString("hi-IN") });
    },
    // Gate pass → Firestore
    requestGatePass: (pass) => {
      fbAdd("gatePasses", { ...pass, status:"pending", requestTime: new Date().toLocaleTimeString("hi-IN") });
      addNotif(`Gate pass request: ${pass.workerName}`,"gatepass");
    },
    approveGatePass: (id) => {
      fbUpdate("gatePasses", id, { status:"approved", approvedAt: new Date().toLocaleTimeString("hi-IN") });
    },
    rejectGatePass: (id) => {
      fbUpdate("gatePasses", id, { status:"rejected" });
    },
    // Admin style CRUD → sab panels sync
    addStyle: (style) => {
      setSharedStyles(prev => [style, ...prev]);
    },
    updateStyle: (id, updates) => {
      setSharedStyles(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
    },
    // Operations CRUD → WorkEntry mein sync
    addOperation: (op) => {
      setSharedOperations(prev => [...prev, { ...op, id: "op" + Date.now() }]);
    },
    updateOperation: (id, updates) => {
      setSharedOperations(prev => prev.map(o => o.id === id ? { ...o, ...updates } : o));
    },
    deleteOperation: (id) => {
      setSharedOperations(prev => prev.filter(o => o.id !== id));
    },
    // Supervisor cutting lock sync — worker panel ke liye
    updateLockedCuts: (cutId, isLocked) => {
      setSharedLockedCuts(prev => ({ ...prev, [cutId]: isLocked }));
    },
  };

  const handleLogin = (u) => { setUser(u); setPage("dashboard"); setPageHistory([]); };
  const handleLogout = () => { setUser(null); setPage("dashboard"); setPageHistory([]); };

  const navigate = (p) => {
    if (p !== page) {
      setPageHistory(prev => [...prev, page]);
    }
    setPage(p);
    setSidebarOpen(false);
  };

  const goBack = () => {
    if (pageHistory.length > 0) {
      const prev = pageHistory[pageHistory.length - 1];
      setPageHistory(h => h.slice(0, -1));
      setPage(prev);
    } else {
      setPage("dashboard");
    }
    setSidebarOpen(false);
  };

  // ── Phone Back Button Support ──────────────────────────────
  // Har page change pe browser history mein ek entry push karo
  useEffect(() => {
    window.history.pushState({ page },"", window.location.pathname);
  }, [page]);

  // Phone ka back button dabane pe goBack() call hoga
  useEffect(() => {
    const handlePopState = () => {
      goBack();
      // Re-push so next back press bhi kaam kare
      window.history.pushState({ page },"", window.location.pathname);
    };
    window.addEventListener("popstate", handlePopState);
    return () => window.removeEventListener("popstate", handlePopState);
  }, [pageHistory, page]);
  // ──────────────────────────────────────────────────────────

  if (dbLoading) return (
    <div className="min-h-screen flex items-center justify-center bg-orange-50">
      <div className="text-center space-y-4 px-6">
        <div className="w-14 h-14 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto"/>
        <p className="text-gray-700 font-bold">🔥 Firebase se data load ho raha hai...</p>
        <p className="text-gray-400 text-sm">Pehli baar thoda time lagega</p>
      </div>
    </div>
  );

  if (!user) return <LoginPage onLogin={handleLogin} />;

  // Worker के लिए अलग dedicated panel
  if (user.role ==="worker") {
    return (
      <AppContext.Provider value={{ user, navigate: () => {}, sharedEntries, sharedCuts, sharedLockedCuts, sharedStyles, sharedOperations, sharedWorkers, sharedAttendance, sharedChat, sharedGatePasses, sharedActions, sharedNotifs, paymentLock, setPaymentLock, adminCuttings, setAdminCuttings, paymentCycles, setPaymentCycles }}>
        <WorkerPanel onLogout={handleLogout} />
      </AppContext.Provider>
    );
  }

  // Supervisor के लिए अलग dedicated panel
  if (user.role ==="supervisor") {
    return (
      <AppContext.Provider value={{ user, navigate: () => {}, sharedEntries, sharedCuts, sharedLockedCuts, sharedStyles, sharedOperations, sharedHourly, sharedWorkers, sharedAttendance, sharedChat, sharedGatePasses, sharedActions, sharedNotifs, paymentLock, setPaymentLock, adminCuttings, setAdminCuttings, paymentCycles, setPaymentCycles }}>
        <SupervisorPanel onLogout={handleLogout} />
      </AppContext.Provider>
    );
  }


  const allowedNav = NAV_ITEMS.filter(n => n.roles.includes(user.role));
  const bottomNav = allowedNav.filter(n => BOTTOM_NAV.includes(n.id));

  const renderPage = () => {
    switch (page) {
      case"dashboard": return <Dashboard />;
      case"staff-payment": return <StaffPaymentFull />;
      case"work-entry": return <WorkEntry />;

      case"self-entry": return <SelfEntry />;
      case"workers": return <Workers />;
      case"styles": return <Styles />;
      case"operations": return <Operations />;
      case"departments": return <Departments />;
      case"payments": return <Payments />;
      case"hourly": return <HourlyReports />;
      case"today-staff": return <TodayMyStaff />;
      case"jobs": return <JobPortal />;

      case"export":  return <ExportCenter />;
      case"profile": return <Profile onLogout={handleLogout} />;
      case"sup-permissions": return <SupervisorPermissions />;
      case"payment-cycles":  return <PaymentCycles />;
      default: return <Dashboard />;
    }
  };

  return (
    <ToastProvider>
    <AppContext.Provider value={{ user, navigate, sharedEntries, sharedCuts, sharedLockedCuts, sharedStyles, sharedOperations, sharedHourly, sharedWorkers, sharedAttendance, sharedChat, sharedGatePasses, sharedActions, sharedNotifs, paymentLock, setPaymentLock, adminCuttings, setAdminCuttings, paymentCycles, setPaymentCycles }}>
      <div className="min-h-screen bg-white text-gray-900 font-sans"
        style={{ fontFamily:"'DM Sans', 'Segoe UI', sans-serif" }}>

        {/* Desktop Sidebar */}
        <aside className={`fixed top-0 left-0 h-full w-64 bg-white border-r-2 border-orange-100 z-40 flex flex-col
          transform transition-transform duration-300 lg:translate-x-0 ${sidebarOpen ?"translate-x-0" :"-translate-x-full"}`}>

          {/* Nav */}
          <nav className="flex-1 overflow-y-auto py-3 px-3 space-y-0.5">
            {allowedNav.map(item => (
              <button key={item.id} onClick={() => navigate(item.id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all
                  ${page === item.id
                    ?"bg-orange-500 text-white shadow-md shadow-orange-300/40"
                    :"text-gray-600 hover:bg-orange-50 hover:text-orange-600"}`}>
                <NavIcon id={item.id} size={17} />
                {item.label}
                {page === item.id && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-white/70" />}
              </button>
            ))}
          </nav>

          <div className="p-4 border-t-2 border-orange-50">
            <button onClick={handleLogout} className="w-full flex items-center gap-2 px-3 py-2.5 rounded-xl text-red-500 hover:bg-red-50 hover:border-red-200 border-2 border-transparent text-sm font-bold transition">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 14H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg> Sign Out
            </button>
          </div>
        </aside>

        {/* Sidebar overlay (mobile) */}
        {sidebarOpen && (
          <div className="fixed inset-0 bg-black/60 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
        )}

        {/* Floating hamburger — mobile only */}
        <button onClick={() => setSidebarOpen(true)}
          className="lg:hidden fixed top-3 left-3 z-20 w-10 h-10 bg-white border border-gray-200 rounded-xl shadow-md flex flex-col items-center justify-center gap-1.5 active:scale-95 transition">
          <div className="w-5 h-0.5 bg-gray-700 rounded"/>
          <div className="w-4 h-0.5 bg-gray-500 rounded"/>
          <div className="w-5 h-0.5 bg-gray-700 rounded"/>
        </button>

        {/* Floating back button — non-dashboard pages */}
        {page !=="dashboard" && (
          <button onClick={goBack}
            className="lg:hidden fixed top-3 left-16 z-20 h-10 px-3 bg-orange-50 border border-orange-200 rounded-xl shadow-md flex items-center gap-1.5 text-orange-600 font-bold text-sm active:scale-95 transition">
            ← Back
          </button>
        )}

        {/* Main content */}
        <div className="lg:pl-64 flex flex-col min-h-screen">
          {/* Page content */}
          <main className="main-content flex-1 p-4 pb-24 lg:pb-6 max-w-5xl mx-auto w-full">
            {renderPage()}
          </main>
        </div>

        {/* Mobile Bottom Nav */}
        <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]" style={{paddingBottom:"env(safe-area-inset-bottom)"}}>
          <div className="flex items-center justify-around px-1 py-1">
            {bottomNav.map(item => (
              <button key={item.id} onClick={() => navigate(item.id)}
                className={`flex flex-col items-center gap-0.5 flex-1 py-2 rounded-xl transition-all active:scale-95
                  ${page === item.id ?"text-orange-500" :"text-gray-400"}`}>
                <div className={`relative flex items-center justify-center w-8 h-8 rounded-xl transition-all
                  ${page === item.id ?"bg-orange-50 scale-110" :""}`}>
                  <NavIcon id={item.id} size={20} />
                </div>
                <span className={`text-[10px] font-bold leading-none ${page === item.id ?"text-orange-500" :"text-gray-400"}`}>
                  {item.short || item.label}
                </span>
                {page === item.id && <div className="absolute bottom-0 w-4 h-0.5 bg-orange-500 rounded-full"/>}
              </button>
            ))}
          </div>
        </nav>
      </div>
    </AppContext.Provider>
    </ToastProvider>
  );
}


    // App mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
