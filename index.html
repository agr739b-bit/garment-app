          ) : (
            <button onClick={()=>{setEditMode(true);setDraft(prof);}}
              className="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-orange-400 text-orange-500 font-bold text-sm py-3 rounded-2xl active:scale-[0.98] transition">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              Edit Profile
            </button>
          )}
        </div>

        {/* Personal Info */}
        <div className="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
          <div className="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
            <p className="text-gray-500 text-xs font-extrabold uppercase tracking-wider">Personal Info</p>
            {editMode && <span className="text-orange-400 text-xs font-bold">Editing...</span>}
          </div>
          {fld("Full Name","name")}
          {fld("Mobile","mobile","tel")}
          {fld("Email","email","email")}
          {/* Department — read-only, set by admin */}
          <div className="px-4 py-3 border-b border-gray-50">
            <p className="text-gray-400 text-xs font-semibold mb-1">Department / विभाग</p>
            <div className="flex items-center gap-2">
              <span className="w-3 h-3 rounded-full shrink-0" style={{background:deptColor}}/>
              <p className="text-gray-900 text-sm font-extrabold">{myDept}</p>
              <span className="text-xs text-gray-400 ml-auto bg-gray-100 px-2 py-0.5 rounded-full">Admin assigned</span>
            </div>
          </div>
          {fld("Address","address")}
          {fld("Language","language","text", ["Hindi","English","Hindi + English"])}
        </div>

        {/* Factory Info */}
        <div className="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
          <div className="px-4 py-3 bg-gray-50 border-b border-gray-100">
            <p className="text-gray-500 text-xs font-extrabold uppercase tracking-wider">Factory Info</p>
          </div>
          {[
            { label:"Factory",       value:user.tenantName||"Sharma Garments" },
            { label:"Team Size",     value:myTeam.length+" tailors"           },
            { label:"Reports Today", value:reports.length+" entries"          },
            { label:"Status",        value:"Active Supervisor"                 },
          ].map(item=>(
            <div key={item.label} className="flex items-center justify-between px-4 py-3.5 border-b border-gray-50 last:border-0">
              <span className="text-gray-500 text-sm">{item.label}</span>
              <span className="text-gray-900 text-sm font-bold">{item.value}</span>
            </div>
          ))}
        </div>

        {/* Jobs Button */}
        <button onClick={()=>setShowJobs(true)}
          className="w-full bg-blue-500 text-white font-extrabold text-sm py-4 rounded-2xl shadow-md shadow-blue-200 active:scale-[0.98] active:bg-blue-600 transition flex items-center justify-center gap-3">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="white" strokeWidth="2" fill="none"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2M12 12v4M10 14h4" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
          Available Jobs
          <span className="bg-white text-blue-600 text-xs font-black px-2 py-0.5 rounded-full">{jobs.filter(j=>j.status==="active").length}</span>
        </button>

        <button onClick={onLogout}
          className="w-full bg-red-50 border border-red-200 text-red-500 font-bold text-sm py-4 rounded-2xl active:scale-[0.98] transition">
          Sign Out / लॉगआउट
        </button>
      </div>

      {/* Jobs Full Panel */}
      {showJobs && (
        <div className="fixed inset-0 z-50 bg-gray-50 flex flex-col" style={{fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
          <div className="bg-white border-b border-gray-100 px-4 py-4 flex items-center gap-3 shadow-sm">
            <button onClick={()=>setShowJobs(false)}
              className="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center active:scale-95 transition">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#374151" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <div>
              <p className="text-gray-900 font-extrabold text-base">Available Jobs</p>
              <p className="text-gray-400 text-xs">{jobs.filter(j=>j.status==="active").length} openings • Sharma Garments</p>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3 pb-8">
            <div className="rounded-3xl p-5" style={{background:"linear-gradient(135deg,#1D4ED8,#3B82F6)"}}>
              <p className="text-blue-200 text-xs font-bold uppercase tracking-widest">Hiring Now</p>
              <p className="text-white text-3xl font-black mt-1">{jobs.filter(j=>j.status==="active").length} Jobs Open</p>
              <p className="text-blue-200 text-sm mt-1">Sharma Garments Pvt Ltd</p>
            </div>
            {jobs.map(job=>(
              <div key={job.id} className="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                <div className="h-1 bg-gradient-to-r from-blue-400 to-cyan-400"/>
                <div className="p-4">
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <div>
                      <p className="text-gray-900 font-extrabold">{job.title}</p>
                      <p className="text-gray-400 text-sm mt-0.5">{job.department}{job.postedDate?" ·"+job.postedDate:""}</p>
                    </div>
                    <span className={`text-xs font-bold px-2.5 py-1 rounded-full border shrink-0 ${job.status==="active"?"bg-green-50 text-green-600 border-green-200":"bg-gray-50 text-gray-400 border-gray-200"}`}>
                      {job.status==="active"?"Active":"Closed"}
                    </span>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-2">
                    {job.salary && <span className="bg-gray-50 border border-gray-200 text-gray-600 text-xs font-semibold px-3 py-1.5 rounded-xl">{job.salary}</span>}
                    {job.experience && <span className="bg-gray-50 border border-gray-200 text-gray-600 text-xs font-semibold px-3 py-1.5 rounded-xl">{job.experience} exp</span>}
                    {job.openings && <span className="bg-blue-50 border border-blue-100 text-blue-600 text-xs font-semibold px-3 py-1.5 rounded-xl">{job.openings} posts</span>}
                  </div>
                  {job.description && <p className="text-gray-400 text-xs leading-relaxed">{job.description}</p>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
    );
  };

  // ══════════════════════════════════════════
  // WORK ENTRIES TAB (Approve / Reject)
  // ══════════════════════════════════════════
  const WorkEntriesTab = () => {
    // Use live shared entries from context
    const contextEntries = sharedEntries
      ? sharedEntries.filter(e => perms.canViewAllDepts || e.department === myDept)
      : MOCK_DB.workEntries.map(e=>({...e, status:e.status||"pending"}));
    const [wEntries, setWEntries] = useState(contextEntries);

    // Sync with new entries from shared state
    React.useEffect(() => {
      if (sharedEntries) {
        setWEntries(sharedEntries.filter(e => perms.canViewAllDepts || e.department === myDept));
      }
    }, [sharedEntries?.length]);
    const [filter,      setFilter]      = useState("pending");
    const [selected,    setSelected]    = useState(null);
    const [expandedRow, setExpandedRow] = useState(null);
    const [showAdd,     setShowAdd]     = useState(false);
    const [addErr,      setAddErr]      = useState("");
    const [addSaved,    setAddSaved]    = useState(false);
    const [confirmDlg,  setConfirmDlg]  = useState(null); // {id, status, title, msg}
    const toast = useToast();
    // Style Balance — selectedStyleId & expandedOpId SupervisorPanel level pe hain (closure via parent)
    const [historyStyle,    setHistoryStyle]    = useState(null);
    // Cutting form states — must be at top level (no hooks in conditionals)
    const [showCutForm, setShowCutForm] = useState(false);
    const [cutForm,     setCutForm]     = useState({ date:TODAY, styleId:"", marker:"", sizes:[{size:"",bundles:"",pcsPerBundle:""}] });
    const [cutErr,      setCutErr]      = useState("");
    const [cutOk,       setCutOk]       = useState(false);
    const EMPTY_ADD = { workerId:"", date:TODAY, styleId:"", operationId:"", pieces:"", note:"", addCutting:false, cuttingMarker:"", cuttingSizes:[{size:"",bundles:"",pcsPerBundle:""}], selectedCuts:[] };
    const [addForm,  setAddForm]  = useState(EMPTY_ADD);

    const filtered = filter ==="all" ? wEntries : wEntries.filter(e => e.status === filter);

    const updateStatus = (id, status) => {
      setWEntries(prev => prev.map(e => e.id === id ? { ...e, status } : e));
      if (sharedActions?.updateEntryStatus) sharedActions.updateEntryStatus(id, status, user.name);
      setSelected(null);
      if (status ==="approved") toast?.("Entry approve ho gayi!","success");
      else if (status ==="rejected") toast?.("Entry reject kar di gayi।","error");
      else toast?.("Entry pending mein wapas।","info");
    };

    const onStatusRequest = (id, status) => {
      if (status ==="rejected") {
        setConfirmDlg({ id, status, title:"Entry Reject करें?", msg:"Yeh entry reject ho jayegi. Kya aap sure hain?" });
      } else {
        updateStatus(id, status);
      }
    };

    const pendingCount = wEntries.filter(e => e.status ==="pending").length;

    const selWorker   = (sharedWorkers||MOCK_DB.workers).find(w => w.id === addForm.workerId);
    const selStyle    = (sharedStyles||MOCK_DB.styles).find(s => s.id === addForm.styleId);
    const selOp       = (sharedOperations||MOCK_DB.operations).find(o => o.id === addForm.operationId);
    const addAmount   = selOp ? (parseFloat(selOp.pieceRate) * (parseInt(addForm.pieces)||0)) : 0;

    // Balance pieces — operation wise (style ki total cutting - is operation mein already used)
    const balancePieces = (() => {
      if (!addForm.styleId || !addForm.operationId) return null;
      // Us style ki saari cutting ka total
      const allStyleCuts = (sharedCuts||cuts||[]).filter(c => c.styleId === addForm.styleId);
      const cuttingTotal = allStyleCuts.reduce((s,c) => s+(+c.totalPieces||0), 0);
      if (cuttingTotal === 0) return null;
      // Sirf wEntries use karo — sharedEntries already wEntries mein sync hai, double count na ho
      const usedPieces = wEntries
        .filter(e => e.styleId===addForm.styleId && e.operationId===addForm.operationId && e.status!=="rejected")
        .reduce((s,e) => s+(+e.pieces||0), 0);
      return { total: cuttingTotal, used: usedPieces, remaining: Math.max(0, cuttingTotal - usedPieces) };
    })();

    // Auto-fill pieces with balance remaining jab style+operation set ho
    React.useEffect(() => {
      if (balancePieces && balancePieces.remaining > 0 && !addForm.pieces) {
        setAddForm(f => ({ ...f, pieces: String(balancePieces.remaining) }));
      }
    }, [addForm.styleId, addForm.operationId]);

    const handleAddEntry = () => {
      if (!addForm.workerId)   { setAddErr("Worker चुनें।"); return; }
      if (!addForm.date)       { setAddErr("Date डालें।"); return; }
      if (!addForm.styleId)    { setAddErr("Style चुनें।"); return; }
      if (!addForm.operationId){ setAddErr("Operation चुनें।"); return; }
      if (!addForm.pieces || +addForm.pieces < 1) { setAddErr("Pieces डालें।"); return; }
      // Complete check — balance 0 ho to entry band
      if (balancePieces !== null && balancePieces.remaining === 0) {
        setAddErr("✅ इस style+operation का cutting balance पूरा हो चुका है। Entry नहीं जोड़ी जा सकती।"); return;
      }
      // Cutting lock check — agar saare lots locked hain to entry band
      const _allCutsForLockCheck = (sharedCuts||cuts||[]).filter(c => c.styleId === addForm.styleId);
      if (_allCutsForLockCheck.length > 0) {
        const _allLocked = _allCutsForLockCheck.every(c => {
          const _used = wEntries.filter(e => e.styleId===c.styleId && e.status!=="rejected").reduce((s,e)=>s+(+e.pieces||0),0);
          const _totalCut = _allCutsForLockCheck.reduce((s,x)=>s+(+x.totalPieces||0),0);
          const _isComplete = _totalCut > 0 && _used >= _totalCut;
          const _manual = lockedCuts[c.id];
          return _isComplete || _manual === true || (_manual === undefined && _used === 0);
        });
        if (_allLocked) { setAddErr("🔒 Cutting locked है! Entry नहीं जोड़ी जा सकती।"); return; }
      }
      // Payment timing lock check
      const plPeriod = getPaymentPeriod(paymentLock);
      if (plPeriod && (addForm.date < plPeriod.start || addForm.date > plPeriod.end)) {
        setAddErr(`[!] Date allowed period में नहीं है!\nAllowed: ${plPeriod.start} → ${plPeriod.end} (${plPeriod.label})`); return;
      }

      // Balance check — pieces balance se zyada nahi honi chahiye
      if (balancePieces !== null && +addForm.pieces > balancePieces.remaining) {
        setAddErr(`[!] Pieces (${addForm.pieces}) balance (${balancePieces.remaining}) से ज्यादा हैं! Entry save नहीं होगी।`);
        return;
      }

      // Duplicate check — sharedEntries + wEntries dono check karo
      const allEntries = [...(sharedEntries||[]), ...wEntries];
      const duplicate = allEntries.find(e =>
        e.workerId    === addForm.workerId &&
        e.styleId     === addForm.styleId &&
        e.operationId === addForm.operationId &&
        e.date        === addForm.date &&
        e.status      !=="rejected"
      );
      if (duplicate) {
        setAddErr(`[!] ${duplicate.workerName} की इस style+operation में ${addForm.date} को entry पहले से है! (${duplicate.pieces} pcs)`);
        return;
      }
      const w = (sharedWorkers||MOCK_DB.workers).find(x => x.id === addForm.workerId);
      const s = (sharedStyles||MOCK_DB.styles).find(x => x.id === addForm.styleId);
      const o = (sharedOperations||MOCK_DB.operations).find(x => x.id === addForm.operationId);
      // Save work entry with selected cutting info
      const selCutsData = (addForm.selectedCuts||[]).map(id => {
        const c = (sharedCuts||cuts||[]).find(x=>x.id===id);
        return c ? { id:c.id, marker:c.marker, totalPieces:c.totalPieces, date:c.date } : null;
      }).filter(Boolean);

      const newEntry = {
        id:"we"+Date.now(),
        workerId:    w.id,        workerName:  w.name,
        staffId:     w.staffId,   department:  w.department,
        styleId:     s.id,        styleName:   s.styleName,
        operationId: o.id,        operation:   o.name,
        date:        addForm.date,
        pieces:      +addForm.pieces,
        pieceRate:   o.pieceRate,
        amount:      addAmount,
        note:        addForm.note,
        status:"approved",
        addedBy:"supervisor",
        cuttingRefs: selCutsData,
      };

      setWEntries(prev => [newEntry, ...prev]);
      // sharedEntries mein bhi save — worker panel mein bhi dikhega
      if (sharedActions?.addEntry) sharedActions.addEntry(newEntry);
      // Style aur operation view preserve karo — wapas operation balance pe rahe
      const savedStyleId = addForm.styleId;
      const savedOpId    = addForm.operationId;
      setShowAdd(false); setAddErr(""); setAddForm(EMPTY_ADD);
      setSelectedStyleId(savedStyleId);
      setExpandedOpId(savedOpId);
      setAddSaved(true); setTimeout(()=>setAddSaved(false), 2500);
    };

    const statusMeta = {
      pending:  { label:"Pending",  bar:"bg-amber-400",  text:"text-amber-600",  bg:"bg-amber-50",  border:"border-amber-200"  },
      approved: { label:"Approved", bar:"bg-green-500",  text:"text-green-600",  bg:"bg-green-50",  border:"border-green-200"  },
      rejected: { label:"Rejected", bar:"bg-rose-400",    text:"text-rose-500",    bg:"bg-rose-50",    border:"border-rose-200"  },
    };

    const selEntry = selected ? wEntries.find(e => e.id === selected) : null;

    return (
      <div className="px-4 pt-5 pb-28 space-y-4">

        {/* Payment Timing Banner */}
        {(() => {
          const plPeriod = getPaymentPeriod(paymentLock);
          return plPeriod ? (
            <div className="bg-blue-50 border border-blue-200 rounded-2xl px-4 py-3 flex items-start gap-3">
              <SvgIcon name="clock" size={18} className="text-blue-400 shrink-0" />
              <div>
                <p className="text-blue-800 font-extrabold text-sm">Current Entry Period</p>
                <p className="text-blue-600 text-xs font-semibold mt-0.5">{plPeriod.label}</p>
                <p className="text-blue-400 text-[10px] mt-0.5">{plPeriod.start} → {plPeriod.end}</p>
              </div>
            </div>
          ) : (
            <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex items-center gap-3">
              <SvgIcon name="unlock" size={18} className="text-green-500" />
              <p className="text-green-700 text-sm font-semibold">कोई timing lock नहीं — सभी dates allowed</p>
            </div>
          );
        })()}

        {/* ── STYLE BALANCE — All Styles ── */}
        {entriesSection ==="balance" && (() => {

          // Build stats for ALL styles
          const allStyleStats = (sharedStyles||MOCK_DB.styles).map(style => {
            const styleCuts = (sharedCuts || cuts || []).filter(c => c.styleId === style.id);
            const cuttingLimit = styleCuts.reduce((s, c) => s + (+c.totalPieces || 0), 0);
            const limit = cuttingLimit > 0 ? cuttingLimit : style.totalQuantity;
            const styleEntries = wEntries.filter(e => e.styleId === style.id && e.status !=="rejected");
            const done     = styleEntries.reduce((s, e) => s + (e.pieces || 0), 0);
            const pending  = wEntries.filter(e => e.styleId === style.id && e.status ==="pending").reduce((s, e) => s + (e.pieces || 0), 0);
            const approved = wEntries.filter(e => e.styleId === style.id && e.status ==="approved").reduce((s, e) => s + (e.pieces || 0), 0);
            const balance  = Math.max(0, limit - done);
            const pct      = limit > 0 ? Math.round((done / limit) * 100) : 0;
            const ops = (sharedOperations||MOCK_DB.operations)
              .filter(op => perms.canViewAllDepts || op.department === myDept)
              .map(op => {
                const opDone    = wEntries.filter(e => e.styleId === style.id && e.operationId === op.id && e.status !=="rejected").reduce((s,e)=>s+e.pieces,0);
                const opPending = wEntries.filter(e => e.styleId === style.id && e.operationId === op.id && e.status ==="pending").reduce((s,e)=>s+e.pieces,0);
                const opBal     = Math.max(0, limit - opDone);
                const opPct     = limit > 0 ? Math.round((opDone / limit) * 100) : 0;
                return { op, done: opDone, pending: opPending, balance: opBal, pct: opPct };
              });
            const history = [...wEntries].filter(e => e.styleId === style.id).sort((a,b) => new Date(b.date)-new Date(a.date));
            return { style, limit, done, pending, approved, balance, pct, ops, history };
          });

          const totalStyles  = allStyleStats.length;
          const activeStyles = allStyleStats.filter(s => s.style.status ==="active").length;

          // ── FULL DETAIL PAGE ──
          if (selectedStyleId) {
            const stat = allStyleStats.find(s => s.style.id === selectedStyleId);
            if (!stat) { setSelectedStyleId(null); return null; }
            const { style, limit, done, pending, balance, pct, ops, history } = stat;
            const barColor = pct >= 100 ?"bg-red-400" : pct >= 80 ?"bg-amber-400" :"bg-green-500";

            // Cutting entries for this style
            const styleCuts = (sharedCuts||cuts||[]).filter(c => c.styleId === style.id);
            const cuttingTotal = styleCuts.reduce((s,c)=>s+(+c.totalPieces||0),0);

            const updateSize = (idx, field, val) =>
              setCutForm(f => ({ ...f, sizes: f.sizes.map((r,i)=> i===idx ? {...r,[field]:val} : (idx===0&&(field==="bundles"||field==="pcsPerBundle")?{...r,[field]:val}:r)) }));

            const handleAddCut = () => {
              if (!cutForm.date) { setCutErr("Date डालें।"); return; }
              const validSizes = cutForm.sizes.filter(r=>r.size&&r.bundles&&r.pcsPerBundle);
              if (!validSizes.length) { setCutErr("कम से कम एक size भरें।"); return; }
              const sizesWithTotal = validSizes.map(r=>({...r,bundles:+r.bundles,pcsPerBundle:+r.pcsPerBundle,total:sizeTotal(r)}));
              const totalP = sizesWithTotal.reduce((s,r)=>s+r.total,0);
              const totalL = sizesWithTotal.reduce((s,r)=>s+(+r.bundles||0),0);
              const newCut = { id:"c"+Date.now(), date:cutForm.date, styleId:style.id, style:style.styleName, marker:cutForm.marker, sizes:sizesWithTotal, totalPieces:totalP, totalLayers:totalL, status:"done" };
              setCuts(prev=>[newCut,...prev]);
              if (sharedActions?.addCut) sharedActions.addCut(newCut);
              setCutForm({date:TODAY,styleId:style.id,marker:"",sizes:[{size:"",bundles:"",pcsPerBundle:""}]});
              setCutErr(""); setShowCutForm(false); setCutOk(true);
              setTimeout(()=>setCutOk(false),2500);
            };

            return (
              <div className="space-y-4">
                {/* Back button */}
                <button onClick={() => { setSelectedStyleId(null); setExpandedOpId(null); }}
                  className="flex items-center gap-1.5 text-orange-500 font-extrabold text-sm active:opacity-70 transition">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

                <div></div>
              </div>

              {/* Rows — Accordion on tap */}
              {filtered.map((e, i) => {
                const m = statusMeta[e.status] || statusMeta.pending;
                const leftBorder = e.status==="approved"?"border-l-green-500":e.status==="rejected"?"border-l-rose-400":"border-l-amber-400";
                const isExpanded = expandedRow === e.id;

                // Same operation ke saare workers (current filtered entries mein)
                const sameOpWorkers = wEntries.filter(x =>
                  x.operationId === e.operationId &&
                  x.styleId     === e.styleId &&
                  x.id          !== e.id
                );

                return (
                  <div key={e.id} className={`border-b border-gray-100 last:border-0 ${i%2===0?"bg-white":"bg-gray-50/50"}`}>

                    {/* ── Main Row ── */}
                    <div
                      className={`grid px-2 py-2.5 border-l-4 ${leftBorder} cursor-pointer active:bg-orange-50/50 transition`}
                      style={{gridTemplateColumns:"1.4fr 1.6fr 1.8fr 1.8fr 0.9fr 1.1fr 0.9fr 0.4fr"}}
                      onClick={()=> setExpandedRow(isExpanded ? null : e.id)}>

                      {/* DATE */}
                      <div>
                        <p className="text-gray-800 font-bold text-[10px] leading-tight">{e.date?.slice(5)}</p>
                        <p className="text-gray-400 text-[10px]">{e.date?.slice(0,4)}</p>
                      </div>
                      {/* WORKER */}
                      <div className="min-w-0">
                        <p className="text-gray-900 font-extrabold text-[10px] truncate leading-tight">{e.workerName?.split("")[0]}</p>
                        <p className="text-gray-400 text-[10px]">{e.staffId}</p>
                      </div>
                      {/* STYLE */}
                      <div className="min-w-0">
                        <p className="text-gray-600 text-[10px] truncate leading-tight">{(e.styleName||e.style||"").replace(/Men's |Women's /g,"")}</p>
                        <p className={`text-[10px] font-bold ${m.text}`}>{m.label}</p>
                      </div>
                      {/* OPERATION */}
                      <div className="min-w-0">
                        <span className={`text-[10px] font-bold truncate block ${m.text==="text-amber-600"?"text-amber-500":"text-blue-600"}`}>{e.operation}</span>
                        {sameOpWorkers.length > 0 && (
                          <span className="text-[10px] text-purple-500 font-bold">+{sameOpWorkers.length} more</span>
                        )}
                      </div>
                      {/* QTY */}
                      <div className="text-right">
                        <p className="text-orange-500 font-extrabold text-sm leading-tight">{e.pieces}</p>
                        <p className="text-gray-400 text-[10px]">pcs</p>
                      </div>
                      {/* RATE */}
                      <div className="text-right">
                        <p className="text-gray-700 font-bold text-[10px]">₹{(+e.pieceRate||0).toFixed(1)}</p>
                        <p className="text-gray-400 text-[10px]">/pc</p>
                      </div>
                      {/* AMOUNT */}
                      <div className="text-right">
                        <p className={`font-extrabold text-sm leading-tight ${e.status==="approved"?"text-green-600":e.status==="rejected"?"text-rose-400":"text-amber-600"}`}>
                          ₹{(+e.amount||0).toFixed(0)}
                        </p>
                      </div>
                      {/* Arrow */}
                      <div className="flex items-center justify-end">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                          className={`text-gray-400 transition-transform duration-200 ${isExpanded?"rotate-180":""}`}>
                          <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </div>
                    </div>

                    {/* ── Expanded: Operation-wise all workers ── */}
                    {isExpanded && (
                      <div className="bg-purple-50 border-t border-purple-100 px-3 py-3">

                        {/* Header */}
                        <div className="flex items-center justify-between mb-2.5">
                          <div>
                            <p className="text-purple-700 font-extrabold text-xs">
                              {e.operation} — सभी Workers
                            </p>
                            <p className="text-purple-400 text-[10px] mt-0.5">{e.styleName || e.style}</p>
                          </div>
                          <button onClick={()=>setSelected(e.id)}
                            className="text-[10px] font-bold text-blue-600 bg-white border border-blue-200 rounded-lg px-2 py-1 active:opacity-70">
                            Detail →
                          </button>
                        </div>

                        {/* This entry (current row) */}
                        <div className="space-y-1.5">
                          {/* Current worker row */}
                          {[e, ...sameOpWorkers].map((w, wi) => {
                            const wm = statusMeta[w.status] || statusMeta.pending;
                            const isThis = w.id === e.id;
                            return (
                              <div key={w.id}
                                className={`flex items-center gap-2 rounded-xl px-3 py-2 border ${isThis ?"bg-white border-purple-200 shadow-sm" :"bg-white/70 border-gray-100"}`}>
                                {/* Rank number */}
                                <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 ${isThis?"bg-purple-500 text-white":"bg-gray-200 text-gray-600"}`}>
                                  {wi+1}
                                </div>
                                {/* Worker info */}
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-1">
                                    <p className="text-gray-900 font-extrabold text-xs truncate">{w.workerName}</p>
                                    {isThis && <span className="text-[10px] bg-purple-100 text-purple-600 font-bold px-1 rounded">This</span>}
                                  </div>
                                  <p className="text-gray-400 text-[10px]">{w.staffId} · {w.date}</p>
                                </div>
                                {/* Pieces */}
                                <div className="text-center shrink-0">
                                  <p className="text-orange-500 font-extrabold text-sm leading-none">{w.pieces}</p>
                                  <p className="text-gray-400 text-[10px]">pcs</p>
                                </div>
                                {/* Amount */}
                                <div className="text-right shrink-0">
                                  <p className={`font-extrabold text-xs leading-none ${w.status==="approved"?"text-green-600":w.status==="rejected"?"text-rose-400":"text-amber-600"}`}>
                                    ₹{(+w.amount||0).toFixed(0)}
                                  </p>
                                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${wm.bg} ${wm.text} border ${wm.border}`}>
                                    {wm.label}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        {/* Operation total */}
                        {(() => {
                          const allOpEntries = [e, ...sameOpWorkers];
                          const totalPcs = allOpEntries.reduce((s,x)=>s+(+x.pieces||0),0);
                          const totalAmt = allOpEntries.reduce((s,x)=>s+(+x.amount||0),0);
                          const approvedPcs = allOpEntries.filter(x=>x.status==="approved").reduce((s,x)=>s+(+x.pieces||0),0);
                          return (
                            <div className="mt-2 flex items-center justify-between bg-purple-100 rounded-xl px-3 py-2 border border-purple-200">
                              <div>
                                <p className="text-purple-700 text-[10px] font-extrabold uppercase tracking-wide">Operation Total</p>
                                <p className="text-purple-500 text-[10px]">{allOpEntries.length} workers · {approvedPcs} approved pcs</p>
                              </div>
                              <div className="text-right">
                                <p className="text-orange-600 font-black text-sm leading-none">{totalPcs} pcs</p>
                                <p className="text-green-600 font-extrabold text-xs">₹{totalAmt.toFixed(0)}</p>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Footer total row */}
              <div className="bg-gray-900 grid px-2 py-2.5 text-[10px] font-extrabold"
                style={{gridTemplateColumns:"1.4fr 1.6fr 1.8fr 1.8fr 0.9fr 1.1fr 0.9fr 0.4fr"}}>
                <div className="text-gray-400">{filtered.length} rows</div>
                <div className="col-span-3 text-gray-300 uppercase tracking-wide">TOTAL</div>
                <div className="text-orange-400 text-right text-sm font-black">
                  {filtered.reduce((s,e)=>s+(+e.pieces||0),0)}
                </div>
                <div></div>
                <div className="text-green-400 text-right text-sm font-black">
                  ₹{filtered.reduce((s,e)=>s+(+e.amount||0),0).toFixed(0)}
                </div>
                <div></div>
              </div>
            </div>
          )}
        </>}

        {/* ── CUTTING ENTRIES ── */}
        {entriesSection ==="team" && (() => {
          const [tmSearch, setTmSearch] = React.useState("");
          const [tmSelWorker, setTmSelWorker] = React.useState(null);
          const DEPT_C = { Stitching:"#3B82F6", Finishing:"#10B981", QC:"#F59E0B", Cutting:"#EF4444", Embroidery:"#8B5CF6" };
          const byDept = myTeam.reduce((acc,w)=>{ (acc[w.department]||(acc[w.department]=[])).push(w); return acc; },{});
          const filteredTm = tmSearch ? myTeam.filter(w=>w.name.toLowerCase().includes(tmSearch.toLowerCase())||w.staffId.toLowerCase().includes(tmSearch.toLowerCase())) : null;

          if (tmSelWorker) {
            const w = myTeam.find(x=>x.id===tmSelWorker);
            const wEnt = [...(sharedEntries||[]), ...wEntries].filter(e=>e.workerId===w.id);
            const tAmt = wEnt.reduce((s,e)=>s+(e.amount||0),0);
            const tPcs = wEnt.reduce((s,e)=>s+(e.pieces||0),0);
            const col  = DEPT_C[w.department]||"#64748B";
            return (
              <div className="space-y-4">
                <button onClick={()=>setTmSelWorker(null)}
                  className="flex items-center gap-1.5 text-blue-500 font-bold text-sm">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  My Team पर वापस
                </button>
                {/* Worker info card */}
                <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                  <div className="flex items-center gap-3 mb-3">
                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-extrabold text-lg shrink-0" style={{background:col}}>
                      {w.name.charAt(0)}
                    </div>
                    <div className="flex-1">
                      <p className="text-gray-900 font-extrabold text-base">{w.name}</p>
                      <p className="text-gray-400 text-xs">{w.staffId} · {w.department}</p>
                      <p className="text-gray-300 text-xs">Joined {w.joinDate}</p>
                    </div>
                    <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${w.status==="active"?"bg-green-50 text-green-600 border-green-200":"bg-gray-50 text-gray-400 border-gray-200"}`}>
                      {w.status==="active"?"Active":"Inactive"}
                    </span>
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    {[
                      {label:"Total Pcs", val:tPcs, color:"text-blue-600", bg:"bg-blue-50"},
                      {label:"Earnings",  val:"₹"+Math.round(tAmt), color:"text-green-600", bg:"bg-green-50"},
                      {label:"Entries",   val:wEnt.length, color:"text-orange-600", bg:"bg-orange-50"},
                    ].map(x=>(
                      <div key={x.label} className={`${x.bg} rounded-xl py-2.5 text-center`}>
                        <p className={"font-extrabold text-sm"+x.color}>{x.val}</p>
                        <p className="text-gray-400 text-sm mt-0.5">{x.label}</p>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Entries list */}
                <p className="text-xs font-extrabold text-gray-400 uppercase tracking-wider">Work Entries</p>
                {wEnt.length===0 ? (
                  <div className="text-center py-10 bg-white rounded-2xl border border-gray-100">
                    <p className="text-gray-400 text-sm">कोई entry नहीं</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {wEnt.slice(0,20).map(e=>(
                      <div key={e.id} className="bg-white border border-gray-100 rounded-2xl px-4 py-3 flex items-center gap-3 shadow-sm">
                        <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style={{background:col+"22"}}>
                          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke={col} strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="12" r="9" stroke={col} strokeWidth="1.5"/></svg>
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-gray-900 font-bold text-sm truncate">{e.styleName||e.style}</p>
                          <p className="text-gray-400 text-xs">{e.operation} · {e.date}</p>
                        </div>
                        <div className="text-right shrink-0">
                          <p className="text-green-600 font-extrabold text-sm">₹{Math.round(e.amount||0)}</p>
                          <p className="text-gray-400 text-xs">{e.pieces} pcs</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          }

          return (
            <div className="space-y-3">
              {/* Search + Add button */}
              <div className="flex gap-2">
                <div className="flex-1 relative">
                  <svg className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.8"/><path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                  <input value={tmSearch} onChange={e=>setTmSearch(e.target.value)}
                    placeholder="Worker नाम या ID से ढूंढें..."
                    className="w-full bg-white border border-gray-200 rounded-2xl pl-10 pr-4 py-3 text-sm text-gray-900 focus:outline-none focus:border-blue-400 shadow-sm" style={{fontSize:"16px"}}/>
                </div>
                <button onClick={()=>setShowAddMember(true)}
                  className="w-12 h-12 bg-blue-500 hover:bg-blue-600 active:scale-90 text-white rounded-2xl flex items-center justify-center shadow-md shadow-blue-200 shrink-0 transition-all">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" strokeWidth="2.5" strokeLinecap="round"/></svg>
                </button>
              </div>

              {/* Add Member Modal */}
              <Modal open={showAddMember} onClose={()=>setShowAddMember(false)} title="Worker ID से जोड़ें">
                <AddMemberById
                  myTeam={myTeam}
                  onAdd={(worker)=>{ setMyTeam(prev=>[...prev,{...worker,status:"active"}]); setShowAddMember(false); }}
                  onClose={()=>setShowAddMember(false)}
                  TODAY={TODAY}
                />
              </Modal>
              {/* List */}
              {tmSearch ? (
                <div className="space-y-2">
                  {(filteredTm||[]).length===0 ? (
                    <div className="text-center py-10 bg-white rounded-2xl border border-gray-100">
                      <p className="text-gray-400">कोई worker नहीं मिला</p>
                    </div>
                  ) : (filteredTm||[]).map(w=>(
                    <button key={w.id} onClick={()=>setTmSelWorker(w.id)} className="w-full text-left">
                      <WorkerCard w={w} onClick={()=>setTmSelWorker(w.id)}/>
                    </button>
                  ))}
                </div>
              ) : (
                Object.entries(byDept).map(([dept,workers])=>(
                  <div key={dept} className="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between px-4 py-3 border-b border-gray-50"
                      style={{borderLeftWidth:"4px",borderLeftColor:DEPT_C[dept]||"#64748B",borderLeftStyle:"solid"}}>
                      <div>
                        <p className="text-gray-900 font-extrabold text-sm">{dept}</p>
                        <p className="text-gray-400 text-xs">{workers.length} workers</p>
                      </div>
                      <span className="text-xs font-bold px-2.5 py-1 rounded-full"
                        style={{background:(DEPT_C[dept]||"#64748B")+"22",color:DEPT_C[dept]||"#64748B"}}>
                        {workers.length}
                      </span>
                    </div>
                    <div className="divide-y divide-gray-50">
                      {workers.map(w=>(
                        <button key={w.id} onClick={()=>setTmSelWorker(w.id)} className="w-full text-left">
                          <WorkerCard w={w} onClick={()=>setTmSelWorker(w.id)}/>
                        </button>
                      ))}
                    </div>
                  </div>
                ))
              )}
            </div>
          );
        })()}

        {/* Detail / Action bottom sheet */}
        {/* Add Entry Modal */}
        <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="नई Work Entry जोड़ें">
          <div className="space-y-4">
            {addErr && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-600 text-sm">{addErr}</div>}

            {/* Worker select — prominent */}
            <div>
              <p className="text-sm font-bold text-gray-800 mb-1.5">Worker <span className="text-red-500">*</span></p>
              <select value={addForm.workerId}
                onChange={e=>setAddForm(f=>({...f,workerId:e.target.value}))}
                className={"w-full border-2 rounded-2xl px-4 py-3.5 font-bold focus:outline-none transition"+(addForm.workerId?"bg-green-50 border-green-400 text-green-800":"bg-gray-50 border-gray-200 text-gray-500")}
                style={{fontSize:"16px"}}>
                <option value="">-- Worker चुनें --</option>
                {myTeam.filter(w=>w.status==="active" && (perms.canViewAllDepts || w.department===myDept)).map(w=>(
                  <option key={w.id} value={w.id}>{w.name} ({w.staffId})</option>
                ))}
              </select>
              {addForm.workerId && selWorker && (
                <div className="flex items-center gap-2 mt-2 bg-green-50 border border-green-200 rounded-xl px-3 py-2">
                  <div className="w-7 h-7 rounded-lg bg-green-500 flex items-center justify-center text-white font-extrabold text-xs shrink-0">
                    {selWorker.name.charAt(0)}
                  </div>
                  <div>
                    <p className="text-green-800 font-extrabold text-sm">{selWorker.name}</p>
                    <p className="text-green-500 text-xs">{selWorker.staffId} · {selWorker.department}</p>
                  </div>
                </div>
              )}
            </div>

            <Input label="Date" type="date" value={addForm.date} max={TODAY}
              onChange={e=>setAddForm(f=>({...f,date:e.target.value}))}/>

            {addForm.styleId && selectedStyleId ? (() => {
              const st = (sharedStyles||MOCK_DB.styles).find(s => s.id === addForm.styleId);
              return (
                <div className="bg-orange-50 border border-orange-200 rounded-2xl px-4 py-3 flex items-center gap-3">
                  <div className="w-8 h-8 rounded-xl bg-orange-500 flex items-center justify-center shrink-0">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="white" strokeWidth="2" fill="none"/><path d="M14 2v6h6" stroke="white" strokeWidth="2"/></svg>
                  </div>
                  <div>
                    <p className="text-[10px] text-orange-400 font-bold uppercase tracking-wide">Style (Auto-set)</p>
                    <p className="text-orange-800 font-extrabold text-sm">{st?.styleName}</p>
                  </div>
                </div>
              );
            })() : (
              <Select label="Style / Order" value={addForm.styleId}
                onChange={e=>setAddForm(f=>({...f,styleId:e.target.value,selectedCuts:[]}))}>
                <option value="">-- Style चुनें --</option>
                {(sharedStyles||MOCK_DB.styles).filter(s=>s.status==="active").map(s=>(
                  <option key={s.id} value={s.id}>{s.styleName}</option>
                ))}
              </Select>
            )}

            {/* ── Cutting Records — sabhi dikhenge status ke saath ── */}
            {addForm.styleId && (() => {
              const allCuts = (sharedCuts||cuts||[]);
              const styleCuts = allCuts.filter(c => c.styleId === addForm.styleId);
              if (styleCuts.length === 0) return null;

              const getCutStatus = (c) => {
                // Total cutting for this style (sum of ALL lots)
                const totalCutForStyle = allCuts
                  .filter(x => x.styleId === c.styleId)
                  .reduce((s, x) => s + (+x.totalPieces || 0), 0);
                // Used: only for selected operation (agar select hua ho), warna sabhi
                const used = wEntries
                  .filter(e => e.styleId === c.styleId &&
                    (addForm.operationId ? e.operationId === addForm.operationId : true) &&
                    e.status !== "rejected")
                  .reduce((s, e) => s + (+e.pieces || 0), 0);
                if (totalCutForStyle > 0 && used >= totalCutForStyle) return "complete";
                if (lockedCuts[c.id] === false || used > 0) return "open";
                return "lock";
              };

              const statusMeta = {
                open:     { label:"Entry Open", bg:"bg-green-50",  border:"border-green-200",  text:"text-green-600",  dot:"bg-green-500"  },
                lock:     { label:"Lock",        bg:"bg-red-50",    border:"border-red-200",    text:"text-red-500",    dot:"bg-red-400"    },
                complete: { label:"Complete",    bg:"bg-blue-50",   border:"border-blue-200",   text:"text-blue-600",   dot:"bg-blue-500"   },
              };

              return (
                <div className="space-y-1">
                  <p className="text-[10px] font-extrabold text-gray-400 uppercase tracking-wide px-1">Cutting Records</p>
                  {styleCuts.map(c => {
                    const status = getCutStatus(c);
                    const sm = statusMeta[status];
                    return (
                      <div key={c.id} className={`flex items-center justify-between px-3 py-2 rounded-xl border ${sm.bg} ${sm.border}`}>
                        <div className="flex items-center gap-2">
                          <div className={`w-1.5 h-1.5 rounded-full shrink-0 ${sm.dot}`}/>
                          <p className="text-gray-800 font-bold text-xs">{c.marker || c.id.slice(-4)}</p>
                        </div>
                        <div className="flex items-center gap-2">
                          <p className="text-gray-700 font-extrabold text-xs">{c.totalPieces}</p>
                          <span className={`text-[10px] font-extrabold ${sm.text}`}>{sm.label}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {addForm.operationId && selectedStyleId ? (() => {
              const op = (sharedOperations||MOCK_DB.operations).find(o => o.id === addForm.operationId);
              return (
                <div className="bg-blue-50 border border-blue-200 rounded-2xl px-4 py-3 flex items-center gap-3">
                  <div className="w-8 h-8 rounded-xl bg-blue-500 flex items-center justify-center shrink-0">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="white" strokeWidth="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="white" strokeWidth="1.5"/></svg>

                  <span className="text-blue-600 font-extrabold text-sm bg-blue-100 px-2.5 py-1 rounded-lg">₹{op?.pieceRate}/pc</span>

              <Select label="Operation" value={addForm.operationId}
                onChange={e=>setAddForm(f=>({...f,operationId:e.target.value}))}>
                <option value="">-- Operation चुनें --</option>
                {(sharedOperations||MOCK_DB.operations).map(o=>(
                  <option key={o.id} value={o.id}>{o.name} — Rs {o.pieceRate}/pc</option>
                ))}
              </Select>
            )}

            <Input label="Pieces" type="number" min="1" value={addForm.pieces} placeholder="कितने pieces?"
              onChange={e=>setAddForm(f=>({...f,pieces:e.target.value}))}/>

            {/* Persistent Balance Bar — hamesha dikhta rahe jab tak save na ho */}
            {balancePieces !== null && (
              <div className={`rounded-2xl border-2 overflow-hidden ${
                balancePieces.remaining === 0 ? "border-red-300 bg-red-50" :
                (+addForm.pieces||0) > balancePieces.remaining ? "border-red-300 bg-red-50" :
                "border-green-200 bg-green-50"
              }`}>
                <div className="flex items-center justify-between px-4 py-2 border-b border-black/5">
                  <p className={`text-[10px] font-extrabold uppercase tracking-wide ${
                    balancePieces.remaining === 0 || (+addForm.pieces||0) > balancePieces.remaining
                      ? "text-red-400" : "text-green-500"
                  }`}>📊 Cutting Balance</p>
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                    balancePieces.remaining === 0 ? "bg-red-200 text-red-700" :
                    (+addForm.pieces||0) > balancePieces.remaining ? "bg-red-200 text-red-700" :
                    "bg-green-200 text-green-700"
                  }`}>
                    {balancePieces.remaining === 0 ? "Full" :
                     (+addForm.pieces||0) > balancePieces.remaining ? "⚠ Limit पार!" : "Available"}
                  </span>
                </div>
                <div className="grid grid-cols-3 divide-x divide-black/5">
                  <div className="px-3 py-2.5 text-center">
                    <p className="text-gray-400 text-[10px] font-bold uppercase">Total Cut</p>
                    <p className="text-gray-800 font-black text-lg leading-none mt-0.5">{balancePieces.total}</p>
                  </div>
                  <div className="px-3 py-2.5 text-center">
                    <p className="text-gray-400 text-[10px] font-bold uppercase">Used</p>
                    <p className="text-orange-600 font-black text-lg leading-none mt-0.5">{balancePieces.used}</p>
                  </div>
                  <div className="px-3 py-2.5 text-center">
                    <p className={`text-[10px] font-bold uppercase ${
                      balancePieces.remaining === 0 || (+addForm.pieces||0) > balancePieces.remaining
                        ? "text-red-400" : "text-blue-400"
                    }`}>Balance</p>
                    <p className={`font-black text-lg leading-none mt-0.5 ${
                      balancePieces.remaining === 0 || (+addForm.pieces||0) > balancePieces.remaining
                        ? "text-red-600" : "text-blue-600"
                    }`}>{balancePieces.remaining}</p>
                  </div>
                </div>
                {(+addForm.pieces||0) > balancePieces.remaining && (
                  <div className="bg-red-100 px-3 py-2 border-t border-red-200">
                    <p className="text-red-600 text-xs font-extrabold text-center">
                      ⚠ {addForm.pieces} pieces — Balance ({balancePieces.remaining}) से ज्यादा हैं!
                    </p>
                  </div>
                )}
              </div>
            )}

            {addAmount > 0 && (
              <div className="bg-green-50 border border-green-100 rounded-xl px-4 py-3 flex items-center justify-between">
                <div>
                  <p className="text-green-700 font-extrabold text-xl">Rs {addAmount.toFixed(2)}</p>
                  <p className="text-green-400 text-xs">{addForm.pieces} pcs × Rs {selOp?.pieceRate}/pc</p>
                </div>
                {selWorker && (
                  <div className="text-right">
                    <p className="text-green-700 font-bold text-sm">{selWorker.name}</p>
                    <p className="text-green-400 text-xs">{selWorker.staffId}</p>
                  </div>
                )}
              </div>
            )}

            <Input label="Note (optional)" value={addForm.note} placeholder="कोई comment?"
              onChange={e=>setAddForm(f=>({...f,note:e.target.value}))}/>

            {/* ── Cutting Lock / Complete check ── */}
            {(() => {
              if (!addForm.styleId) return null;
              const allCuts = (sharedCuts||cuts||[]).filter(c => c.styleId === addForm.styleId);
              if (allCuts.length === 0) return null;
              // Complete: balance = 0
              if (balancePieces !== null && balancePieces.remaining === 0) {
                return (
                  <div className="bg-blue-50 border-2 border-blue-300 rounded-2xl px-4 py-3 flex items-center gap-3">
                    <span className="text-2xl">✅</span>
                    <div>
                      <p className="text-blue-700 font-extrabold text-sm">Work Entry Complete है!</p>
                      <p className="text-blue-500 text-xs mt-0.5">इस style+operation का पूरा cutting balance use हो चुका है।</p>
                    </div>
                  </div>
                );
              }
              // Locked: saare lots locked hain
              const allLocked = allCuts.every(c => {
                const usedPieces = wEntries.filter(e => e.styleId===c.styleId && e.status!=="rejected").reduce((s,e)=>s+(+e.pieces||0),0);
                const totalCut = (sharedCuts||cuts||[]).filter(x=>x.styleId===c.styleId).reduce((s,x)=>s+(+x.totalPieces||0),0);
                const isComplete = totalCut > 0 && usedPieces >= totalCut;
                const manual = lockedCuts[c.id];
                return isComplete || manual === true || (manual === undefined && usedPieces === 0);
              });
              if (!allLocked) return null;
              return (
                <div className="bg-red-50 border-2 border-red-300 rounded-2xl px-4 py-3 flex items-center gap-3">
                  <span className="text-2xl">🔒</span>
                  <div>
                    <p className="text-red-700 font-extrabold text-sm">Cutting Locked है!</p>
                    <p className="text-red-500 text-xs mt-0.5">Supervisor ने इस style की cutting lock कर दी है। Entry नहीं जोड़ी जा सकती।</p>
                  </div>
                </div>
              );
            })()}

            <div className="flex gap-3">
              <Btn variant="secondary" className="flex-1" onClick={()=>setShowAdd(false)}>Cancel</Btn>
              {(() => {
                if (!addForm.styleId) return (
                  <Btn className="flex-1 bg-green-600 hover:bg-green-700" onClick={handleAddEntry}>Add Entry →</Btn>
                );
                const isComplete = balancePieces !== null && balancePieces.remaining === 0;
                const allCuts = (sharedCuts||cuts||[]).filter(c => c.styleId === addForm.styleId);
                const allLocked = allCuts.length > 0 && allCuts.every(c => {
                  const usedPieces = wEntries.filter(e => e.styleId===c.styleId && e.status!=="rejected").reduce((s,e)=>s+(+e.pieces||0),0);
                  const totalCut = (sharedCuts||cuts||[]).filter(x=>x.styleId===c.styleId).reduce((s,x)=>s+(+x.totalPieces||0),0);
                  const isCmp = totalCut > 0 && usedPieces >= totalCut;
                  const manual = lockedCuts[c.id];
                  return isCmp || manual === true || (manual === undefined && usedPieces === 0);
                });
                const blocked = isComplete || allLocked;
                return (
                  <Btn
                    className={`flex-1 ${blocked ? "bg-gray-300 cursor-not-allowed opacity-60" : "bg-green-600 hover:bg-green-700"}`}
                    onClick={blocked ? undefined : handleAddEntry}
                    disabled={blocked}
                  >
                    {isComplete ? "✅ Complete" : allLocked ? "🔒 Locked" : "Add Entry →"}
                  </Btn>
                );
              })()}
            </div>
          </div>
        </Modal>

        {selEntry && (() => {
          const m = statusMeta[selEntry.status] || statusMeta.pending;
          // Edit state inside IIFE using ref trick — avoids hooks-in-function issue
          return (
            <EntryDetailSheet
              selEntry={selEntry}
              m={m}
              onClose={()=>setSelected(null)}
              onStatus={onStatusRequest}
              allWEntries={wEntries}
              onSave={(id, updated) => {
                const op = (sharedOperations||MOCK_DB.operations).find(o => o.id === updated.operationId);
                const newPieceRate = op?.pieceRate || selEntry.pieceRate;
                const newAmount = (parseInt(updated.pieces)||0) * newPieceRate;
                setWEntries(prev => prev.map(e => e.id === id ? {
                  ...e,
                  pieces: parseInt(updated.pieces),
                  date: updated.date,
                  operationId: updated.operationId,
                  operation: op?.name || e.operation,
                  pieceRate: newPieceRate,
                  amount: newAmount,
                  note: updated.note,
                } : e));
                setSelected(null);
              }}
              workers={(sharedWorkers||MOCK_DB.workers)}
              operations={(sharedOperations||MOCK_DB.operations)}
              styles={(sharedStyles||MOCK_DB.styles)}
            />
          );
        })()}

        {/* Confirm Dialog */}
        <ConfirmDialog
          open={!!confirmDlg}
          title={confirmDlg?.title}
          message={confirmDlg?.msg}
          danger={true}
          onCancel={() => setConfirmDlg(null)}
          onConfirm={() => { updateStatus(confirmDlg.id, confirmDlg.status); setConfirmDlg(null); }}
        />
      </div>
    );
  };


  // ══════════════════════════════════════════
  // TAB: ATTENDANCE

  // ── Monthly History Sub-view ──
  const MonthlyAttendanceHistory = () => {
    const now = new Date();
    const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2,"0")}`;
    const [selMonth, setSelMonth] = useState(currentMonthStr);
    const [selWorker, setSelWorker] = useState(myTeam[0]?.id ||"");

    const [yr, mn] = selMonth.split("-").map(Number);
    const daysInMonth = new Date(yr, mn, 0).getDate();
    const firstDay = new Date(yr, mn - 1, 1).getDay(); // 0=Sun
    const monthLabel = new Date(yr, mn - 1, 1).toLocaleString("default", { month:"long", year:"numeric" });

    const key = `${selWorker}_${selMonth}`;
    const history = MOCK_ATTENDANCE_HISTORY[key] || {};

    // counts
    const counts = { present: 0, absent: 0, leave: 0, half: 0, holiday: 0, none: 0 };
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${selMonth}-${String(d).padStart(2,"0")}`;
      const st = history[ds] ||"none";
      counts[st] = (counts[st] || 0) + 1;
    }
    const workingDays = daysInMonth - counts.holiday - counts.none;
    const attendRate = workingDays > 0
      ? Math.round(((counts.present + counts.half * 0.5) / workingDays) * 100)
      : 0;

    const goPrev = () => {
      const d = new Date(yr, mn - 2, 1);
      setSelMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,"0")}`);
    };
    const goNext = () => {
      const d = new Date(yr, mn, 1);
      const nm = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,"0")}`;
      if (nm <= currentMonthStr) setSelMonth(nm);
    };
    const canGoNext = selMonth < currentMonthStr;

    const STATUS = {
      present: { bg:"bg-green-500",  text:"text-white",     label:"P"  },
      absent:  { bg:"bg-red-400",    text:"text-white",     label:"A"  },
      leave:   { bg:"bg-blue-400",   text:"text-white",     label:"L"  },
      half:    { bg:"bg-amber-400",  text:"text-white",     label:"H"  },
      holiday: { bg:"bg-gray-100",   text:"text-gray-400",  label:"–"  },
      none:    { bg:"bg-gray-50",    text:"text-gray-200",  label:""  },
    };

    // Team overview sorted by rate
    const teamSummary = myTeam.map(w => {
      const wKey = `${w.id}_${selMonth}`;
      const wHist = MOCK_ATTENDANCE_HISTORY[wKey] || {};
      const wC = { present:0, absent:0, leave:0, half:0, holiday:0, none:0 };
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${selMonth}-${String(d).padStart(2,"0")}`;
        const st = wHist[ds] ||"none";
        wC[st] = (wC[st]||0)+1;
      }
      const wWork = daysInMonth - wC.holiday - wC.none;
      const wRate = wWork > 0 ? Math.round(((wC.present + wC.half * 0.5) / wWork) * 100) : 0;
      return { ...w, ...wC, workingDays: wWork, rate: wRate };
    }).sort((a, b) => b.rate - a.rate);

    return (
      <div className="px-4 pt-4 pb-28 space-y-4">

        {/* Month Navigator */}
        <div className="bg-white border-2 border-green-100 rounded-2xl p-4 space-y-3">
          <div className="flex items-center justify-between">
            <button onClick={goPrev}
              className="w-9 h-9 rounded-xl bg-gray-50 border border-gray-200 flex items-center justify-center text-gray-600 active:scale-95 transition">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            <div className="text-center">
              <p className="text-gray-900 font-extrabold text-base">{monthLabel}</p>
              <p className="text-gray-400 text-sm mt-0.5">Monthly Attendance</p>
            </div>
            <button onClick={goNext} disabled={!canGoNext}
              className={`w-9 h-9 rounded-xl border flex items-center justify-center active:scale-95 transition
                ${canGoNext ?"bg-gray-50 border-gray-200 text-gray-600" :"bg-gray-50 border-gray-100 text-gray-300 cursor-not-allowed"}`}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>

          {/* Worker dropdown */}
          <select value={selWorker} onChange={e => setSelWorker(e.target.value)}
            className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm font-bold text-gray-800 focus:outline-none focus:border-green-400"
            style={{ fontSize:"15px" }}>
            {myTeam.map(w => (
              <option key={w.id} value={w.id}>{w.name} — {w.staffId}</option>
            ))}
          </select>
        </div>

        {/* Attendance Rate + Stats */}
        <div className="bg-white border-2 border-green-100 rounded-2xl p-4 flex items-center gap-4">
          {/* Circular progress */}
          <div className="relative w-20 h-20 shrink-0">
            <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
              <circle cx="18" cy="18" r="14" fill="none" stroke="#f1f5f9" strokeWidth="3.5"/>
              <circle cx="18" cy="18" r="14" fill="none"
                stroke={attendRate >= 90 ?"#10b981" : attendRate >= 75 ?"#f59e0b" :"#ef4444"}
                strokeWidth="3.5"
                strokeDasharray={`${(attendRate / 100) * 87.96} 87.96`}
                strokeLinecap="round"/>
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-sm font-black text-gray-800">{attendRate}%</span>
            </div>
          </div>
          <div className="flex-1">
            <p className="text-gray-900 font-extrabold text-base leading-none">Attendance Rate</p>
            <p className="text-gray-400 text-xs mt-1">{workingDays} working days this month</p>
            <div className="flex flex-wrap gap-2 mt-2.5">
              <span className="bg-green-50 border border-green-200 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full">{counts.present} Present</span>
              <span className="bg-red-50 border border-red-200 text-red-500 text-xs font-bold px-2 py-0.5 rounded-full">{counts.absent} Absent</span>
              <span className="bg-blue-50 border border-blue-200 text-blue-600 text-xs font-bold px-2 py-0.5 rounded-full">{counts.leave} Leave</span>
              <span className="bg-amber-50 border border-amber-200 text-amber-600 text-xs font-bold px-2 py-0.5 rounded-full">{counts.half} Half</span>
            </div>
          </div>
        </div>

        {/* Legend */}
        <div className="flex gap-3 flex-wrap px-1">
          {[
            { label:"Present", dot:"bg-green-500" },
            { label:"Absent",  dot:"bg-red-400"   },
            { label:"Leave",   dot:"bg-blue-400"  },
            { label:"Half Day",dot:"bg-amber-400" },
            { label:"Holiday", dot:"bg-gray-300"  },
          ].map(l => (
            <div key={l.label} className="flex items-center gap-1.5">
              <div className={`w-2.5 h-2.5 rounded-full ${l.dot}`}/>
              <span className="text-gray-500 text-xs font-semibold">{l.label}</span>
            </div>
          ))}
        </div>

        {/* Calendar Grid */}
        <div className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">
          <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
            <p className="text-gray-900 font-extrabold text-sm">Calendar View</p>
            <span className="text-gray-400 text-xs font-semibold">{daysInMonth} days</span>
          </div>
          {/* Day headers */}
          <div className="grid grid-cols-7 px-2 pt-3 pb-1">
            {["S","M","T","W","T","F","S"].map((d, i) => (
              <div key={i} className={`text-center text-xs font-extrabold uppercase py-1
                ${i === 0 ?"text-red-400" :"text-gray-400"}`}>{d}</div>
            ))}
          </div>
          {/* Date cells */}
          <div className="grid grid-cols-7 gap-1 px-2 pb-3">
            {Array.from({ length: firstDay }).map((_, i) => <div key={`e${i}`} />)}
            {Array.from({ length: daysInMonth }).map((_, i) => {
              const day = i + 1;
              const ds = `${selMonth}-${String(day).padStart(2,"0")}`;
              const st = history[ds] ||"none";
              const cfg = STATUS[st] || STATUS.none;
              const isToday = ds === new Date().toISOString().split("T")[0];
              return (
                <div key={day}
                  className={`aspect-square rounded-xl flex flex-col items-center justify-center
                    ${cfg.bg} ${isToday ?"ring-2 ring-orange-400 ring-offset-1" :""} transition`}>
                  <span className={`text-xs font-black leading-none ${cfg.text}`}>{day}</span>
                  <span className={`text-[10px] font-extrabold ${cfg.text} opacity-90 mt-0.5`}>{cfg.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Team Leaderboard */}
        <div className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">
          <div className="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
            <p className="text-gray-900 font-extrabold text-sm">Team Overview</p>
            <span className="text-gray-400 text-xs font-semibold">{myTeam.length} workers</span>
          </div>
          <div className="divide-y divide-gray-50">
            {teamSummary.map((w, idx) => {
              const rankEmoji = idx === 0 ?"1st" : idx === 1 ?"2nd" : idx === 2 ?"3rd" : null;
              const rankColors = ["text-amber-500","text-gray-400","text-orange-400"];
              const DEPT_C = { Stitching:"#3B82F6", Finishing:"#10B981", QC:"#F59E0B", Cutting:"#EF4444", Embroidery:"#8B5CF6" };
              const avatarColor = DEPT_C[w.department] ||"#64748B";
              return (
                <button key={w.id} onClick={() => setSelWorker(w.id)}
                  className={`w-full px-4 py-3 flex items-center gap-3 text-left transition
                    ${selWorker === w.id ?"bg-green-50/50" :"hover:bg-gray-50 active:bg-gray-100"}`}>
                  <div className="w-6 text-center font-black text-xs shrink-0">
                    {rankEmoji
                      ? <span className={`font-black text-xs ${rankColors[idx]}`}>{rankEmoji}</span>
                      : <span className="text-gray-300 text-xs font-bold">#{idx + 1}</span>}
                  </div>
                  <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-extrabold text-sm shrink-0"
                    style={{ background: avatarColor }}>
                    {w.name.charAt(0)}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-gray-900 font-extrabold text-sm truncate">{w.name}</p>
                    <div className="flex items-center gap-1.5 mt-0.5">
                      <span className="text-gray-400 text-xs">{w.staffId}</span>
                      <span className="text-green-600 text-xs font-bold">{w.present}P</span>
                      <span className="text-red-500 text-xs font-bold">{w.absent}A</span>
                      {w.leave > 0 && <span className="text-blue-500 text-xs font-bold">{w.leave}L</span>}
                    </div>
                  </div>
                  <div className="shrink-0 text-right">
                    <p className={`font-black text-base leading-none
                      ${w.rate >= 90 ?"text-green-600" : w.rate >= 75 ?"text-amber-600" :"text-red-500"}`}>
                      {w.rate}%
                    </p>
                    <div className="w-14 h-1.5 bg-gray-100 rounded-full mt-1.5 overflow-hidden">
                      <div className={`h-full rounded-full transition-all
                        ${w.rate >= 90 ?"bg-green-500" : w.rate >= 75 ?"bg-amber-400" :"bg-red-400"}`}
                        style={{ width: `${w.rate}%` }}/>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  const AttendanceTab = () => {
    const TODAY_ATT = new Date().toISOString().split("T")[0];
    const [attView, setAttView] = useState("today");
    const [selDate, setSelDate] = useState(TODAY_ATT);
    const [attendance, setAttendance] = useState(() => {
      const init = {};
      myTeam.forEach(w => { init[w.id] = "none"; });
      if (myTeam[0]) init[myTeam[0].id] = "present";
      if (myTeam[1]) init[myTeam[1].id] = "present";
      if (myTeam[2]) init[myTeam[2].id] = "absent";
      return init;
    });
    const [saved, setSaved] = useState(false);
    const [search, setSearch] = useState("");
    const [viewMode, setViewMode] = useState("all");

    if (attView === "history") return (
      <div className="px-3 pt-3 pb-0">
        <div className="flex gap-2 mb-3">
          <button onClick={() => setAttView("today")}
            className="flex-1 bg-gray-100 text-gray-600 font-bold text-xs py-2 rounded-xl active:scale-95 transition flex items-center justify-center gap-1">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="2" fill="none"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            Today
          </button>
          <button onClick={() => setAttView("history")}
            className="flex-1 bg-green-500 text-white font-bold text-xs py-2 rounded-xl active:scale-95 transition flex items-center justify-center gap-1 shadow-sm shadow-green-200">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2" fill="none"/><path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            History
          </button>
        </div>
        <MonthlyAttendanceHistory />
      </div>
    );

    const mark = (workerId, status) => setAttendance(prev => ({ ...prev, [workerId]: status }));
    const markAll = (status) => { const u = {}; myTeam.forEach(w => { u[w.id] = status; }); setAttendance(u); };
    const handleSave = () => {
      myTeam.forEach(w => {
        if (sharedActions?.markAttendance)
          sharedActions.markAttendance(w.id, selDate, { status: attendance[w.id] || "none", markedBy: user.name });
      });
      setSaved(true); setTimeout(() => setSaved(false), 2000);
    };

    const presentCount  = myTeam.filter(w => attendance[w.id] === "present").length;
    const absentCount   = myTeam.filter(w => attendance[w.id] === "absent").length;
    const unmarkedCount = myTeam.filter(w => !attendance[w.id] || attendance[w.id] === "none").length;
    const DEPT_C = { Stitching:"#3B82F6", Finishing:"#10B981", QC:"#F59E0B", Cutting:"#EF4444", Embroidery:"#8B5CF6" };

    const filtered = myTeam.filter(w => {
      const matchSearch = !search || w.name.toLowerCase().includes(search.toLowerCase()) || w.staffId.toLowerCase().includes(search.toLowerCase());
      const st = attendance[w.id] || "none";
      const matchView = viewMode === "all" || (viewMode === "present" && st === "present") || (viewMode === "absent" && st === "absent");
      return matchSearch && matchView;
    });

    return (
      <div className="px-3 pt-3 pb-28 space-y-2.5">

        {/* Today / History Toggle — compact */}
        <div className="flex gap-1.5">
          <button onClick={() => setAttView("today")}
            className="flex-1 bg-green-500 text-white font-bold text-xs py-2 rounded-xl active:scale-95 transition flex items-center justify-center gap-1 shadow-sm shadow-green-200">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="2" fill="none"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            Today
          </button>
          <button onClick={() => setAttView("history")}
            className="flex-1 bg-gray-100 text-gray-500 font-bold text-xs py-2 rounded-xl active:scale-95 transition flex items-center justify-center gap-1">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2" fill="none"/><path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            History
          </button>
        </div>

        {/* Header bar — date + stats in one row */}
        <div className="bg-white border border-gray-100 rounded-2xl px-3 py-2.5 shadow-sm">
          <div className="flex items-center justify-between mb-2">

              <p className="text-gray-900 font-extrabold text-sm">{myDept} Attendance</p>

              { label:"Present", value: presentCount,  bg:"bg-green-50",  border:"border-green-200", text:"text-green-700", dot:"bg-green-500" },

          </svg>
          <input value={search} onChange={e => setSearch(e.target.value)}

        </Modal>

        {/* Worker list — compact rows */}
        {filtered.length === 0 ? (
          <div className="text-center py-8 bg-white rounded-2xl border border-gray-100">
            <p className="text-gray-400 text-xs">कोई worker नहीं मिला</p>

        ) : (
          <div className="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
            <div className="divide-y divide-gray-50">
              {filtered.map(w => {
                const status = attendance[w.id] || "none";
                const color  = DEPT_C[w.department] || "#64748B";
                return (
                  <div key={w.id} className={`px-3 py-2.5 flex items-center gap-2.5 transition-colors ${
                    status === "present" ? "bg-green-50/50" :
                    status === "absent"  ? "bg-red-50/50"   : "bg-white"
                  }`}>
                    {/* Avatar — smaller */}
                    <div className="w-8 h-8 rounded-xl flex items-center justify-center text-white font-extrabold text-xs shrink-0 relative"
                      style={{background: color}}>
                      {w.name.charAt(0)}
                      {status !== "none" && (
                        <div className={`absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full border-2 border-white flex items-center justify-center ${
                          status === "present" ? "bg-green-500" : "bg-red-400"

                            : <svg width="7" height="7" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>

                        </div>
                      )}
