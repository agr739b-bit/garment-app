                      <>
                        <button onClick={() => approveEntry(e.id)} className="text-green-600 text-xs font-bold hover:underline">✓</button>
                        <button onClick={() => rejectEntry(e.id)}  className="text-rose-500 text-xs font-bold hover:underline">✗</button>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <Modal open={showEntryModal} onClose={() => { setShowEntryModal(false); setError(""); }} title="New Work Entry">
              <div className="space-y-4">
                {error && <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm font-semibold whitespace-pre-line">{error}</div>}
                <Select label="Worker" value={entryForm.workerName} onChange={e => {
                  const w = (sharedWorkers||MOCK_DB.workers).find(w => w.name === e.target.value);
                  setEntryForm({ ...entryForm, workerName: e.target.value, staffId: w?.staffId ||"" });
                }}>
                  <option value="">Select Worker</option>
                  {(sharedWorkers||MOCK_DB.workers).filter(w => w.status ==="active").map(w => <option key={w.id} value={w.name}>{w.name} ({w.staffId})</option>)}
                </Select>
                <Select label="Process" value={entryForm.process} onChange={e => setEntryForm({ ...entryForm, process: e.target.value })}>
                  <option value="">Select Process</option>
                  {selected.processes.map(p => <option key={p.id} value={p.name}>{p.name} — Rs {p.pieceRate}/pc</option>)}
                </Select>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="Quantity" type="number" value={entryForm.quantity} onChange={e => setEntryForm({ ...entryForm, quantity: e.target.value })} placeholder="100" />
                  <Input label="Date" type="date" value={entryForm.date} onChange={e => setEntryForm({ ...entryForm, date: e.target.value })} />
                </div>
                {entryForm.process && entryForm.quantity && (
                  <div className="bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-sm">
                    <span className="text-gray-600">Auto Amount: </span>
                    <span className="text-green-700 font-extrabold text-base">
                      Rs {(+entryForm.quantity * (selected.processes.find(p => p.name === entryForm.process)?.pieceRate || 0)).toLocaleString()}
                    </span>
                    <span className="text-gray-400 text-xs ml-1">
                      ({entryForm.quantity} × Rs {selected.processes.find(p => p.name === entryForm.process)?.pieceRate || 0})
                    </span>
                  </div>
                )}
                <div className="flex gap-3">
                  <Btn variant="secondary" onClick={() => setShowEntryModal(false)} className="flex-1">Cancel</Btn>
                  <Btn onClick={addEntry} className="flex-1">Submit Entry</Btn>
                </div>
              </div>
            </Modal>
          </div>
        )}

        {/* TAB: PAYMENT */}
        {detailTab ==="payment" && (
          <div className="space-y-3">
            <div className="bg-orange-50 border border-orange-200 rounded-2xl px-4 py-3 flex justify-between items-center">
              <span className="text-gray-700 text-sm font-bold">Total Payout (Approved)</span>
              <span className="text-orange-600 font-extrabold text-lg">
                Rs {approvedEntries.reduce((s, e) => s + e.amount, 0).toLocaleString()}
              </span>
            </div>

            <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
              <div className="bg-gray-800 grid grid-cols-4 px-4 py-2.5 text-xs font-extrabold text-white uppercase tracking-wide">
                <div className="col-span-2">Worker</div>
                <div className="text-center">Pieces</div>
                <div className="text-right">Amount</div>
              </div>
              {Object.values(paymentByWorker).length === 0 && (
                <p className="text-center py-8 text-gray-400 text-sm">No approved entries yet</p>
              )}
              {Object.values(paymentByWorker).map((w, i) => (
                <div key={w.workerName} className={"grid grid-cols-4 px-4 py-3.5 items-center border-b border-gray-50 last:border-0" + (i % 2 === 0 ?"bg-white" :"bg-gray-50/40")}>
                  <div className="col-span-2 flex items-center gap-2">
                    <div className="w-7 h-7 rounded-lg bg-orange-100 flex items-center justify-center text-orange-600 font-extrabold text-xs shrink-0">
                      {w.workerName.charAt(0)}
                    </div>
                    <div>
                      <p className="text-gray-900 font-bold text-xs">{w.workerName}</p>
                      <p className="text-gray-400 text-xs">{w.staffId}</p>
                    </div>
                  </div>
                  <div className="text-center">
                    <span className="text-orange-500 font-extrabold text-sm">{w.pieces} pcs</span>
                  </div>
                  <div className="text-right">
                    <span className="text-green-600 font-extrabold text-sm">Rs {w.amount.toLocaleString()}</span>
                  </div>
                </div>
              ))}
              {Object.values(paymentByWorker).length > 0 && (
                <div className="bg-gray-800 grid grid-cols-4 px-4 py-2.5 text-xs font-extrabold">
                  <div className="col-span-2 text-gray-300">TOTAL</div>
                  <div className="text-center text-orange-400">{approvedEntries.reduce((s, e) => s + e.quantity, 0)} pcs</div>
                  <div className="text-right text-green-400">Rs {approvedEntries.reduce((s, e) => s + e.amount, 0).toLocaleString()}</div>
                </div>
              )}
            </div>

            {/* Formula info */}
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
              <p className="font-bold mb-1">Auto Payment Formula:</p>
              <p>Payment = Quantity × Piece Rate</p>
              <p className="mt-1 text-blue-500">Example: 100 pcs × Rs 15 = Rs 1,500</p>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── LIST VIEW ──
  return (
    <div className="space-y-4">
      {toast && <div className="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-5 py-2.5 rounded-2xl shadow-xl font-bold text-sm">{toast}</div>}

      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-extrabold text-gray-900">Style Files</h1>
          <p className="text-gray-500 text-sm">{files.length} styles — {files.filter(f => f.status ==="Active").length} active</p>
        </div>
        <Btn onClick={() => { setShowStyleModal(true); setError(""); }}>+ New Style</Btn>
      </div>

      {/* Search + filter */}
      <div className="space-y-2">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/>
            <path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Style नाम, Buyer, Code खोजें..."
            className="w-full pl-10 pr-9 py-3 bg-gray-50 border-2 border-gray-200 rounded-2xl text-sm font-medium focus:outline-none focus:border-orange-400 transition"
            style={{fontSize:"16px"}}/>
          {search && <button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">✕</button>}
        </div>
        <div className="flex gap-1.5 flex-wrap">
          {["all","Draft","Active","Completed","Closed"].map(s => (
            <button key={s} onClick={() => setFilterStatus(s)}
              className={"px-3 py-2 rounded-xl text-xs font-bold border transition" +
                (filterStatus === s ?"bg-orange-500 text-white border-orange-500" :"bg-white text-gray-600 border-gray-200")}>
              {s ==="all" ?"All" : s}
            </button>
          ))}
        </div>
      </div>

      {/* Style cards */}
      <div className="space-y-3">
        {filtered.length === 0 && <p className="text-center py-10 text-gray-400 bg-white rounded-2xl border border-gray-200">कोई style नहीं मिली</p>}
        {pagedStyles.map(f => {
          const approvedEnt = allEntries.filter(e => e.styleId === f.id && e.status ==="approved");
          const pendingEnt  = allEntries.filter(e => e.styleId === f.id && e.status ==="pending");
          const done     = approvedEnt.reduce((s, e) => s + e.quantity, 0);
          const pending  = pendingEnt.reduce((s, e) => s + e.quantity, 0);
          const limit    = f.orderQuantity || 0;
          const balance  = Math.max(0, limit - done - pending);
          const pct      = limit > 0 ? Math.min(100, Math.round((done / limit) * 100)) : 0;
          const barColor = pct >= 100 ? "bg-red-400" : pct >= 80 ? "bg-amber-400" : "bg-green-500";
          const pctColor = pct >= 100 ? "text-red-500" : pct >= 80 ? "text-amber-500" : "text-green-600";
          const statusIsActive = (f.status ==="Active" || f.status ==="active");
          const statusColor = statusIsActive ? "border-green-200 bg-green-50 text-green-600" : "border-gray-200 bg-gray-50 text-gray-400";
          return (
            <button key={f.id}
              onClick={() => { setSelected(f); setView("detail"); setDetailTab("info"); }}
              className="w-full text-left bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm active:scale-[0.99] active:border-orange-300 transition">
              {/* Top color bar */}
              <div className={`h-1.5 ${barColor}`}/>
              <div className="px-4 py-3">
                {/* Title row */}
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <p className="text-gray-900 font-extrabold text-sm truncate">{f.styleName}</p>
                    <p className="text-gray-400 text-sm mt-0.5">{f.styleCode} · {f.buyerName}</p>
                  </div>
                  <span className={`text-[10px] font-extrabold px-2 py-0.5 rounded-full border shrink-0 ${statusColor}`}>
                    {f.status}
                  </span>
                </div>
                {/* Done / Balance + progress bar */}
                <div className="flex items-center gap-3 mt-3">
                  <div className="flex-1">
                    <div className="flex justify-between text-[10px] mb-1">
                      <span className="text-gray-400">Done: <span className="text-green-600 font-extrabold">{done}</span></span>
                      <span className="text-gray-400">Balance: <span className={`font-extrabold ${balance === 0 ? "text-red-500" : "text-orange-500"}`}>{balance}</span></span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2">
                      <div className={`${barColor} h-2 rounded-full transition-all`} style={{ width: `${Math.min(pct, 100)}%` }}/>
                    </div>
                  </div>
                  <p className={`font-black text-lg shrink-0 ${pctColor}`}>{pct}%</p>
                </div>
                {/* Tags row */}
                <div className="flex gap-2 mt-2.5 flex-wrap items-center">
                  <span className="bg-gray-50 border border-gray-200 text-gray-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">Limit {limit}</span>
                  {pending > 0 && <span className="bg-amber-50 border border-amber-200 text-amber-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">Pend {pending}</span>}
                  {balance === 0 && <span className="bg-red-50 border border-red-200 text-red-500 text-[10px] font-bold px-2 py-0.5 rounded-lg">Full</span>}
                  <span className="ml-auto text-[10px] text-orange-400 font-bold" onClick={(e)=>{e.stopPropagation();setSelected(f);setView("detail");setDetailTab("info");}}>Tap for detail →</span>
                </div>

                {/* ── 3 Action Buttons ── */}
                <div className="grid grid-cols-3 gap-2 mt-3 pt-3 border-t border-gray-100" onClick={e=>e.stopPropagation()}>
                  <button
                    onClick={()=>{ setCardActionStyle(f); setShowOpsToggle(true); }}
                    className="flex flex-col items-center gap-1 bg-purple-50 border border-purple-200 rounded-xl py-2.5 px-1 active:scale-95 transition">
                    <span className="text-lg">⚙️</span>
                    <span className="text-[10px] font-extrabold text-purple-700 leading-tight text-center">Add Operations</span>
                  </button>
                  <button
                    onClick={()=>{ setCardActionStyle(f); setShowCuttingMgmt(true); }}
                    className="flex flex-col items-center gap-1 bg-blue-50 border border-blue-200 rounded-xl py-2.5 px-1 active:scale-95 transition">
                    <span className="text-lg">✂️</span>
                    <span className="text-[10px] font-extrabold text-blue-700 leading-tight text-center">Cutting</span>
                  </button>
                  <button
                    onClick={()=>{ setCardActionStyle(f); setShowProdReport(true); }}
                    className="flex flex-col items-center gap-1 bg-green-50 border border-green-200 rounded-xl py-2.5 px-1 active:scale-95 transition">
                    <span className="text-lg">📊</span>
                    <span className="text-[10px] font-extrabold text-green-700 leading-tight text-center">Production Report</span>
                  </button>
                </div>
              </div>
            </button>
          );
        })}
        <Paginator page={sfPage} setPage={setSfPage} totalPages={sfTotalPages} total={sfTotal} pageSize={sfPageSize} />
      </div>

      {/* ══════════════════════════════════════
          MODAL 1 — Add Operations (Toggle)
      ══════════════════════════════════════ */}
      <Modal open={showOpsToggle} onClose={()=>setShowOpsToggle(false)} title="⚙️ Operations Manage">
        {cardActionStyle && (() => {
          const sf = files.find(f=>f.id===cardActionStyle.id);
          if (!sf) return null;
          const activeIds = new Set(sf.processes.map(p=>p.name));
          return (
            <div className="space-y-4">
              {/* Style info */}
              <div className="bg-purple-50 border border-purple-200 rounded-xl px-4 py-2.5">
                <p className="text-xs text-purple-500 font-bold">Style</p>
                <p className="text-gray-900 font-extrabold text-sm">{sf.styleName}</p>
                <p className="text-gray-400 text-xs">{sf.styleCode}</p>
              </div>
              <p className="text-gray-500 text-xs font-semibold">Toggle ON/OFF karke operations add ya remove karo. Piece rate admin ke operations se autofill hoti hai.</p>
              {/* Operations list with toggles — from sharedOperations (admin operations) */}
              <div className="space-y-2">
                {(sharedOperations||MOCK_DB.operations).map(adminOp => {
                  const isOn = activeIds.has(adminOp.name);
                  const existingProc = sf.processes.find(p=>p.name===adminOp.name);
                  return (
                    <div key={adminOp.id} className={`flex items-center gap-3 rounded-2xl border-2 px-4 py-3 transition ${isOn?"border-purple-300 bg-purple-50":"border-gray-200 bg-white"}`}>
                      {/* Toggle */}
                      <button
                        onClick={()=>{
                          if (isOn) {
                            const updated = files.map(f=>f.id===sf.id?{...f,processes:f.processes.filter(p=>p.name!==adminOp.name)}:f);
                            setFiles(updated);
                          } else {
                            // Autofill piece rate from admin operations
                            const updated = files.map(f=>f.id===sf.id?{...f,processes:[...f.processes,{id:"p"+Date.now(),name:adminOp.name,pieceRate:adminOp.pieceRate}]}:f);
                            setFiles(updated);
                          }
                        }}
                        className={`relative w-11 h-6 rounded-full transition-all shrink-0 ${isOn?"bg-purple-500":"bg-gray-300"}`}>
                        <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${isOn?"left-5":"left-0.5"}`}/>
                      </button>
                      <div className="flex-1 min-w-0">
                        <p className={`text-sm font-extrabold ${isOn?"text-purple-700":"text-gray-500"}`}>{adminOp.name}</p>
                        {adminOp.nameHindi && <p className="text-[10px] text-gray-400">{adminOp.nameHindi} · {adminOp.department}</p>}
                      </div>
                      {/* Piece rate — editable if ON, autofill preview if OFF */}
                      {isOn ? (
                        <div className="flex items-center gap-1 shrink-0">
                          <span className="text-gray-400 text-xs">₹</span>
                          <input
                            type="number"
                            value={existingProc?.pieceRate ?? adminOp.pieceRate}
                            onChange={e=>{
                              const val = +e.target.value;
                              const updated = files.map(f=>f.id===sf.id?{...f,processes:f.processes.map(p=>p.name===adminOp.name?{...p,pieceRate:val}:p)}:f);
                              setFiles(updated);
                            }}
                            className="w-16 border-2 border-purple-200 rounded-lg px-2 py-1 text-sm font-bold text-purple-700 focus:outline-none focus:border-purple-400 text-right"
                            style={{fontSize:"14px"}}
                          />
                          <span className="text-gray-400 text-[10px]">/pc</span>
                        </div>
                      ) : (
                        <span className="text-gray-300 text-xs font-bold shrink-0">₹{adminOp.pieceRate}/pc</span>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
                <span className="text-gray-600 text-sm font-bold">Active Operations</span>
                <span className="text-purple-600 font-extrabold text-lg">{sf.processes.length}</span>
              </div>
              <Btn onClick={()=>{setShowOpsToggle(false);flash("✅ Operations updated!");}} className="w-full">✅ Done</Btn>
            </div>
          );
        })()}
      </Modal>

      {/* ══════════════════════════════════════
          CUTTING MANAGEMENT MODAL
      ══════════════════════════════════════ */}
      <Modal open={showCuttingMgmt} onClose={()=>{setShowCuttingMgmt(false);setAssignSupCutId(null);}} title="✂️ Cutting">
        {cardActionStyle && (() => {
          const styleCuts = (adminCuttings||[]).filter(c=>c.styleId===cardActionStyle.id);
          const statusBg = { Pending:"bg-amber-50 border-amber-200 text-amber-700", Assigned:"bg-blue-50 border-blue-200 text-blue-700", Completed:"bg-green-50 border-green-200 text-green-700" };
          return (
            <div className="space-y-4">
              {/* Style info */}
              <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
                <div>
                  <p className="text-gray-900 font-extrabold text-sm">{cardActionStyle.styleName}</p>
                  <p className="text-gray-400 text-xs">{cardActionStyle.styleCode} · {cardActionStyle.buyerName}</p>
                </div>
                <div className="text-right">
                  <p className="text-2xl font-black text-blue-600">{styleCuts.length}</p>
                  <p className="text-xs text-gray-400">Cuttings</p>
                </div>
              </div>

              {/* Add Cutting button */}
              <button
                onClick={()=>{
                  setCardCutForm({fabricType:"",marker:"",cuttingDate:new Date().toISOString().split("T")[0],completionDate:"",sizes:[{size:"",bundles:"",pcsPerBundle:""}]});
                  setCardCutErr("");
                  autoFillCardSizes(cardActionStyle.styleName);
                  setShowCuttingMgmt(false);
                  setShowCardCutting(true);
                }}
                className="w-full flex items-center justify-center gap-2 bg-orange-500 text-white font-extrabold py-3.5 rounded-2xl shadow-md shadow-orange-200 active:scale-[0.98] transition text-sm">
                ✂️ + Add New Cutting
              </button>

              {/* Cuttings list */}
              {styleCuts.length === 0 && (
                <div className="text-center py-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                  <p className="text-3xl mb-2">✂️</p>
                  <p className="text-gray-500 font-bold text-sm">Koi cutting nahi</p>
                  <p className="text-gray-400 text-xs mt-1">Upar "+ Add New Cutting" se add karo</p>
                </div>
              )}

              <div className="space-y-3">
                {styleCuts.map(cut=>{
                  const isAssigning = assignSupCutId===cut.id;
                  return (
                    <div key={cut.id} className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden shadow-sm">
                      {/* Status bar */}
                      <div className={`h-1.5 ${cut.status==="Completed"?"bg-green-500":cut.status==="Assigned"?"bg-blue-500":"bg-amber-400"}`}/>
                      <div className="p-4 space-y-3">
                        {/* Top row */}
                        <div className="flex items-start justify-between gap-2">
                          <div>
                            <span className="font-mono font-extrabold text-orange-600 text-sm">{cut.cuttingNo}</span>
                            {cut.fabricType && <span className="ml-2 text-gray-400 text-xs">· {cut.fabricType}</span>}
                          </div>
                          <span className={`text-[10px] font-extrabold px-2 py-0.5 rounded-full border ${statusBg[cut.status]||"bg-gray-100 border-gray-200 text-gray-600"}`}>{cut.status}</span>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-3 gap-2 text-center">
                          <div className="bg-gray-50 rounded-xl py-2">
                            <p className="font-black text-gray-900 text-base">{cut.totalPieces||cut.totalQty||0}</p>
                            <p className="text-[10px] text-gray-400 font-semibold">Total Pcs</p>
                          </div>
                          <div className="bg-gray-50 rounded-xl py-2">
                            <p className="font-black text-gray-900 text-base">{cut.sizes?.length||0}</p>
                            <p className="text-[10px] text-gray-400 font-semibold">Sizes</p>
                          </div>
                          <div className="bg-gray-50 rounded-xl py-2">
                            <p className="font-black text-gray-900 text-base">{cut.sizes?.reduce((s,r)=>s+(+r.bundles||0),0)||cut.totalLayers||0}</p>
                            <p className="text-[10px] text-gray-400 font-semibold">Bundles</p>
                          </div>
                        </div>

                        {/* Size breakdown table */}
                        {(cut.sizes||[]).length>0 && (
                          <div className="rounded-xl overflow-hidden border border-gray-100">
                            <div className="bg-gray-100 grid grid-cols-4 px-3 py-1.5 text-[10px] font-extrabold text-gray-500 uppercase">
                              <div>Size</div><div className="text-center">Bundles</div><div className="text-center">Pcs/Bndl</div><div className="text-right text-red-500">Total</div>
                            </div>
                            {cut.sizes.map((r,i)=>(
                              <div key={i} className={`grid grid-cols-4 px-3 py-1.5 text-xs border-t border-gray-50 ${i%2===0?"bg-white":"bg-gray-50/50"}`}>
                                <div className="font-extrabold text-gray-900">{r.size}</div>
                                <div className="text-center text-gray-600">{r.bundles}</div>
                                <div className="text-center text-gray-600">{r.pcsPerBundle}</div>
                                <div className="text-right font-extrabold text-red-500">{r.total||(+r.bundles||0)*(+r.pcsPerBundle||0)}</div>
                              </div>
                            ))}
                          </div>
                        )}

                        {/* Dates */}
                        <div className="flex gap-2 flex-wrap">
                          {cut.cuttingDate && <span className="bg-blue-50 border border-blue-100 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">📅 {cut.cuttingDate}</span>}
                          {cut.completionDate && <span className="bg-purple-50 border border-purple-100 text-purple-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">🎯 {cut.completionDate}</span>}
                        </div>

                        {/* Assigned supervisor info */}
                        {cut.assignedSupervisor && (
                          <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 flex items-center justify-between">
                            <div>
                              <p className="text-blue-500 text-[10px] font-bold">👷 Assigned To</p>
                              <p className="text-blue-900 font-extrabold text-sm">{cut.assignedSupervisor}</p>
                              {cut.deadline && <p className="text-blue-400 text-[10px]">Deadline: {cut.deadline}</p>}
                            </div>
                            {cut.status!=="Completed" && (
                              <button onClick={()=>{ if(setAdminCuttings) setAdminCuttings(p=>p.map(c=>c.id===cut.id?{...c,status:"Completed"}:c)); flash("✅ Completed!"); }}
                                className="bg-green-500 text-white text-xs font-bold px-3 py-1.5 rounded-xl active:scale-95">✓ Done</button>
                            )}
                          </div>
                        )}

          const pending   = styleEnts.filter(e=>e.status==="pending");
          const rejected  = styleEnts.filter(e=>e.status==="rejected");
          const totalDone = approved.reduce((s,e)=>s+e.quantity,0);
          const totalPend = pending.reduce((s,e)=>s+e.quantity,0);
          const totalAmt  = approved.reduce((s,e)=>s+e.amount,0);
          const limit     = sf.orderQuantity||0;
          const balance   = Math.max(0,limit-totalDone-totalPend);
          const pct       = limit>0?Math.min(100,Math.round((totalDone/limit)*100)):0;
          const barColor  = pct>=100?"bg-red-400":pct>=80?"bg-amber-400":"bg-green-500";
          // Per-process stats
          const procStats = (sf.processes||[]).map(p=>{
            const pDone = approved.filter(e=>e.process===p.name).reduce((s,e)=>s+e.quantity,0);
            const pPend = pending.filter(e=>e.process===p.name).reduce((s,e)=>s+e.quantity,0);
            const pAmt  = approved.filter(e=>e.process===p.name).reduce((s,e)=>s+e.amount,0);
            return {...p, done:pDone, pending:pPend, amount:pAmt};
          });
          // Per-worker stats
          const workerMap = {};
          approved.forEach(e=>{
            if(!workerMap[e.workerName]) workerMap[e.workerName]={name:e.workerName,staffId:e.staffId,pieces:0,amount:0};
            workerMap[e.workerName].pieces+=e.quantity;
            workerMap[e.workerName].amount+=e.amount;

              {/* Summary stats */}
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-white border-2 border-green-100 rounded-2xl p-3 text-center">
                  <p className="text-2xl font-black text-green-600">{totalDone}</p>
                  <p className="text-xs text-gray-500 font-semibold">Done (Approved)</p>
                </div>
                <div className="bg-white border-2 border-amber-100 rounded-2xl p-3 text-center">
                  <p className="text-2xl font-black text-amber-500">{totalPend}</p>
                  <p className="text-xs text-gray-500 font-semibold">Pending</p>
                </div>
                <div className="bg-white border-2 border-orange-100 rounded-2xl p-3 text-center">

                  <p className="text-xs text-gray-500 font-semibold">Balance</p>
                </div>
                <div className="bg-white border-2 border-blue-100 rounded-2xl p-3 text-center">
                  <p className="text-xl font-black text-blue-600">₹{totalAmt.toLocaleString()}</p>

                </div>
              </div>
              {/* Progress */}
              <div className="bg-white border-2 border-gray-100 rounded-2xl px-4 py-3">
                <div className="flex justify-between text-xs mb-1.5">
                  <span className="text-gray-500 font-semibold">Progress</span>
                  <span className={`font-black text-base ${pct>=100?"text-red-500":pct>=80?"text-amber-500":"text-green-600"}`}>{pct}%</span>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-3">
                  <div className={`${barColor} h-3 rounded-full transition-all`} style={{width:`${pct}%`}}/>
                </div>
                <div className="flex justify-between text-[10px] text-gray-400 mt-1">
                  <span>Done: {totalDone}</span>
                  <span>Limit: {limit}</span>
                </div>
              </div>

                <div className="bg-white border-2 border-gray-100 rounded-2xl overflow-hidden">

                    <div className="col-span-2">Operation</div>

                  <div className="bg-gray-700 px-4 py-2 text-[10px] font-extrabold text-white uppercase tracking-wide">Worker-wise Production</div>

// PAYMENTS — Auto Monthly Payment Report
const Payments = () => {
  const { user, sharedEntries } = useContext(AppContext);
  const now = new Date();
  const MONTHS = [
    { label:"January 2024", value:"2024-01", closed: false },
    { label:"December 2023", value:"2023-12", closed: true },
    { label:"November 2023", value:"2023-11", closed: true },
  ];

  const [selectedMonth, setSelectedMonth] = useState("2024-01");
  const [payments, setPayments] = useState(MOCK_DB.payments);
  const [showSlip, setShowSlip] = useState(null);
  const [showCloseConfirm, setShowCloseConfirm] = useState(false);
  const [advanceModal, setAdvanceModal] = useState(null);
  const [advanceAmt, setAdvanceAmt] = useState("");

  const selectedMonthData = MONTHS.find(m => m.value === selectedMonth);
  const isClosed = selectedMonthData?.closed;

  // Rule 10: Build payment report from REAL verified/approved sharedEntries
  const buildReport = (monthKey) => {
    const [yr, mo] = monthKey.split("-").map(Number);
    const verifiedEntries = (sharedEntries || MOCK_DB.workEntries).filter(e =>
      e.status === "verified" || e.status === "approved"
    );
    const grouped = {};
    verifiedEntries.forEach(e => {
      const d = new Date(e.date);
      if (d.getFullYear() !== yr || d.getMonth() + 1 !== mo) return;
      const key = e.staffId || e.workerName;
      if (!grouped[key]) {
        grouped[key] = {
          workerName: e.workerName, staffId: e.staffId || e.workerId,
          department: e.department, entries: [], totalQty: 0, grossAmount: 0,
        };
      }
      grouped[key].entries.push(e);
      grouped[key].totalQty    += (+e.pieces || 0);
      grouped[key].grossAmount += (+e.amount || 0);
    });

    // Merge with payments data for deductions/status
    return Object.values(grouped).map(g => {
      const saved = payments.find(p => p.staffId === g.staffId || p.workerName === g.workerName);
      return {
        ...g,
        deductions: saved?.deductions || 0,
        advance:    saved?.advance_deduction || 0,
        netAmount:  g.grossAmount - (saved?.deductions || 0) - (saved?.advance_deduction || 0),
        status:     saved?.status || "pending",
        id:         saved?.id || `auto-${g.staffId}`,
      };
    });
  };

  const report = buildReport(selectedMonth);
  const totalQty = report.reduce((s, r) => s + r.totalQty, 0);
  const totalGross = report.reduce((s, r) => s + r.grossAmount, 0);
  const totalDeduct = report.reduce((s, r) => s + r.deductions + r.advance, 0);
  const totalNet = report.reduce((s, r) => s + r.netAmount, 0);

  const markPaid = (id) => setPayments(payments.map(p => p.id === id ? { ...p, status:"paid" } : p));

  const exportCSV = () => {
    const rows = [
      ["Staff ID","Worker Name","Department","Total Qty","Gross Amount","Deductions","Net Amount","Status"],

// HOURLY REPORTS
const DEPT_TARGETS = {};
MOCK_DB.departments.forEach(d => { DEPT_TARGETS[d.name] = d.dailyTarget || 400; });

const WORK_HOURS = 8; // total working hours per day
const ALL_HOUR_SLOTS = ["08:00-09:00","09:00-10:00","10:00-11:00","11:00-12:00","12:00-13:00","14:00-15:00","15:00-16:00","16:00-17:00"];

// Helper: generate mock daily production numbers for a dept over N days back
const genDailyProd = (deptName, days) => {
  const arr = [];
  const target = DEPT_TARGETS[deptName] || 400;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split("T")[0];
    const seed = (deptName.charCodeAt(0)||1) * 17 + i * 7;
    const r = Math.abs(Math.sin(seed)) ;
    const actual = Math.round(target * (0.65 + r * 0.5));
    arr.push({ date: dateStr, label: d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}), actual, target });
  }
  return arr;
};

const HourlyReports = () => {
  const { sharedHourly, sharedActions } = useContext(AppContext);
  const [reports,    setReports]    = useState(sharedHourly || MOCK_DB.hourlyReports);
  const [showModal,  setShowModal]  = useState(false);
  const [activeTab,  setActiveTab]  = useState("perday"); // perday | weekly | monthly
  const [selDept,    setSelDept]    = useState("all");
  const [selDate,    setSelDate]    = useState(new Date().toISOString().split("T")[0]);
  const [deptTargets, setDeptTargets] = useState({...DEPT_TARGETS});
  const [editTargetDept, setEditTargetDept] = useState(null);
  const [editTargetVal, setEditTargetVal]   = useState("");
  const [form, setForm] = useState({ date:"", department:"", style:"", hourSlot:"", total:"", pass:"", alter:"", reject:"" });

  // sharedHourly update hone pe local state sync karo
  React.useEffect(() => {
    if (sharedHourly) setReports(sharedHourly);
  }, [sharedHourly]);

  const handleAdd = () => {
    const total = +form.total, pass = +form.pass;
    const newReport = { ...form, id:`h${Date.now()}`, total, pass, alter:+form.alter, reject:+form.reject,
      passPercent: total ? ((pass/total)*100).toFixed(1) : 0 };
    if (sharedActions?.addHourly) sharedActions.addHourly(newReport, form.department);
    else setReports(prev => [...prev, newReport]);

  const depts = ["all", ...new Set(MOCK_DB.departments.map(d=>d.name))];

  // ── PER DAY TAB (includes hourly slot breakdown) ──
  const PerDayTab = () => (

      <div className="flex gap-2 items-center">
        <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}

          style={{fontSize:"16px"}}/>
        <button onClick={()=>{ setForm({date:selDate,department:"",style:"",hourSlot:"",total:"",pass:"",alter:"",reject:""}); setShowModal(true); }}
          className="bg-orange-500 text-white font-extrabold text-sm px-4 py-2 rounded-xl shadow-md shadow-orange-200 active:scale-[0.98] whitespace-nowrap">

      {filteredDepts.map(dept => {

                {data.map(d => {
                  const pct = Math.min((d.actual/d.target)*100,100);
                  const ok  = d.actual >= d.target;
                  return (
                    <div key={d.date} className="flex items-center gap-2">
                      <p className="text-xs text-gray-400 font-bold w-14 shrink-0">{d.label}</p>
                      <div className="flex-1 h-6 bg-gray-100 rounded-lg overflow-hidden relative">
                        <div className={`h-full rounded-lg ${ok?"bg-green-400":"bg-red-400"}`} style={{width:`${pct}%`}}/>
                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-extrabold text-gray-700">{d.actual}</span>
                      </div>
                      <p className={`text-xs font-bold w-10 text-right ${ok?"text-green-600":"text-red-500"}`}>{ok?"+":""}{ d.actual-d.target}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── MONTHLY TAB ──
  const MonthlyTab = () => (
    <div className="space-y-4">
      {filteredDepts.map(dept => {
        const data = genDailyProd(dept.name, 30);
        const totalActual = data.reduce((s,d)=>s+d.actual,0);
        const totalTarget = data.reduce((s,d)=>s+d.target,0);
        const diff = totalActual - totalTarget;
        const avgDaily = Math.round(totalActual/data.length);
        const bestDay = data.reduce((best,d)=>d.actual>best.actual?d:best, data[0]);
        const worstDay = data.reduce((worst,d)=>d.actual<worst.actual?d:worst, data[0]);
        // Weekly aggregates for summary
        const weeks = [0,1,2,3].map(w => {
          const slice = data.slice(w*7, w*7+7);
          return { label:`Wk ${w+1}`, actual: slice.reduce((s,d)=>s+d.actual,0), target: slice.reduce((s,d)=>s+d.target,0) };
        });
        return (
          <div key={dept.id} className="bg-white rounded-2xl border-2 border-gray-100 overflow-hidden">
            <div className="h-1" style={{background:dept.color}}/>
            <div className="p-4 space-y-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-black text-sm" style={{background:dept.color}}>{dept.name.charAt(0)}</div>
                  <div>
                    <p className="font-extrabold text-gray-900">{dept.name}</p>
                    <p className="text-gray-400 text-xs">Last 30 days</p>
                  </div>
                </div>
                <div className="text-right">
                  <p className={`text-2xl font-black ${diff>=0?"text-green-600":"text-red-500"}`}>{totalActual.toLocaleString()}</p>
                  <p className="text-gray-400 text-xs">Target: {totalTarget.toLocaleString()}</p>
                </div>
              </div>
              {/* Summary grid */}
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-blue-50 rounded-xl p-3 text-center">
                  <p className="text-blue-700 font-black text-lg">{avgDaily}</p>
                  <p className="text-gray-400 text-xs">Avg/Day</p>
                </div>
                <div className="bg-green-50 rounded-xl p-3 text-center">
                  <p className="text-green-700 font-black text-base">{bestDay.actual}</p>
                  <p className="text-gray-400 text-xs">Best · {bestDay.label}</p>
                </div>
                <div className="bg-red-50 rounded-xl p-3 text-center">
                  <p className="text-red-600 font-black text-base">{worstDay.actual}</p>
                  <p className="text-gray-400 text-xs">Low · {worstDay.label}</p>
                </div>
              </div>
              {/* Weekly bars */}
              <div className="space-y-2">
                <p className="text-xs font-extrabold text-gray-500 uppercase">Weekly Breakdown</p>
                {weeks.map(w => {
                  const pct = Math.min((w.actual/w.target)*100,100);
                  const ok  = w.actual >= w.target;
                  return (
                    <div key={w.label} className="flex items-center gap-2">
                      <p className="text-xs font-bold text-gray-500 w-10 shrink-0">{w.label}</p>
                      <div className="flex-1 h-7 bg-gray-100 rounded-xl overflow-hidden relative">
                        <div className={`h-full rounded-xl ${ok?"bg-green-400":"bg-red-400"}`} style={{width:`${pct}%`}}/>
                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-extrabold text-gray-700">{w.actual.toLocaleString()}</span>
                      </div>
                      <p className={`text-xs font-bold w-12 text-right ${ok?"text-green-600":"text-red-500"}`}>{ok?"+":""}{w.actual-w.target}</p>
                    </div>
                  );
                })}
              </div>
              {/* Overall bar */}
              <div>
                <div className="flex items-center justify-between mb-1">
                  <p className="text-xs font-bold text-gray-500">Monthly Progress</p>
                  <p className={`text-xs font-extrabold ${diff>=0?"text-green-600":"text-red-500"}`}>{Math.round((totalActual/totalTarget)*100)}%</p>
                </div>
                <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full ${diff>=0?"bg-green-500":"bg-red-400"}`} style={{width:`${Math.min((totalActual/totalTarget)*100,100)}%`}}/>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  return (
    <div className="space-y-4 pb-24">
      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-extrabold text-gray-900">Production Reports</h1>
          <p className="text-gray-400 text-sm">Per Day · Weekly · Monthly</p>
        </div>
        {activeTab === "perday" && (
          <button onClick={()=>{ setForm({date:selDate,department:"",style:"",hourSlot:"",total:"",pass:"",alter:"",reject:""}); setShowModal(true); }}
            className="bg-orange-500 text-white font-extrabold text-sm px-4 py-2 rounded-xl shadow-md shadow-orange-200 active:scale-[0.98]">
            + Add
          </button>
        )}
      </div>

      {/* 3-Tab Bar */}
      <div className="bg-gray-100 rounded-2xl p-1 flex gap-1">
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setActiveTab(t.id)}
            className={`flex-1 py-2 rounded-xl text-xs font-extrabold transition ${activeTab===t.id?"bg-white text-orange-600 shadow":"text-gray-500"}`}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Dept filter */}
      <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
        {depts.map(d=>(
          <button key={d} onClick={()=>setSelDept(d)}
            className={"shrink-0 px-3.5 py-1.5 rounded-full text-xs font-extrabold border transition "+(selDept===d?"bg-orange-500 text-white border-orange-500":"bg-white text-gray-500 border-gray-200")}>
            {d==="all"?"सभी":d}
          </button>
        ))}
      </div>

      {activeTab === "perday"  && <PerDayTab />}
      {activeTab === "weekly"  && <WeeklyTab />}
      {activeTab === "monthly" && <MonthlyTab />}

      {/* Add Report Modal */}
      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Hourly Report Add करें">
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Input label="Date" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <Select label="Hour Slot" value={form.hourSlot} onChange={e=>setForm(f=>({...f,hourSlot:e.target.value}))}>
              <option value="">-- Slot --</option>
              {ALL_HOUR_SLOTS.map(s=><option key={s} value={s}>{s}</option>)}
            </Select>
          </div>
          <Select label="Department" value={form.department} onChange={e=>setForm(f=>({...f,department:e.target.value}))}>
            <option value="">-- Department --</option>
            {MOCK_DB.departments.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
          </Select>
          <Select label="Style" value={form.style} onChange={e=>setForm(f=>({...f,style:e.target.value}))}>
            <option value="">-- Style --</option>
            {MOCK_DB.styles.map(s=><option key={s.id} value={s.styleName}>{s.styleName}</option>)}
          </Select>
          {form.department && (
            <div className="bg-orange-50 border border-orange-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
              <p className="text-orange-600 text-sm font-bold">Per Hour Target:</p>
              <p className="text-orange-700 font-black text-lg">{Math.round((deptTargets[form.department]||400)/WORK_HOURS)} pcs</p>
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <Input label="Total Pieces" type="number" value={form.total} placeholder="0" onChange={e=>setForm(f=>({...f,total:e.target.value}))}/>
            <Input label="Pass ✓" type="number" value={form.pass} placeholder="0" onChange={e=>setForm(f=>({...f,pass:e.target.value}))}/>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Alter ↻" type="number" value={form.alter} placeholder="0" onChange={e=>setForm(f=>({...f,alter:e.target.value}))}/>
            <Input label="Reject ✗" type="number" value={form.reject} placeholder="0" onChange={e=>setForm(f=>({...f,reject:e.target.value}))}/>
          </div>
          <div className="flex gap-3">
            <Btn variant="secondary" className="flex-1" onClick={()=>setShowModal(false)}>Cancel</Btn>
            <Btn className="flex-1" onClick={handleAdd}>Save Report →</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

const JobPortal = () => {

// EXPORT CENTER
const ExportCenter = () => {
  const { sharedEntries, sharedWorkers, sharedHourly, sharedStyles } = useContext(AppContext);
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo,   setDateTo]   = useState("");
  const [dept,     setDept]     = useState("all");
  const [done,     setDone]     = useState("");

  // Use real data with fallback
  const allEntries = sharedEntries  || MOCK_DB.workEntries;
  const allWorkers = sharedWorkers  || MOCK_DB.workers;
  const allHourly  = sharedHourly   || MOCK_DB.hourlyReports;
  const allStyles  = sharedStyles   || MOCK_DB.styles;

  const flash = (label) => { setDone(label); setTimeout(() => setDone(""), 2500); };

  const downloadCSV = (filename, headers, rows) => {
    const esc = (v) => '"' + String(v ??"").replace(/"/g, '""') + '"';
    const csv = [headers.map(esc).join(","), ...rows.map(r => r.map(esc).join(","))].join("\r\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };

  const inRange = (d) => {
    if (dateFrom && d < dateFrom) return false;
    if (dateTo   && d > dateTo)   return false;
    return true;
  };

  const exportWorkEntries = () => {
    const rows = allEntries
      .filter(e => inRange(e.date) && (dept ==="all" || e.department === dept))
      .map(e => [e.date, e.workerName, e.staffId, e.department, e.styleName, e.operation, e.pieces, e.pieceRate, e.amount, e.status ||"verified"]);
    if (!rows.length) { alert("No data for selected filters."); return; }
    downloadCSV("work-entries.csv", ["Date","Worker","Staff ID","Dept","Style","Operation","Pieces","Rate","Amount","Status"], rows);
    flash("Work Entries");
  };
  const exportWorkers = () => {
    const rows = allWorkers.filter(w => dept ==="all" || w.department === dept)
      .map(w => [w.staffId, w.name, w.mobile, w.department, w.joinDate, w.status]);
    downloadCSV("workers.csv", ["Staff ID","Name","Mobile","Department","Join Date","Status"], rows);
    flash("Workers");
  };
  const exportPayments = () => {
    const verifiedEntries = allEntries.filter(e => e.status === "verified" || e.status === "approved");
    const grouped = {};
    verifiedEntries.forEach(e => {
      const key = e.staffId || e.workerName;
      if (!grouped[key]) grouped[key] = { workerName: e.workerName, staffId: e.staffId||"", department: e.department, totalPieces: 0, grossAmount: 0 };
      grouped[key].totalPieces += (+e.pieces||0);
      grouped[key].grossAmount += (+e.amount||0);
    });
    const rows = Object.values(grouped)
      .filter(r => dept ==="all" || r.department === dept)
      .map(r => [r.workerName, r.staffId, r.department, r.totalPieces, r.grossAmount.toFixed(2), r.grossAmount.toFixed(2)]);
    if (!rows.length) { alert("No payment data found."); return; }
    downloadCSV("payments.csv", ["Worker","Staff ID","Dept","Total Pieces","Gross Amount","Net Amount"], rows);
    flash("Payments");
  };
  const exportHourly = () => {
    const rows = allHourly.filter(h => inRange(h.date) && (dept ==="all" || h.department === dept))
      .map(h => [h.date, h.department, h.style, h.hourSlot, h.total, h.pass, h.alter, h.reject, h.passPercent]);
    if (!rows.length) { alert("No data for selected filters."); return; }
    downloadCSV("hourly-reports.csv", ["Date","Dept","Style","Slot","Total","Pass","Alter","Reject","Pass%"], rows);
    flash("Hourly Reports");
  };
  const exportStyles = () => {
    const rows = allStyles.map(s => [s.styleNumber||s.styleCode, s.styleName, s.buyer||s.buyerName, s.totalQuantity||s.orderQuantity, s.completedQty||0, s.status, s.targetDate||s.deliveryDate]);
    downloadCSV("styles.csv", ["Style No","Style Name","Buyer","Total Qty","Completed","Status","Target Date"], rows);
    flash("Styles");
  };

  const CARDS = [
    { id:"work",    icon:"W", title:"Work Entries",   count: allEntries.length,  color:"orange", onExport: exportWorkEntries, dateFilter: true,  deptFilter: true  },
    { id:"workers", icon:"workers", title:"Workers",  count: allWorkers.length,  color:"blue",   onExport: exportWorkers,     dateFilter: false, deptFilter: true  },
    { id:"pay",     icon:"P", title:"Payments",       count: allEntries.filter(e=>e.status==="verified"||e.status==="approved").length, color:"green", onExport: exportPayments, dateFilter: false, deptFilter: true },
    { id:"hourly",  icon:"hourly", title:"Hourly Reports", count: allHourly.length, color:"purple", onExport: exportHourly,   dateFilter: true,  deptFilter: true  },
    { id:"styles",  icon:"styles", title:"Styles / Orders",count: allStyles.length, color:"amber",  onExport: exportStyles,   dateFilter: false, deptFilter: false },
  ];

  const btnStyle = { orange:"bg-orange-500 text-white", blue:"bg-blue-500 text-white", green:"bg-green-500 text-white", purple:"bg-purple-500 text-white", amber:"bg-amber-500 text-white" };
  const bgStyle  = { orange:"border-orange-200 bg-orange-50", blue:"border-blue-200 bg-blue-50", green:"border-green-200 bg-green-50", purple:"border-purple-200 bg-purple-50", amber:"border-amber-200 bg-amber-50" };

  return (
    <div className="space-y-6">
      {done && (
        <div className="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm">
          {done} exported successfully!
        </div>
      )}

      <div>
        <h1 className="text-xl font-extrabold text-gray-900">Export Center</h1>
        <p className="text-gray-500 text-sm mt-0.5">Download factory data as CSV files</p>
      </div>

      <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4">
        <p className="text-gray-600 text-xs font-bold uppercase tracking-wide mb-3">Filters</p>
        <div className="grid sm:grid-cols-3 gap-3">
          <div className="space-y-1">
            <label className="block text-sm font-bold text-gray-700">From Date</label>
            <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)}
              className="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 text-sm focus:outline-none focus:border-orange-400"
              style={{ fontSize:"16px" }} />
          </div>
          <div className="space-y-1">
            <label className="block text-sm font-bold text-gray-700">To Date</label>
            <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)}
              className="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 text-sm focus:outline-none focus:border-orange-400"
              style={{ fontSize:"16px" }} />
          </div>
          <div className="space-y-1">
            <label className="block text-sm font-bold text-gray-700">Department</label>
            <select value={dept} onChange={e => setDept(e.target.value)}
              className="w-full bg-white border-2 border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 text-sm focus:outline-none focus:border-orange-400"
              style={{ fontSize:"16px" }}>
              <option value="all">All Departments</option>
              {MOCK_DB.departments.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="grid sm:grid-cols-2 gap-4">
        {CARDS.map(c => (
          <div key={c.id} className={"border-2 rounded-2xl p-5 space-y-3" + bgStyle[c.color]}>
            <div className="flex items-center gap-3">
              <span className="text-2xl">{c.icon}</span>
              <div>
                <p className="text-gray-900 font-extrabold text-sm">{c.title}</p>
                <p className="text-gray-400 text-xs">{c.count} records</p>
              </div>
            </div>
            <div className="flex gap-2 text-xs">
              <span className={"px-2 py-0.5 rounded-full font-medium border" + (c.dateFilter ?"border-green-300 text-green-700 bg-white" :"border-gray-200 text-gray-400 bg-white")}>
                {c.dateFilter ?"Date filter" :"No date filter"}
              </span>
              <span className={"px-2 py-0.5 rounded-full font-medium border" + (c.deptFilter ?"border-green-300 text-green-700 bg-white" :"border-gray-200 text-gray-400 bg-white")}>
                {c.deptFilter ?"Dept filter" :"No dept filter"}
              </span>
            </div>
            <button onClick={c.onExport} className={"w-full py-3 rounded-xl text-sm font-bold active:scale-95 transition" + btnStyle[c.color]}>
              Download CSV
            </button>
          </div>
        ))}
      </div>

      <div className="bg-gray-900 rounded-2xl p-5 flex flex-col sm:flex-row items-center gap-4">
        <div className="flex-1">
          <p className="text-white font-extrabold">Export Everything</p>
          <p className="text-gray-400 text-sm">Downloads all 5 reports as separate CSV files</p>
        </div>
        <button onClick={() => { exportWorkEntries(); setTimeout(exportWorkers, 400); setTimeout(exportPayments, 800); setTimeout(exportHourly, 1200); setTimeout(exportStyles, 1600); }}
          className="w-full sm:w-auto bg-orange-500 hover:bg-orange-600 active:scale-95 text-white font-bold px-6 py-3 rounded-xl transition text-sm shrink-0">
          Export All (5 files)
        </button>
      </div>
    </div>
  );
};

const StaffPaymentFull = () => {
  const { user, sharedWorkers, sharedEntries } = useContext(AppContext);
  const workers = sharedWorkers || MOCK_DB.workers;
  const [search, setSearch] = useState("");
  const [deptFilter, setDeptFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [selectedWorker, setSelectedWorker] = useState(null);
  const [showSlip, setShowSlip]   = useState(false);
  const [toast, setToast]         = useState("");
  const [payStatus, setPayStatus] = useState({});
  const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0,7));

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2500); };

  // Build per-worker payment from REAL sharedEntries filtered by selected month
  const allEntries = sharedEntries || MOCK_DB.workEntries;
  const workerPayments = workers.map(w => {
    const entries = allEntries.filter(e =>
      (e.workerId === w.id || e.staffId === w.staffId) &&
      (e.status === "verified" || e.status === "approved") &&
      e.date && e.date.startsWith(selectedMonth)
    );
    const totalPieces = entries.reduce((s, e) => s + (+e.pieces||0), 0);
    const grossAmount = entries.reduce((s, e) => s + (+e.amount||0), 0);
    const deductions  = MOCK_DB.payments.find(p => p.staffId === w.staffId)?.deductions || 0;
    const advance     = MOCK_DB.payments.find(p => p.staffId === w.staffId)?.advance_deduction || 0;
    const netAmount   = grossAmount - deductions - advance;
    const status      = payStatus[w.id] || (MOCK_DB.payments.find(p => p.staffId === w.staffId)?.status || "pending");
    return { ...w, entries, totalPieces, grossAmount, deductions, advance, netAmount, status };
  });

  const filtered = workerPayments
    .filter(w => deptFilter ==="all" || w.department === deptFilter)
    .filter(w => statusFilter ==="all" || w.status === statusFilter)
    .filter(w => !search || w.name.toLowerCase().includes(search.toLowerCase()) || w.staffId.toLowerCase().includes(search.toLowerCase()));

  const totalPieces = filtered.reduce((s, w) => s + w.totalPieces, 0);
  const totalGross  = filtered.reduce((s, w) => s + w.grossAmount, 0);
  const totalNet    = filtered.reduce((s, w) => s + w.netAmount, 0);
  const paidCount   = filtered.filter(w => w.status ==="paid").length;

  const { paged: pagedWorkers, page: wpPage, setPage: setWpPage, totalPages: wpTotal, total: wpTotalCount, pageSize: wpPageSize } = usePagination(filtered, 20);

  const markPaid = (id) => { setPayStatus(p => ({ ...p, [id]:"paid" })); flash("Payment Marked Paid!"); };

  // Detail view
  if (selectedWorker) {
    const w = workerPayments.find(x => x.id === selectedWorker);
    return (
      <div className="space-y-4">
        {toast && <div className="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-5 py-2.5 rounded-2xl shadow-xl font-bold text-sm">{toast}</div>}
        <div className="flex items-center gap-3">
          <button onClick={() => setSelectedWorker(null)} className="px-3 py-1.5 rounded-xl bg-orange-50 border border-orange-200 text-orange-600 text-sm font-bold">← Back</button>
          <div>
            <h1 className="text-lg font-extrabold text-gray-900">{w.name}</h1>
            <p className="text-gray-500 text-sm">{w.staffId} • {w.department}</p>
          </div>
          <Badge color={w.status ==="paid" ?"green" :"amber"} size="xs" className="ml-auto">
            {w.status ==="paid" ?"Paid" :"Pending"}
          </Badge>
        </div>

        {/* Summary */}
        <div className="grid grid-cols-2 gap-3">
          {[
            { label:"Total Pieces", value: w.totalPieces +" pcs", color:"text-orange-600", bg:"bg-orange-50 border-orange-200" },
            { label:"Gross Amount", value:"Rs" + w.grossAmount.toLocaleString(), color:"text-blue-600", bg:"bg-blue-50 border-blue-200" },
            { label:"Deductions",   value:"- Rs" + (w.deductions + w.advance), color:"text-red-500", bg:"bg-red-50 border-red-200" },
            { label:"Net Payable",  value:"Rs" + w.netAmount.toLocaleString(), color:"text-green-600", bg:"bg-green-50 border-green-200" },
          ].map(s => (
            <div key={s.label} className={"rounded-2xl border-2 p-3 text-center" + s.bg}>
              <p className={"text-xl font-extrabold" + s.color}>{s.value}</p>
              <p className="text-gray-500 text-xs mt-0.5">{s.label}</p>
            </div>
          ))}
        </div>

        {/* Formula */}
        <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm text-center text-gray-600">
          Formula: <span className="font-bold text-orange-500">{w.totalPieces} pcs</span> × avg rate = <span className="font-bold text-blue-600">Rs {w.grossAmount}</span> − <span className="font-bold text-red-500">Rs {w.deductions + w.advance}</span> = <span className="font-extrabold text-green-600 text-base">Rs {w.netAmount}</span>
        </div>

        {/* Entry breakdown */}
        <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">

            ["Worker Name",   w.name],
            ["Staff ID",      w.staffId],
            ["Department",    w.department],
            ["Mobile",        w.mobile],

            ["Gross Amount","Rs" + w.grossAmount],
            ["Deductions","Rs" + (w.deductions + w.advance)],

        filtered.forEach(w => {

// ─── Entry Detail Sheet with Edit ──────────────────────────────
const EntryDetailSheet = ({ selEntry, m, onClose, onStatus, onSave, allWEntries, workers, operations, styles }) => {
  const { sharedCuts } = useContext(AppContext);
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState({
    date: selEntry.date,
    operationId: selEntry.operationId ||"",
    pieces: String(selEntry.pieces),
    note: selEntry.note ||"",
  });
  const [err, setErr] = useState("");

  const op = operations.find(o => o.id === form.operationId);
  const previewRate = op?.pieceRate || selEntry.pieceRate || 0;
  const previewAmt  = (parseInt(form.pieces)||0) * previewRate;

  const handleSave = () => {
    const qty = parseInt(form.pieces);
    if (!form.date)           { setErr("Date जरूरी है।"); return; }
    if (!form.operationId)    { setErr("Operation चुनें।"); return; }
    if (!qty || qty < 1)      { setErr("Pieces 0 से ज्यादा होनी चाहिए।"); return; }

    // Rule 7 — Date Lock (supervisor can edit locked months, so just warn)
    if (isDateLocked(form.date,"supervisor")) {
      // Supervisor is allowed, no block — just proceed
    }

    // Rule 6 — Duplicate check (same worker + style + operation + date, excluding this entry)
    const duplicate = (allWEntries||[]).find(e =>
      e.id !== selEntry.id &&
      e.workerId    === selEntry.workerId &&
      e.styleId     === selEntry.styleId &&
      e.operationId === form.operationId &&
      e.date        === form.date &&
      e.status      !=="rejected"
    );
    if (duplicate) {
      setErr(`[!] Duplicate Entry! ${selEntry.workerName} की ${form.date} को इस operation की entry पहले से है (${duplicate.pieces} pcs).`);
      return;
    }

    // Rule 1 — Cutting limit check (cutting records se dynamic)
    const cuttingTotal = (sharedCuts||[])
      .filter(c => c.styleId === selEntry.styleId)
      .reduce((s, c) => s + (+c.totalPieces || 0), 0);
    const limit = cuttingTotal > 0 ? cuttingTotal : 999999;
    const usedExcludingThis = (allWEntries||[])
      .filter(e => e.id !== selEntry.id && e.styleId === selEntry.styleId && e.operationId === form.operationId && e.status !=="rejected")
      .reduce((s,e) => s + (e.pieces||0), 0);
    const opBalance = limit - usedExcludingThis;
    if (limit < 999999 && qty > opBalance) {
      setErr(`[!] Cutting limit exceed! इस operation का balance सिर्फ ${opBalance} pcs है।`);
      return;
    }

    // Rule 5 — Daily worker limit (same worker, same style, same operation, same date)
    const alreadyTodayOthers = (allWEntries||[])
      .filter(e => e.id !== selEntry.id && e.workerId === selEntry.workerId && e.styleId === selEntry.styleId && e.operationId === form.operationId && e.date === form.date && e.status !=="rejected")
      .reduce((s,e) => s + (e.pieces||0), 0);
    const canEnter = Math.max(0, opBalance - alreadyTodayOthers);
    if (qty > canEnter) {
      setErr(`[!] Daily limit exceeded! ${selEntry.workerName} इस date पर अधिकतम ${canEnter} pcs enter कर सकते हैं।`);
      return;
    }

    setErr("");
    onSave(selEntry.id, form);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end" style={{background:"rgba(0,0,0,0.55)"}}>
      <div className="bg-white w-full max-w-lg mx-auto rounded-t-3xl shadow-2xl overflow-hidden" style={{maxHeight:"90dvh",overflowY:"auto"}}>
        {/* Handle */}
        <div className="flex justify-center pt-3 pb-1 shrink-0">
          <div className="w-10 h-1 bg-gray-200 rounded-full"/>
        </div>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
          <h3 className="font-extrabold text-gray-900">{editMode ?"Entry Edit करें" :"Entry Detail"}</h3>
          <button onClick={onClose} className="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center text-gray-500 font-bold active:bg-gray-200">✕</button>
        </div>

        <div className="px-5 py-4 space-y-4 pb-8">
          {/* Worker info */}
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-2xl bg-green-100 flex items-center justify-center text-green-700 font-extrabold text-lg">
              {(selEntry.workerName||"W").charAt(0)}
            </div>
            <div>
              <p className="text-gray-900 font-extrabold">{selEntry.workerName}</p>
              <p className="text-gray-400 text-sm">{selEntry.staffId} · {selEntry.department}</p>
            </div>
            <span className={"ml-auto text-xs font-bold px-3 py-1.5 rounded-full"+m.bg+""+m.text+" border"+m.border}>
              {m.label}
            </span>
          </div>

          {/* VIEW MODE */}
          {!editMode && (
            <div className="bg-gray-50 rounded-2xl p-4 space-y-2.5">
              {[
                { label:"Style",      value: selEntry.styleName },
                { label:"Operation",  value: selEntry.operation },
                { label:"Date",       value: selEntry.date },
                { label:"Pieces",     value: selEntry.pieces+" pcs" },
                { label:"Piece Rate", value:"₹"+selEntry.pieceRate+"/pc" },
                { label:"Amount",     value:"₹"+(+selEntry.amount||0).toFixed(2), bold:true },
              ].map(row=>(
                <div key={row.label} className="flex items-center justify-between">
                  <p className="text-gray-400 text-sm">{row.label}</p>

};

                      // 3. Supervisor ne manually open kiya (false) → open

                      const manualState = lockedCuts[c.id]; // true=locked, false=open, undefined=default
                      const isLocked = isComplete

      if (!hForm.department || !hForm.hourSlot || !hForm.total) return;
      setReports(prev=>[{ ...hForm, id:"h"+Date.now(), passPercent:total?(pass/total*100).toFixed(1):0 }, ...prev]);

    // Latest report = pehla item

    // Target lookup for latest report's dept
    const latestDept      = MOCK_DB.departments.find(d=>d.name===latestReport?.department);
    const latestDailyTgt  = latestDept?.dailyTarget || 400;
    const latestHourlyTgt = Math.round(latestDailyTgt / WORK_HOURS);
    const latestActual    = latestReport ? (+latestReport.total||0) : 0;
    const latestDiff      = latestActual - latestHourlyTgt;

                  </p>
                  <p className={`text-xs font-bold ${latestGood?"text-green-400":"text-red-400"}`}>
                    {latestGood?"+":""}{latestDiff} pcs

              </div>

                        <p className={`text-xs font-bold ${rGood?"text-green-500":"text-red-400"}`}>{rGood?"+":""}{rDiff}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

            <div className="flex gap-3">
              <Btn variant="secondary" className="flex-1" onClick={()=>setShowHForm(false)}>Cancel</Btn>
              <Btn className="flex-1 bg-amber-500 hover:bg-amber-600" onClick={addReport}>Submit Report →</Btn>
            </div>
          </div>
        </Modal>
      </div>

      <><div className="px-4 pt-5 pb-28 space-y-4">
        {profSaved && (
          <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex items-center gap-2">
            <div className="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center shrink-0">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="1.8" strokeLinecap="round"/></svg>
            </div>
            <p className="text-green-700 text-sm font-semibold">Profile save हो गई!</p>
          </div>
        )}

        {/* Avatar hero — dept color based */}
        {/* Stats row */}
        <div className="grid grid-cols-3 gap-3">
          {[
            { label:"Team",    val:myTeam.length,   color:"text-blue-600",  bg:"bg-blue-50"  },
            { label:"Reports", val:reports.length,  color:"text-amber-600", bg:"bg-amber-50" },
            { label:"Cuts",    val:cuts.length,     color:"text-red-600",   bg:"bg-red-50"   },

            <div key={x.label} className={`${x.bg} rounded-2xl py-4 text-center`}>

          ))}
        </div>

        {/* Edit / Save */}
        <div className="flex gap-2">
          {editMode ? (
            <>
              <button onClick={()=>{setEditMode(false);setDraft(prof);}}
                className="flex-1 bg-gray-100 text-gray-700 font-bold text-sm py-3 rounded-2xl active:scale-[0.98] transition">Cancel</button>
              <button onClick={saveProf}
                className="flex-1 bg-orange-500 text-white font-bold text-sm py-3 rounded-2xl shadow-md shadow-orange-200 active:scale-[0.98] transition">Save Changes</button>
